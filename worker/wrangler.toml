name = "mr"
main = "src/worker.js"
compatibility_date = "2024-01-01"

[vars]
WORKER_VERSION = "yb-v2.9"

# KV Namespace
[[kv_namespaces]]
binding  = "KV"
id       = "REPLACE_WITH_KV_NAMESPACE_ID"

# R2 Bucket
[[r2_buckets]]
binding    = "R2"
bucket_name = "yb-media"

# Cron Triggers
[triggers]
crons = ["0 * * * *"]
