<!DOCTYPE html>
<html>
<head>
<script>
  const path = window.location.pathname;
  const map = {
    '/shop':    '/index.html',
    '/dashboard': '/index.html',
    '/fullscreen':  '/index.html',
  };
  const target = map[path];
  if (target) window.location.replace(target);
</script>
</head>
</html>
