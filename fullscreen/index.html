<!DOCTYPE html>
<html lang="km">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>YB Media Viewer</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0f0f0f;--surface:#1a1a1a;--accent:#f0a500;
  --sat:env(safe-area-inset-top,0px);
  --sab:env(safe-area-inset-bottom,0px);
}
html,body{height:100%;background:#000;overflow:hidden;color:#fff;
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}

/* ── Grid launcher ──────────────────────────────────────────── */
#app{height:100dvh;display:flex;flex-direction:column}
.launcher-hdr{
  padding:calc(var(--sat) + 12px) 16px 12px;
  background:var(--surface);display:flex;align-items:center;gap:10px;
  flex-shrink:0;border-bottom:1px solid #222}
.launcher-hdr h1{font-size:17px;font-weight:700;flex:1}
.add-btn{background:var(--accent);color:#000;border:none;border-radius:9px;
  padding:7px 14px;font-size:13px;font-weight:700;cursor:pointer}
.media-grid{
  display:grid;grid-template-columns:repeat(3,1fr);gap:2px;
  overflow-y:auto;flex:1;-webkit-overflow-scrolling:touch;padding:2px;
  background:#111}
.media-cell{
  aspect-ratio:9/16;background:#222;overflow:hidden;position:relative;cursor:pointer;
  display:flex;align-items:center;justify-content:center}
.media-cell img,.media-cell video{
  width:100%;height:100%;object-fit:cover;opacity:0;transition:opacity .35s}
.media-cell img.loaded,.media-cell video.loaded{opacity:1}
.media-cell-play{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  background:rgba(0,0,0,.2);font-size:24px}
.media-cell-views{
  position:absolute;bottom:4px;left:6px;font-size:10px;font-weight:700;
  color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.8)}
.media-cell-type{
  position:absolute;top:5px;right:5px;font-size:10px;
  background:rgba(0,0,0,.55);color:#fff;padding:2px 6px;border-radius:10px}

/* ── Fullscreen viewer ──────────────────────────────────────── */
#viewer{
  position:fixed;inset:0;background:#000;z-index:100;
  display:none;flex-direction:column}
#viewer.open{display:flex}
#mv-scroll{
  flex:1;overflow-y:scroll;scroll-snap-type:y mandatory;
  -webkit-overflow-scrolling:touch}
.mv-slide{
  height:100dvh;width:100%;scroll-snap-align:start;
  display:flex;align-items:center;justify-content:center;
  position:relative;background:#000;flex-shrink:0}
.mv-slide img{
  max-width:100%;max-height:100%;object-fit:contain;
  opacity:0;transition:opacity .3s}
.mv-slide img.loaded{opacity:1}
.mv-yt-wrap{
  width:100%;position:relative;padding-bottom:177.78%;background:#000}
.mv-yt-frame{
  position:absolute;inset:0;width:100%;height:100%;border:none}
.mv-yt-tap{
  position:absolute;inset:0;cursor:pointer;
  display:flex;align-items:center;justify-content:center}
.mv-yt-play-ico{
  width:70px;height:70px;background:rgba(0,0,0,.6);border-radius:50%;
  display:flex;align-items:center;justify-content:center;font-size:32px;
  transition:transform .15s}
.mv-slide-info{
  position:absolute;bottom:0;left:0;right:60px;
  padding:20px 16px max(var(--sab),24px);
  background:linear-gradient(transparent,rgba(0,0,0,.75))}
.mv-slide-title{font-size:15px;font-weight:700;color:#fff;margin-bottom:3px;
  text-shadow:0 1px 4px rgba(0,0,0,.8)}
.mv-slide-sub{font-size:12px;color:rgba(255,255,255,.7)}
.mv-right{
  position:absolute;right:10px;bottom:80px;
  display:flex;flex-direction:column;gap:14px;align-items:center}
.mv-btn{
  width:46px;height:46px;background:rgba(255,255,255,.18);
  border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:22px;cursor:pointer;backdrop-filter:blur(6px);
  -webkit-backdrop-filter:blur(6px);border:none;color:#fff}
.mv-top{
  position:absolute;top:calc(var(--sat) + 8px);left:0;right:0;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 14px;z-index:2;pointer-events:none}
.mv-counter{font-size:13px;color:rgba(255,255,255,.8);font-weight:600;
  text-shadow:0 1px 4px rgba(0,0,0,.8)}
.mv-close-btn{
  pointer-events:all;width:36px;height:36px;background:rgba(0,0,0,.5);
  border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:16px;cursor:pointer;border:none;color:#fff}

/* ── Add media modal ────────────────────────────────────────── */
.modal-ov{
  position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;
  display:none;align-items:flex-end}
.modal-ov.open{display:flex}
.modal-sheet{
  width:100%;background:var(--surface);border-radius:20px 20px 0 0;
  padding:16px 20px max(var(--sab),20px)}
.modal-handle{width:40px;height:5px;background:#444;border-radius:3px;
  margin:0 auto 14px}
.modal-title{font-size:16px;font-weight:700;margin-bottom:14px}
.modal-inp{
  width:100%;background:#111;border:1.5px solid #333;border-radius:11px;
  padding:12px 14px;font-size:15px;color:#fff;outline:none;
  margin-bottom:10px;transition:border-color .2s}
.modal-inp:focus{border-color:var(--accent)}
.modal-inp::placeholder{color:#555}
.modal-row{display:flex;gap:8px;margin-bottom:10px}
.modal-btn{
  flex:1;padding:13px;border:none;border-radius:11px;
  font-size:15px;font-weight:700;cursor:pointer;transition:opacity .15s}
.modal-btn:active{opacity:.75}
.modal-btn.primary{background:var(--accent);color:#000}
.modal-btn.secondary{background:#222;color:#fff}

/* ── Swipe close indicator ──────────────────────────────────── */
@keyframes hint{0%{opacity:0;transform:translateX(-10px)}50%{opacity:1}100%{opacity:0;transform:translateX(10px)}}
</style>
</head>
<body>
<div id="app">
  <!-- Grid launcher -->
  <div class="launcher-hdr">
    <div style="font-size:22px">📹</div>
    <h1>YB Media Viewer <span style="font-size:11px;color:#666;font-weight:400">TikTok style</span></h1>
    <button class="add-btn" onclick="openAddModal()">+ Add</button>
  </div>
  <div class="media-grid" id="media-grid"></div>
</div>

<!-- Fullscreen viewer -->
<div id="viewer">
  <div class="mv-top">
    <button class="mv-close-btn" onclick="closeViewer()">✕</button>
    <div class="mv-counter" id="mv-counter"></div>
    <div style="width:36px"></div>
  </div>
  <div id="mv-scroll"></div>
</div>

<!-- Add media modal -->
<div class="modal-ov" id="add-modal" onclick="if(event.target===this)closeAddModal()">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title">➕ Add Photo / Video</div>
    <input class="modal-inp" id="m-url" placeholder="URL (image or YouTube Shorts)..."
      oninput="_previewModalURL(this.value)">
    <input class="modal-inp" id="m-title" placeholder="Title (optional)">
    <input class="modal-inp" id="m-price" placeholder="Price e.g. $25.00 (optional)">
    <!-- Quick test shortcuts -->
    <div style="font-size:11px;color:#666;margin-bottom:8px">Quick test:</div>
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px">
      <button onclick="_quickAdd('yt-short','https://www.youtube.com/shorts/1Yr6uDZIfJ0','S53-V1','$30.00')"
        style="background:#ff0000;color:#fff;border:none;border-radius:8px;padding:6px 10px;font-size:12px;cursor:pointer;font-weight:600">
        📹 YT Short
      </button>
      <button onclick="_quickAdd('image','https://picsum.photos/400/700?random=1','Sample Photo','')"
        style="background:#333;color:#fff;border:none;border-radius:8px;padding:6px 10px;font-size:12px;cursor:pointer;font-weight:600">
        🖼️ Sample Img
      </button>
      <button onclick="_quickAdd('image','https://picsum.photos/400/700?random=2','Product 2','$15.00')"
        style="background:#333;color:#fff;border:none;border-radius:8px;padding:6px 10px;font-size:12px;cursor:pointer;font-weight:600">
        🖼️ + Price
      </button>
    </div>
    <div id="m-preview" style="height:80px;background:#111;border-radius:10px;margin-bottom:12px;
      display:flex;align-items:center;justify-content:center;color:#555;font-size:13px;overflow:hidden">
      Preview
    </div>
    <div class="modal-row">
      <button class="modal-btn secondary" onclick="closeAddModal()">Cancel</button>
      <button class="modal-btn primary" onclick="addMediaItem()">Add ✅</button>
    </div>
  </div>
</div>

<script>
// ── Media store ───────────────────────────────────────────────
let _items = [
  // Pre-loaded test items
  {
    url:   'https://www.youtube.com/shorts/1Yr6uDZIfJ0',
    type:  'video',
    title: 'YB Product Demo',
    price: '$30.00',
    id:    'yt1'
  },
  {
    url:   'https://images.unsplash.com/photo-1491553895911-0055eca6402d?w=400',
    type:  'image',
    title: 'Product Photo',
    price: '$25.00',
    id:    'img1'
  },
  {
    url:   'https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=400',
    type:  'image',
    title: 'Headphones',
    price: '$35.00',
    id:    'img2'
  }
];
let _curIdx = 0;
let _observer = null;

// ── YouTube utils ─────────────────────────────────────────────
function _ytId(url){
  if(!url) return null;
  let m=url.match(/youtube\.com\/shorts\/([\w-]+)/);
  if(m) return m[1];
  m=url.match(/youtu\.be\/([\w-]+)/);
  if(m) return m[1];
  m=url.match(/[?&]v=([\w-]+)/);
  if(m) return m[1];
  return null;
}
function _isYT(url){ return !!_ytId(url||''); }
function _isVideo(url){ return _isYT(url)||/\.(mp4|mov|webm)/i.test(url||''); }
function _ytEmbed(url, autoplay=false){
  const id=_ytId(url);
  if(!id) return '';
  return `https://www.youtube.com/embed/${id}?playsinline=1&rel=0&mute=0`
    +(autoplay?'&autoplay=1':'');
}
function _ytThumb(url){
  const id=_ytId(url);
  return id?`https://img.youtube.com/vi/${id}/mqdefault.jpg`:'';
}

// ── Build grid ────────────────────────────────────────────────
function renderGrid(){
  const grid=document.getElementById('media-grid');
  grid.innerHTML=_items.map((item,i)=>{
    const isVid=_isVideo(item.url);
    const thumb=isVid&&_isYT(item.url)?_ytThumb(item.url):item.url;
    return`<div class="media-cell" onclick="openViewer(${i})">
      <img src="${_esc(thumb)}" loading="lazy"
        onload="this.classList.add('loaded')"
        onerror="this.style.display='none'">
      ${isVid?`<div class="media-cell-play">▶</div>`:''}
      <div class="media-cell-type">${isVid?(_isYT(item.url)?'YT':'MP4'):'IMG'}</div>
      ${item.views?`<div class="media-cell-views">▶ ${item.views}</div>`:''}
    </div>`;
  }).join('');
}

// ── Open viewer ───────────────────────────────────────────────
function openViewer(startIdx=0){
  _curIdx=Math.max(0,Math.min(startIdx,_items.length-1));
  const scroll=document.getElementById('mv-scroll');

  scroll.innerHTML=_items.map((item,i)=>{
    const isYT=_isYT(item.url);
    const isMp4=!isYT&&/\.(mp4|mov|webm)/i.test(item.url||'');
    let media='';
    if(isYT){
      const auto=i===startIdx;
      media=`<div class="mv-yt-wrap">
        <iframe id="mv-yt-${i}" class="mv-yt-frame"
          src="${_esc(_ytEmbed(item.url,auto))}"
          allow="accelerometer;autoplay;clipboard-write;encrypted-media;gyroscope;picture-in-picture"
          allowfullscreen></iframe>
        ${!auto?`<div class="mv-yt-tap" onclick="_ytPlay(${i})">
          <div class="mv-yt-play-ico">▶</div>
        </div>`:''}
      </div>`;
    } else if(isMp4){
      media=`<video src="${_esc(item.url)}" playsinline preload="metadata" controls
        style="max-width:100%;max-height:100dvh;object-fit:contain"
        onloadeddata="this.classList.add('loaded')"></video>`;
    } else {
      media=`<img src="${_esc(item.url)}" loading="${i===startIdx?'eager':'lazy'}"
        onload="this.classList.add('loaded')" style="max-width:100%;max-height:100dvh;object-fit:contain">`;
    }
    return`<div class="mv-slide" id="mv-s-${i}" data-idx="${i}">
      ${media}
      <div class="mv-slide-info">
        ${item.title?`<div class="mv-slide-title">${_esc(item.title)}</div>`:''}
        ${item.price?`<div class="mv-slide-sub">${_esc(item.price)}</div>`:''}
      </div>
      <div class="mv-right">
        <button class="mv-btn" onclick="closeViewer()">✕</button>
        <button class="mv-btn" onclick="_shareItem(${i})">🔗</button>
        <button class="mv-btn" onclick="_deleteItem(${i})">🗑️</button>
      </div>
    </div>`;
  }).join('');

  document.getElementById('viewer').classList.add('open');
  document.body.style.overflow='hidden';
  // Jump to start
  requestAnimationFrame(()=>{
    const s=document.getElementById(`mv-s-${startIdx}`);
    if(s) s.scrollIntoView({behavior:'instant'});
    _updateCounter(startIdx);
  });
  _startObserver();
  _setupSwipeClose();
  try{window.Telegram?.WebApp?.HapticFeedback?.impactOccurred('light');}catch(_){}
}

function _ytPlay(i){
  const iframe=document.getElementById('mv-yt-'+i);
  if(!iframe) return;
  const item=_items[i];
  if(!item) return;
  iframe.src=_ytEmbed(item.url,true);
  // Remove tap overlay
  const tap=iframe.nextElementSibling;
  if(tap&&tap.classList.contains('mv-yt-tap')) tap.remove();
}

function closeViewer(){
  document.getElementById('viewer').classList.remove('open');
  document.body.style.overflow='';
  // Pause all videos
  document.querySelectorAll('#mv-scroll video').forEach(v=>v.pause());
  // Stop YouTube iframes
  document.querySelectorAll('#mv-scroll iframe').forEach(f=>{
    const s=f.src; f.src=''; f.src=s.replace('&autoplay=1','');
  });
  _observer?.disconnect();
  _observer=null;
}

function _updateCounter(idx){
  const el=document.getElementById('mv-counter');
  if(el) el.textContent=_items.length>1?`${idx+1} / ${_items.length}`:'';
}

function _startObserver(){
  _observer?.disconnect();
  _observer=new IntersectionObserver(entries=>{
    entries.forEach(en=>{
      if(en.intersectionRatio>=0.6){
        const i=parseInt(en.target.dataset.idx);
        _curIdx=i;
        _updateCounter(i);
      }
    });
  },{threshold:0.6});
  document.querySelectorAll('.mv-slide').forEach(s=>_observer.observe(s));
}

// ── Swipe right → close ───────────────────────────────────────
function _setupSwipeClose(){
  let sx=0,sy=0;
  const viewer=document.getElementById('viewer');
  viewer.addEventListener('touchstart',ev=>{
    sx=ev.touches[0].clientX;sy=ev.touches[0].clientY;
  },{passive:true,once:false});
  viewer.addEventListener('touchend',ev=>{
    const dx=ev.changedTouches[0].clientX-sx;
    const dy=Math.abs(ev.changedTouches[0].clientY-sy);
    if(dx>60&&dy<80&&sx<70) closeViewer();
  },{passive:true});
}

// ── Share / Delete ────────────────────────────────────────────
function _shareItem(i){
  const item=_items[i];
  if(navigator.share){
    navigator.share({title:item.title||'YB Media',url:item.url}).catch(()=>{});
  } else {
    navigator.clipboard?.writeText(item.url).then(()=>alert('Link copied!'));
  }
}
function _deleteItem(i){
  if(!confirm('Delete this item?')) return;
  _items.splice(i,1);
  closeViewer();
  renderGrid();
  if(_items.length) setTimeout(()=>openViewer(Math.min(i,_items.length-1)),100);
}

// ── Add media modal ───────────────────────────────────────────
function openAddModal(){
  document.getElementById('add-modal').classList.add('open');
  setTimeout(()=>document.getElementById('m-url').focus(),300);
}
function closeAddModal(){
  document.getElementById('add-modal').classList.remove('open');
  document.getElementById('m-url').value='';
  document.getElementById('m-title').value='';
  document.getElementById('m-price').value='';
  document.getElementById('m-preview').innerHTML='Preview';
  document.getElementById('m-preview').style.background='#111';
}
function _previewModalURL(url){
  const pv=document.getElementById('m-preview');
  if(!url){pv.innerHTML='Preview';return;}
  if(_isYT(url)){
    const id=_ytId(url);
    if(id){
      pv.innerHTML=`<img src="https://img.youtube.com/vi/${id}/mqdefault.jpg"
        style="width:100%;height:100%;object-fit:cover">`;
    }
  } else if(/^https?:\/\//.test(url)){
    pv.innerHTML=`<img src="${_esc(url)}" style="max-height:78px;max-width:100%;object-fit:contain"
      onerror="this.parentElement.innerHTML='❌ Invalid image URL'">`;
  }
}
function _quickAdd(type,url,title,price){
  document.getElementById('m-url').value=url;
  document.getElementById('m-title').value=title;
  document.getElementById('m-price').value=price;
  _previewModalURL(url);
}
function addMediaItem(){
  const url=(document.getElementById('m-url').value||'').trim();
  if(!url){alert('Please enter a URL');return;}
  const title=(document.getElementById('m-title').value||'').trim();
  const price=(document.getElementById('m-price').value||'').trim();
  const type=_isVideo(url)?'video':'image';
  _items.unshift({url,type,title,price,id:'item_'+Date.now()});
  closeAddModal();
  renderGrid();
  // Open viewer at new item
  setTimeout(()=>openViewer(0),150);
}

// ── Escape key close ──────────────────────────────────────────
document.addEventListener('keydown',ev=>{
  if(ev.key==='Escape') closeViewer();
});

// ── Utils ─────────────────────────────────────────────────────
function _esc(s){
  return String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;')
    .replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── Init ──────────────────────────────────────────────────────
renderGrid();
// Auto-open viewer after 1s for demo
// setTimeout(()=>openViewer(0), 1000);
</script>
</body>
</html>
