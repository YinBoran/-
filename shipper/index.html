<!DOCTYPE html>
<html lang="km">
<head>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="../config.js?v=2"></script>
<meta charset="UTF-8">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<link rel="manifest" href="manifest.json">
<title>YB Shipper</title>
<style>
:root {
  --bg:#0f0f0f; --surface:#1a1a1a; --card:#222; --border:#333;
  --accent:#f0a500; --accent2:#e05c00;
  --green:#22c55e; --red:#ef4444; --blue:#3b82f6;
  --text:#f0f0f0; --muted:#888;
  --font:'Segoe UI',system-ui,sans-serif;
  --hdr-h:64px;
  --sat:env(safe-area-inset-top,0px);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{
  background:var(--bg);color:var(--text);font-family:var(--font);
  min-height:100vh;padding-bottom:80px;
  padding-top:calc(var(--hdr-h) + var(--sat));
}
.hdr{
  background:#0f0f0f;border-bottom:1px solid var(--border);
  padding:12px 16px;
  display:flex;align-items:center;gap:10px;
  position:fixed;top:0;left:0;right:0;z-index:50;
  height:calc(var(--hdr-h) + var(--sat));
  padding-top:calc(12px + var(--sat));
  transition:transform .28s ease;will-change:transform;
}
.hdr.hdr-hidden{transform:translateY(-100%)}
.hdr-spacer{display:none}
.hdr-logo{width:40px;height:40px;background:linear-gradient(135deg,var(--accent),var(--accent2));
  border-radius:10px;display:flex;align-items:center;justify-content:center;
  font-size:19px;font-weight:700;color:#000;flex-shrink:0;cursor:pointer;
  transition:transform .15s;user-select:none}
.hdr-logo:active{transform:scale(.92)}
.hdr-info{cursor:pointer}
.hdr-info h1{font-size:16px;font-weight:700}
.hdr-info p{font-size:12px;color:var(--muted)}
.hdr-actions{margin-left:auto;display:flex;align-items:center;gap:8px}
.hdr-badge{background:var(--accent);color:#000;font-size:12px;font-weight:700;
  padding:4px 10px;border-radius:20px;min-width:28px;text-align:center}
.hdr-search{flex:1;background:var(--card);border:1px solid var(--border);
  border-radius:9px;padding:8px 12px;color:var(--text);font-size:13px;
  min-width:0;outline:none;transition:border-color .2s}
.hdr-search:focus{border-color:var(--accent)}
.hdr-search::placeholder{color:var(--muted);font-size:12px}
.new-order-alert{background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:#000;padding:10px 16px;font-size:14px;font-weight:700;
  display:flex;align-items:center;gap:8px;cursor:pointer;
  animation:pulse-bg 1.5s infinite}
@keyframes pulse-bg{0%,100%{opacity:1}50%{opacity:.85}}
.new-order-alert.hidden{display:none}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;
  background:var(--border);border-bottom:1px solid var(--border)}
.stat{background:var(--surface);padding:11px;text-align:center}
.stat-num{font-size:22px;font-weight:700;color:var(--accent)}
.stat-lbl{font-size:11px;color:var(--muted);margin-top:2px}
.fbar{background:var(--surface);border-bottom:1px solid var(--border);
  padding:8px 12px;display:flex;align-items:center;gap:8px}
.fbar-label{font-size:13px;color:var(--muted)}
.toggle{display:flex;align-items:center;gap:6px;cursor:pointer}
.toggle-track{width:36px;height:20px;background:var(--border);border-radius:10px;
  position:relative;transition:background .2s}
.toggle-track.on{background:var(--accent)}
.toggle-thumb{width:16px;height:16px;background:#fff;border-radius:50%;
  position:absolute;top:2px;left:2px;transition:left .2s;box-shadow:0 1px 3px rgba(0,0,0,.3)}
.toggle-track.on .toggle-thumb{left:18px}
.toggle-text{font-size:13px;font-weight:600;color:var(--text)}
.tabs{display:flex;background:var(--surface);border-bottom:1px solid var(--border)}
.tab{flex:1;padding:12px 8px;font-size:13px;font-weight:600;color:var(--muted);
  text-align:center;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.orders{padding:10px;display:flex;flex-direction:column;gap:8px}
.order-card{background:var(--card);border:1px solid var(--border);
  border-radius:12px;overflow:hidden;cursor:pointer;
  transition:transform .15s,border-color .15s,box-shadow .15s}
.order-card:active{transform:scale(.98)}
.order-card.cod-highlight{border-color:var(--accent)66}
.order-card.holding{box-shadow:0 0 0 2.5px var(--accent);transform:scale(.99)}
.card-top{padding:13px;display:flex;align-items:flex-start;gap:10px}
.card-icon{width:42px;height:42px;border-radius:10px;
  background:linear-gradient(135deg,#f0a50022,#f0a50044);
  border:1px solid var(--accent)44;
  display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.card-body{flex:1;min-width:0}
.card-name{font-size:14px;font-weight:700;margin-bottom:3px;color:var(--text);display:block}
.card-phone{font-size:13px;color:var(--accent);font-family:monospace;font-weight:600}
.card-loc{font-size:12px;color:var(--muted);margin-top:3px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-item{font-size:12px;color:#aaa;margin-top:2px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-badge{font-size:11px;font-weight:700;padding:3px 8px;border-radius:6px;flex-shrink:0}
.badge-cod{background:#f0a50022;color:var(--accent);border:1px solid var(--accent)44}
.badge-paid{background:#22c55e22;color:var(--green);border:1px solid var(--green)44}
.card-divider{height:1px;background:var(--border);margin:0 12px}
.card-bottom{padding:9px 13px;display:flex;align-items:center;justify-content:space-between;gap:8px}
.card-price{font-size:15px;font-weight:700;color:var(--text)}
.card-date{font-size:11px;color:var(--muted)}
.btn-deliver{background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:#000;font-size:12px;font-weight:700;padding:8px 15px;border-radius:7px;
  border:none;cursor:pointer;transition:opacity .15s;white-space:nowrap}
.btn-deliver:disabled{opacity:.4;cursor:not-allowed}
.btn-done{background:#22c55e22;color:var(--green);border:1px solid var(--green)44;
  font-size:12px;font-weight:600;padding:8px 13px;border-radius:7px;cursor:default}
.btn-call{background:#3b82f622;color:var(--blue);border:1px solid #3b82f644;
  font-size:12px;font-weight:600;padding:8px 13px;border-radius:7px;
  text-decoration:none;display:inline-flex;align-items:center;gap:4px;cursor:pointer;border:none}
.empty{text-align:center;padding:50px 20px;color:var(--muted)}
.empty-icon{font-size:44px;margin-bottom:12px}
.empty h3{font-size:16px;margin-bottom:6px;color:var(--text)}
.empty p{font-size:13px;line-height:1.5}
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;
  position:fixed;inset:0;top:calc(var(--hdr-h) + var(--sat));
  gap:14px;color:var(--muted);font-size:14px;
  background:var(--bg);z-index:10;pointer-events:none}
.loading-sm{position:relative;inset:auto;min-height:120px;background:transparent;z-index:auto}
.spinner{width:36px;height:36px;border:3px solid var(--border);
  border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:24px;left:50%;
  transform:translateX(-50%) translateY(100px);
  background:var(--green);color:#000;font-size:14px;font-weight:600;
  padding:13px 22px;border-radius:12px;transition:transform .3s;z-index:900;
  white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.4)}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.error{background:var(--red);color:#fff}
.hold-ring{position:fixed;inset:0;pointer-events:none;z-index:800;
  display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .1s}
.hold-ring.on{opacity:1}
.hold-ring-inner{width:70px;height:70px;border-radius:50%;
  border:3px solid var(--accent);background:rgba(240,165,0,.15);
  display:flex;align-items:center;justify-content:center;
  font-size:22px;animation:hold-pulse .6s ease infinite alternate}
@keyframes hold-pulse{from{transform:scale(1)}to{transform:scale(1.15)}}

/* ── Alert popup (success/review) ── */
.alert-popup-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:500;
  display:flex;align-items:center;justify-content:center;padding:20px;
  opacity:0;pointer-events:none;transition:opacity .2s}
.alert-popup-overlay.on{opacity:1;pointer-events:all}
.alert-popup-box{background:var(--surface);border-radius:20px;padding:28px 22px;
  width:100%;max-width:300px;text-align:center;
  transform:scale(.88);transition:transform .22s cubic-bezier(.4,0,.2,1)}
.alert-popup-overlay.on .alert-popup-box{transform:scale(1)}
.alert-popup-icon{font-size:52px;margin-bottom:10px}
.alert-popup-title{font-size:18px;font-weight:800;margin-bottom:8px}
.alert-popup-sub{font-size:14px;color:var(--muted);line-height:1.6;margin-bottom:22px}
.alert-popup-btn{width:100%;padding:14px;border:none;border-radius:12px;
  font-size:15px;font-weight:700;cursor:pointer}
.alert-popup-btn.green{background:linear-gradient(135deg,var(--green),#16a34a);color:#fff}
.alert-popup-btn.amber{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#000}

/* LOGIN */
.login-box{background:var(--card);border:1px solid var(--accent)44;
  border-radius:16px;padding:24px;text-align:center;width:100%;max-width:340px}
.login-box h3{font-size:17px;font-weight:700;color:var(--accent);margin-bottom:6px}
.login-box p{font-size:13px;color:var(--muted);margin-bottom:16px}
.login-input{width:100%;padding:13px;border-radius:10px;
  border:1px solid var(--border);background:var(--surface);color:var(--text);
  font-size:16px;margin-bottom:10px;text-align:center}
.login-input:focus{outline:none;border-color:var(--accent)}
.login-input.input-error{border-color:var(--red)!important;animation:shake .3s}
@keyframes shake{0%,100%{transform:none}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
.login-btn{width:100%;padding:13px;background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:#000;border:none;border-radius:10px;font-size:16px;font-weight:700;cursor:pointer}
.login-btn:disabled{opacity:.5;cursor:not-allowed}
.pw-wrap{position:relative;margin-bottom:10px}
.pw-wrap .login-input{margin-bottom:0;padding-right:44px}
.pw-eye{position:absolute;right:12px;top:50%;transform:translateY(-50%);
  background:none;border:none;cursor:pointer;color:var(--muted);font-size:16px}
.input-hint{font-size:12px;color:var(--muted);margin-bottom:10px;text-align:left;padding-left:4px}
.profile{margin:10px;background:var(--card);border:1px solid var(--border);
  border-radius:12px;padding:12px;display:flex;align-items:center;gap:10px;cursor:pointer}
.profile:hover{border-color:var(--accent)66}
.profile-av{width:42px;height:42px;background:linear-gradient(135deg,var(--accent),var(--accent2));
  border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:19px;font-weight:700;color:#000;flex-shrink:0;overflow:hidden}
.profile-av img{width:100%;height:100%;object-fit:cover}
.profile-name{font-size:15px;font-weight:600}
.profile-phone{font-size:12px;color:var(--accent);font-family:monospace}
.profile-role{margin-left:auto;font-size:11px;font-weight:700;padding:3px 8px;
  border-radius:6px;background:var(--accent)22;color:var(--accent);border:1px solid var(--accent)44}
.profile-page{position:fixed;inset:0;background:var(--bg);z-index:150;
  transform:translateX(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);
  overflow-y:auto;padding-bottom:80px}
.profile-page.on{transform:none}
.pp-back{position:sticky;top:0;background:rgba(15,15,15,.9);backdrop-filter:blur(8px);
  padding:12px 16px;display:flex;align-items:center;gap:10px;z-index:10}
.pp-back-btn{width:36px;height:36px;background:var(--surface);border:none;
  border-radius:50%;cursor:pointer;color:var(--text);font-size:19px;
  display:flex;align-items:center;justify-content:center}
.pp-avatar-wrap{position:relative;display:flex;flex-direction:column;align-items:center;
  padding-top:24px;padding-bottom:4px;cursor:pointer}
.pp-avatar{width:96px;height:96px;border-radius:50%;border:3px solid var(--accent)44;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  display:flex;align-items:center;justify-content:center;
  font-size:38px;font-weight:700;color:#000;overflow:hidden;position:relative}
.pp-avatar img{width:100%;height:100%;object-fit:cover}
.pp-avatar-cam{position:absolute;bottom:0;left:0;right:0;
  background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;
  padding:5px;font-size:16px;color:#fff}
.pp-change-photo{display:block;text-align:center;margin-top:8px;color:var(--accent);
  font-size:14px;font-weight:600;background:none;border:none;cursor:pointer;padding:4px}
.pp-info{text-align:center;padding:8px 20px 16px}
.pp-name{font-size:23px;font-weight:800;margin-bottom:4px}
.pp-username{font-size:14px;color:var(--muted);margin-bottom:10px}
.pp-bio{font-size:14px;color:var(--text);line-height:1.6;margin-bottom:12px;
  max-width:280px;margin-left:auto;margin-right:auto}
.pp-link{display:inline-flex;align-items:center;gap:6px;color:var(--accent);
  font-size:14px;font-weight:600;cursor:pointer;
  background:var(--accent)11;padding:6px 14px;border-radius:20px;
  border:1px solid var(--accent)33;text-decoration:none}
.pp-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;
  background:var(--border);margin:16px 0}
.pp-stat{background:var(--surface);padding:17px 8px;text-align:center}
.pp-stat-num{font-size:25px;font-weight:800;color:var(--accent)}
.pp-stat-lbl{font-size:11px;color:var(--muted);margin-top:4px}
.pp-logout{margin:0 16px 16px;padding:15px;background:var(--red)22;color:var(--red);
  border:1px solid var(--red)44;border-radius:12px;font-size:15px;font-weight:700;
  cursor:pointer;width:calc(100% - 32px);display:flex;align-items:center;
  justify-content:center;gap:8px}
.pp-logout:hover{background:var(--red)44}
.pp-divider{height:1px;background:var(--border);margin:0 16px 16px}

/* invoice */
.invoice-overlay{position:fixed;inset:0;background:#fff;color:#000;z-index:600;
  overflow-y:auto;display:none;-webkit-overflow-scrolling:touch}
.invoice-overlay.on{display:block}
.inv-toolbar{position:sticky;top:0;background:#f5f5f5;
  padding:8px 12px;display:flex;gap:8px;align-items:center;
  border-bottom:1px solid #ddd;z-index:1}
@media print{
  body>*:not(#invoice-overlay){display:none!important}
  #invoice-overlay{display:block!important;position:static!important;overflow:visible!important}
  .inv-toolbar{display:none!important}
  #invoice-content{padding:0!important}
}

/* ── STOCK ── */
.stock-overlay{position:fixed;inset:0;z-index:130;
  background:transparent;pointer-events:none;transition:background .3s}
.stock-overlay.on{background:rgba(0,0,0,.72);pointer-events:all}
.stock-sheet{position:fixed;top:var(--sat);left:0;right:0;bottom:0;
  background:var(--bg);border-radius:16px 16px 0 0;display:flex;flex-direction:column;
  transform:translateY(105%);transition:transform .38s cubic-bezier(0.32,0.72,0,1);z-index:131}
.stock-overlay.on .stock-sheet{transform:none}
.sht-handle{width:36px;height:5px;background:var(--border);border-radius:3px;
  margin:10px auto 0;flex-shrink:0;cursor:grab;touch-action:none}
.sht-head{padding:14px 16px 12px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:10px;flex-shrink:0;cursor:grab;user-select:none}
.sht-title{font-size:16px;font-weight:700;flex:1}
.sht-body{overflow-y:auto;flex:1;-webkit-overflow-scrolling:touch;overscroll-behavior:contain}
.stk-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--border);border-bottom:1px solid var(--border)}
.stk-stat{background:var(--surface);padding:10px 8px;text-align:center}
.stk-stat-n{font-size:19px;font-weight:800;color:var(--accent)}
.stk-stat-n.danger{color:var(--red)}
.stk-stat-n.ok{color:var(--green)}
.stk-stat-l{font-size:11px;color:var(--muted);margin-top:1px}
.stk-search-bar{padding:10px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.stk-search-inp{flex:1;background:var(--card);border:1px solid var(--border);
  border-radius:9px;padding:9px 12px;color:var(--text);font-size:14px;outline:none;transition:border-color .2s}
.stk-search-inp:focus{border-color:var(--accent)}
.stk-add-btn{width:38px;height:38px;background:linear-gradient(135deg,var(--accent),var(--accent2));
  border:none;border-radius:10px;font-size:20px;color:#000;font-weight:700;
  display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:transform .15s}
.stk-add-btn:active{transform:scale(.9)}
.prod-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:12px}
.prod-card{background:var(--card);border:1.5px solid var(--border);
  border-radius:14px;overflow:hidden;cursor:pointer;position:relative;transition:transform .15s,border-color .2s}
.prod-card:active{transform:scale(.97)}
.prod-card.low{border-color:rgba(239,68,68,.55)}
.prod-card.out{border-color:rgba(239,68,68,.9)}
.prod-img{width:100%;aspect-ratio:1/1;display:flex;align-items:center;justify-content:center;
  font-size:32px;position:relative;overflow:hidden}
.prod-img img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0}
.prod-add{position:absolute;top:8px;right:8px;width:26px;height:26px;
  background:var(--accent);color:#000;border:none;border-radius:50%;
  font-size:18px;line-height:1;font-weight:700;display:flex;align-items:center;justify-content:center;
  cursor:pointer;z-index:2;transition:transform .15s,background .15s}
.prod-add:active{transform:scale(.85)}
.prod-low-tag{position:absolute;top:8px;left:8px;z-index:2;background:rgba(239,68,68,.9);color:#fff;font-size:9px;font-weight:700;padding:2px 6px;border-radius:5px;letter-spacing:.3px}
.prod-out-tag{position:absolute;top:8px;left:8px;z-index:2;background:rgba(239,68,68,1);color:#fff;font-size:9px;font-weight:700;padding:2px 6px;border-radius:5px}
.prod-info{padding:9px 10px 10px}
.prod-name{font-size:13px;font-weight:700;margin-bottom:3px;overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;line-height:1.3}
.prod-price{font-size:13px;font-weight:700;color:var(--accent);margin-bottom:6px}
.prod-qty-row{display:flex;align-items:center;justify-content:space-between;gap:4px}
.prod-qty{font-size:15px;font-weight:800;color:var(--text)}
.prod-qty.low{color:var(--red)}
.prod-qty.ok{color:var(--green)}
.prod-min{font-size:11px;color:var(--muted)}
.prod-bar-wrap{height:3px;background:var(--border);border-radius:2px;margin-top:5px;overflow:hidden}
.prod-bar{height:100%;border-radius:2px;transition:width .3s}
.stk-orders-section{border-top:1px solid var(--border);padding:12px}
.stk-orders-ttl{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px}
.stk-order-row{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 12px;margin-bottom:8px;display:flex;align-items:center;gap:10px}
.stk-order-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

/* ── MOVEMENT ── */
.mv-overlay{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.72);
  opacity:0;pointer-events:none;transition:opacity .25s}
.mv-overlay.on{opacity:1;pointer-events:all}
.mv-sheet{position:absolute;bottom:0;left:0;right:0;background:var(--surface);
  border-radius:22px 22px 0 0;padding-bottom:max(env(safe-area-inset-bottom,16px),16px);
  transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1)}
.mv-overlay.on .mv-sheet{transform:none}
.mv-handle{width:36px;height:5px;background:var(--border);border-radius:3px;margin:10px auto 6px}
.mv-head{padding:10px 16px 14px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.mv-head-left{flex:1;min-width:0}
.mv-head-title{font-size:15px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mv-head-sub{font-size:12px;color:var(--muted);margin-top:2px}
.mv-body{padding:16px}
.mv-types{display:flex;gap:8px;margin-bottom:18px}
.mv-type{flex:1;padding:11px 4px;border:1.5px solid var(--border);border-radius:12px;
  background:var(--card);color:var(--muted);font-size:13px;font-weight:700;cursor:pointer;text-align:center;transition:all .18s}
.mv-type.t-in{border-color:var(--green);background:rgba(34,197,94,.13);color:var(--green)}
.mv-type.t-out{border-color:var(--red);background:rgba(239,68,68,.13);color:var(--red)}
.mv-type.t-adj{border-color:var(--blue);background:rgba(59,130,246,.13);color:var(--blue)}
.mv-fld{margin-bottom:14px}
.mv-lbl{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:7px}
.mv-inp{width:100%;padding:13px 14px;background:var(--card);border:1.5px solid var(--border);border-radius:12px;color:var(--text);font-size:16px;outline:none;transition:border-color .2s}
.mv-inp:focus{border-color:var(--accent)}
.mv-qty-wrap{position:relative}
.mv-qty-inp{padding-right:80px}
.mv-qty-result{position:absolute;right:12px;top:50%;transform:translateY(-50%);font-size:12px;font-weight:700;color:var(--muted);pointer-events:none}
.mv-submit{width:100%;padding:15px;border:none;border-radius:14px;font-size:16px;font-weight:700;cursor:pointer;transition:opacity .15s,background .2s;margin-top:4px}
.mv-submit:disabled{opacity:.45;cursor:not-allowed}
.mv-submit.s-in{background:linear-gradient(135deg,var(--green),#16a34a);color:#fff}
.mv-submit.s-out{background:linear-gradient(135deg,var(--red),#b91c1c);color:#fff}
.mv-submit.s-adj{background:linear-gradient(135deg,var(--blue),#1d4ed8);color:#fff}

/* ══════════════════════════════════════
   STEP POPUP — v2 (complete rebuild)
   ══════════════════════════════════════ */
.step-overlay{position:fixed;inset:0;z-index:160;background:transparent;pointer-events:none;transition:background .3s}
.step-overlay.on{background:rgba(0,0,0,.82);pointer-events:all}
.step-sht{position:fixed;top:var(--sat);left:0;right:0;bottom:0;background:var(--bg);
  border-radius:16px 16px 0 0;display:flex;flex-direction:column;
  transform:translateY(105%);transition:transform .38s cubic-bezier(0.32,0.72,0,1);z-index:161}
.step-overlay.on .step-sht{transform:none}
.step-handle{width:36px;height:5px;background:var(--border);border-radius:3px;margin:10px auto 0;flex-shrink:0;touch-action:none;cursor:grab}
.step-ind{display:flex;align-items:center;justify-content:center;padding:11px 20px 2px}
.si-dot{width:8px;height:8px;border-radius:50%;background:var(--border);transition:all .25s;flex-shrink:0}
.si-dot.active{width:24px;border-radius:4px;background:var(--accent)}
.si-dot.done{background:var(--green)}
.si-line{flex:1;max-width:28px;height:2px;background:var(--border);transition:background .25s}
.si-line.done{background:var(--green)}
.step-num-lbl{font-size:10px;color:var(--muted);text-align:center;padding:3px 0 6px;letter-spacing:.3px}
.step-hd{padding:10px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0}
.step-hd-l{min-width:0;flex:1}
.step-hd-ttl{font-size:15px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.step-hd-sub{font-size:11px;color:var(--muted);margin-top:1px}
.step-body{overflow-y:auto;flex:1;padding:14px 16px;-webkit-overflow-scrolling:touch;overscroll-behavior:contain}
.step-ft{padding:10px 14px max(env(safe-area-inset-bottom,12px),12px);border-top:1px solid var(--border);display:flex;gap:7px;flex-shrink:0}
.ft-back{padding:12px 14px;background:var(--surface);color:var(--muted);border:1px solid var(--border);border-radius:11px;font-size:13px;font-weight:600;cursor:pointer;flex-shrink:0;white-space:nowrap;transition:background .15s}
.ft-back:active{background:var(--card)}
.ft-next{flex:1;padding:12px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#000;border:none;border-radius:11px;font-size:14px;font-weight:700;cursor:pointer;transition:opacity .15s}
.ft-next:disabled{background:var(--border);color:var(--muted);cursor:not-allowed;opacity:.6}
.ft-skip{padding:12px 10px;background:var(--surface);color:var(--muted);border:1px solid var(--border);border-radius:11px;font-size:12px;font-weight:600;cursor:pointer;flex-shrink:0;white-space:nowrap}
.ft-confirm{flex:1;padding:12px;background:linear-gradient(135deg,var(--green),#16a34a);color:#fff;border:none;border-radius:11px;font-size:14px;font-weight:700;cursor:pointer;transition:opacity .15s}
.ft-confirm:disabled{opacity:.4;cursor:not-allowed}

/* step shared pieces */
.s-lbl{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.7px;margin:0 0 8px}
.d2-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:14px}
.d2-cell{background:var(--card);border-radius:9px;padding:10px 11px;border:1px solid var(--border)}
.d2-cell.full{grid-column:1/-1}
.d2-k{font-size:10px;color:var(--muted);margin-bottom:3px}
.d2-v{font-size:13px;font-weight:600;color:var(--text)}
.d2-v.acc{color:var(--accent)}
.d2-v.grn{color:var(--green)}
.d2-v.tg-link{color:var(--blue);cursor:pointer;border-bottom:1px dotted var(--blue)55;display:inline-block}
.lock-banner{background:var(--accent)0c;border:1px dashed rgba(240,165,0,.3);border-radius:9px;padding:9px 12px;font-size:12px;color:var(--muted);text-align:center}

/* step2 inputs */
.s2-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.s2-lbl{font-size:11px;color:var(--muted);margin-bottom:5px;font-weight:600}
.s2-inp{width:100%;padding:12px 13px;background:var(--card);border:1.5px solid var(--border);border-radius:10px;color:var(--text);font-size:15px;outline:none;transition:border-color .2s}
.s2-inp:focus{border-color:var(--accent)}
.s2-inp.bot-locked{border-color:rgba(34,197,94,.45);color:var(--green);background:rgba(34,197,94,.06)}
.s2-inp.s2-err{border-color:rgba(239,68,68,.7)!important;background:rgba(239,68,68,.05)}
.s2-inp:disabled{opacity:.55;cursor:not-allowed}
.bot-row{display:flex;align-items:center;gap:8px;padding:8px 11px;border-radius:9px;margin-bottom:14px;font-size:12px;font-weight:600}
.bot-ok{background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.25);color:var(--green)}
.bot-wait{background:rgba(240,165,0,.1);border:1px solid rgba(240,165,0,.25);color:var(--accent)}
.bot-none{background:var(--card);border:1px solid var(--border);color:var(--muted)}

/* delivery fee validation hint */
.fee-hint{font-size:10px;margin-top:4px;padding:0 2px}
.fee-hint.err{color:var(--red)}
.fee-hint.ok{color:var(--green)}

/* tracking checkbox row */
.track-check-row{display:flex;align-items:center;gap:10px;padding:10px 12px;
  background:var(--card);border:1.5px solid var(--border);border-radius:10px;
  cursor:pointer;transition:border-color .2s;user-select:none;margin-bottom:12px}
.track-check-row.checked{border-color:rgba(34,197,94,.5);background:rgba(34,197,94,.06)}
.track-cb{width:20px;height:20px;border-radius:5px;border:2px solid var(--border);
  background:var(--surface);display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:all .18s}
.track-check-row.checked .track-cb{background:var(--green);border-color:var(--green)}
.track-cb-check{color:#fff;font-size:13px;font-weight:700;display:none}
.track-check-row.checked .track-cb-check{display:block}
.track-inp-wrap{flex:1}
.track-inp-lbl{font-size:11px;color:var(--muted);margin-bottom:2px;font-weight:600}
.track-inp-val{font-size:14px;font-weight:600;color:var(--text)}
.track-inp-val.placeholder{color:var(--muted);font-style:italic;font-size:12px}
.track-inp-edit{font-size:11px;color:var(--accent);margin-top:2px}

/* discount toggle row */
.discount-row{display:flex;align-items:center;gap:10px;padding:10px 12px;
  background:var(--card);border:1.5px solid var(--border);border-radius:10px;
  cursor:pointer;transition:border-color .2s;user-select:none;margin-bottom:8px}
.discount-row.on{border-color:rgba(34,197,94,.5);background:rgba(34,197,94,.06)}
.disc-toggle{width:34px;height:18px;background:var(--border);border-radius:9px;
  position:relative;transition:background .18s;flex-shrink:0}
.discount-row.on .disc-toggle{background:var(--green)}
.disc-thumb{width:14px;height:14px;background:#fff;border-radius:50%;
  position:absolute;top:2px;left:2px;transition:left .18s;box-shadow:0 1px 3px rgba(0,0,0,.3)}
.discount-row.on .disc-thumb{left:18px}
.disc-label{flex:1}
.disc-label-title{font-size:13px;font-weight:600;color:var(--text)}
.disc-label-sub{font-size:11px;color:var(--muted);margin-top:1px}
.disc-val{font-size:14px;font-weight:700;color:var(--green)}

/* calc table */
.calc-tbl{background:var(--card);border-radius:10px;overflow:hidden;border:1px solid var(--border);margin-top:10px}
.calc-r{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;border-bottom:1px solid var(--border);font-size:13px}
.calc-r:last-child{border-bottom:none;background:var(--surface)}
.calc-lbl2{color:var(--muted)}
.calc-val2{font-weight:600;color:var(--text)}
.calc-val2.acc{color:var(--accent);font-size:15px;font-weight:800}
.calc-val2.grn{color:var(--green)}

/* upload invoice in step2 */
.upload-zone{border:2px dashed var(--border);border-radius:12px;padding:16px 14px;text-align:center;cursor:pointer;transition:all .2s;margin-top:10px}
.upload-zone:active{background:var(--card)}
.upload-zone.has-img{border:1.5px solid rgba(34,197,94,.4);border-style:solid;padding:8px;background:rgba(34,197,94,.04)}
.upload-zone.locked{pointer-events:none;opacity:.7}
.upload-ico{font-size:26px;margin-bottom:5px}
.upload-lbl{font-size:13px;font-weight:600;color:var(--muted)}
.upload-sub2{font-size:11px;color:var(--muted);margin-top:2px}
.upload-preview{width:100%;border-radius:8px;object-fit:cover;max-height:140px;display:block}
.upload-change-lbl{font-size:11px;color:var(--accent);margin-top:5px;text-align:center}

/* step3 */
.pay-type-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.pay-radio-lbl{cursor:pointer}
.pay-radio-lbl input{position:absolute;opacity:0;width:0;height:0;pointer-events:none}
.pay-radio-lbl input:checked~.pay-card-body{border-color:var(--accent);background:rgba(240,165,0,.07)}
.pay-card-body{background:var(--card);border:2px solid var(--border);border-radius:13px;padding:14px 10px;text-align:center;transition:all .18s;display:flex;flex-direction:column;align-items:center;gap:5px}
.pay-card-body:active{transform:scale(.97)}
.pay-card-ico{font-size:26px}
.pay-card-lbl{font-size:13px;font-weight:700;color:var(--text)}
.pay-card-sub{font-size:10px;color:var(--muted)}
.bank-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:4px;margin-bottom:12px}
.bank-scroll::-webkit-scrollbar{display:none}
.bank-row2{display:flex;gap:8px;width:max-content;padding:2px 0}
.bank-chip2{display:flex;flex-direction:column;align-items:center;gap:4px;padding:8px 11px;
  border-radius:11px;background:var(--card);border:1.5px solid var(--border);
  cursor:pointer;transition:all .18s;flex-shrink:0;min-width:60px;
  -webkit-tap-highlight-color:transparent}
.bank-chip2:active{transform:scale(.93)}
.bank-chip2.sel{border-color:var(--accent);background:rgba(240,165,0,.08);box-shadow:0 0 0 2px rgba(240,165,0,.2)}
.bank-logo-circle{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;letter-spacing:-.3px}
.bank-chip2-name{font-size:10px;font-weight:700;color:var(--muted)}
.bank-chip2.sel .bank-chip2-name{color:var(--accent)}
.khqr-box{background:var(--card);border-radius:12px;padding:16px;text-align:center;border:1px solid var(--border);margin-bottom:10px}
.khqr-qr{width:130px;height:130px;margin:0 auto 10px;background:var(--surface);border-radius:10px;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;overflow:hidden}
.khqr-qr img{width:100%;height:100%;object-fit:contain;border-radius:8px}
.khqr-amt{font-size:22px;font-weight:800;color:var(--accent)}
.khqr-sub2{font-size:12px;color:var(--muted);margin-top:2px}
.khqr-badge{display:inline-flex;align-items:center;gap:5px;margin-top:8px;padding:5px 13px;border-radius:20px;font-size:12px;font-weight:700}
.kb-wait{background:rgba(240,165,0,.12);color:var(--accent);border:1px solid rgba(240,165,0,.28)}
.kb-done{background:rgba(34,197,94,.12);color:var(--green);border:1px solid rgba(34,197,94,.28)}
.amt-row{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.amt-prefix{font-size:22px;font-weight:800;color:var(--accent)}
.amt-inp{flex:1;background:var(--card);border:1.5px solid var(--border);border-radius:10px;padding:12px 14px;color:var(--text);font-size:20px;font-weight:700;outline:none;transition:border-color .2s}
.amt-inp:focus{border-color:var(--accent)}
.amt-inp:disabled{opacity:.6;cursor:not-allowed;border-color:var(--green)44}
.apv-bar{display:flex;align-items:center;justify-content:space-between;background:var(--card);border-radius:9px;padding:9px 12px;margin-top:8px;border:1px solid var(--border)}
.apv-l{font-size:10px;color:var(--muted)}
.apv-c{font-size:14px;font-weight:800;color:var(--accent);font-family:monospace}
.apv-cp{font-size:10px;color:var(--blue);background:rgba(59,130,246,.12);border:1px solid rgba(59,130,246,.25);border-radius:5px;padding:3px 8px;cursor:pointer}
.tl-wrap{position:relative;padding-left:18px}
.tl-wrap::before{content:'';position:absolute;left:5px;top:8px;bottom:8px;width:2px;background:var(--border)}
.tl-item2{position:relative;padding:0 0 13px 13px}
.tl-item2:last-child{padding-bottom:0}
.tl-d{position:absolute;left:-14px;top:2px;width:10px;height:10px;border-radius:50%;background:var(--border);border:2.5px solid var(--bg)}
.tl-d.done{background:var(--green)}
.tl-d.cur{background:var(--accent)}
.tl-strong{display:block;font-size:12px;font-weight:700;color:var(--text);margin-bottom:1px}
.tl-txt2{font-size:12px;color:var(--muted)}
.paid-lock-banner{background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.25);border-radius:10px;padding:11px 14px;text-align:center;font-size:14px;font-weight:700;color:var(--green);margin-bottom:14px}
.confirm-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:300;
  display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .2s;padding:20px}
.confirm-overlay.on{opacity:1;pointer-events:all}
.confirm-box{background:var(--surface);border-radius:16px;padding:24px;
  width:100%;max-width:320px;text-align:center;
  transform:scale(.9);transition:transform .2s}
.confirm-overlay.on .confirm-box{transform:scale(1)}
.confirm-icon{font-size:40px;margin-bottom:12px}
.confirm-title{font-size:17px;font-weight:700;margin-bottom:8px}
.confirm-sub{font-size:14px;color:var(--muted);line-height:1.5;margin-bottom:20px}
.confirm-btns{display:flex;gap:10px}
.confirm-btn{flex:1;padding:13px;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;transition:opacity .15s}
.confirm-btn:hover{opacity:.85}
.confirm-yes{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#000}
.confirm-no{background:var(--border);color:var(--text)}
</style>
</head>
<body>

<div class="hdr" id="main-hdr">
  <div class="hdr-logo" onclick="refreshOrders(true)">YB</div>
  <div class="hdr-info" onclick="refreshOrders(true)">
    <h1>YB Shipper</h1>
    <p id="hdr-sub"></p>
  </div>
  <div class="hdr-actions" id="hdr-actions" style="display:none">
    <input class="hdr-search" id="hdr-search-inp" placeholder="🔍 ស្វែងរក..."
      oninput="debounceSearch(this.value)" onsearch="debounceSearch(this.value)">
    <div class="hdr-badge" id="pending-count">0</div>
  </div>
</div>

<div class="new-order-alert hidden" id="new-alert" onclick="dismissAlert()">
  🔔 <span id="new-alert-txt">មានការដឹកថ្មី!</span> — ចុចដើម្បីមើល
</div>

<div id="app-content">
  <div class="loading"><div class="spinner"></div>កំពុងផ្ទុក...</div>
</div>

<div class="toast" id="toast"></div>
<div class="hold-ring" id="hold-ring"><div class="hold-ring-inner">🧾</div></div>

<!-- Alert popup (payment confirm / review) -->
<div class="alert-popup-overlay" id="alert-popup-overlay">
  <div class="alert-popup-box">
    <div class="alert-popup-icon" id="alert-popup-icon">✅</div>
    <div class="alert-popup-title" id="alert-popup-title"></div>
    <div class="alert-popup-sub" id="alert-popup-sub"></div>
    <button class="alert-popup-btn" id="alert-popup-btn" onclick="closeAlertPopup()">យល់ព្រម</button>
  </div>
</div>

<!-- Confirm delivery -->
<div class="confirm-overlay" id="confirm-overlay">
  <div class="confirm-box">
    <div class="confirm-icon">🚚</div>
    <div class="confirm-title">បញ្ជាក់ការដឹក</div>
    <div class="confirm-sub" id="confirm-sub">ដឹកដល់អតិថិជននេះហើយ?</div>
    <div class="confirm-btns">
      <button class="confirm-btn confirm-no" onclick="closeConfirm()">បោះបង់</button>
      <button class="confirm-btn confirm-yes" id="confirm-yes-btn">✅ បញ្ជាក់</button>
    </div>
  </div>
</div>

<div class="profile-page" id="profile-page">
  <div class="pp-back">
    <button class="pp-back-btn" onclick="closeProfile()">←</button>
    <span style="font-size:16px;font-weight:700">Profile</span>
  </div>
  <div id="pp-content"><div class="loading loading-sm"><div class="spinner"></div></div></div>
</div>

<div class="invoice-overlay" id="invoice-overlay">
  <div class="inv-toolbar">
    <button onclick="closeInvoiceOverlay()" style="padding:8px 14px;background:#333;color:#fff;border:none;border-radius:6px;font-size:13px;cursor:pointer">← Back</button>
    <button onclick="window.print()" style="padding:8px 18px;background:#f0a500;border:none;border-radius:6px;font-weight:700;font-size:13px;cursor:pointer">🖨️ Print</button>
    <button id="label-btn-inv" onclick="printLabel(_currentInvId)" style="padding:8px 14px;background:#3b82f6;color:#fff;border:none;border-radius:6px;font-size:13px;cursor:pointer">📦 Label</button>
  </div>
  <div id="invoice-content" style="padding:10px;font-family:'Battambang','Khmer OS Siemreap',sans-serif"></div>
</div>

<!-- STOCK -->
<div class="stock-overlay" id="stock-overlay" onclick="closeStockBg(event)">
  <div class="stock-sheet" id="stock-sheet">
    <div class="sht-handle" id="sht-handle"></div>
    <div class="sht-head" id="sht-head">
      <span class="sht-title">📦 ស្តុកទំនិញ</span>
      <button class="popup-close" onclick="closeStockSheet()" style="width:30px;height:30px;background:var(--border);border:none;border-radius:50%;cursor:pointer;color:var(--text);font-size:15px;display:flex;align-items:center;justify-content:center;touch-action:auto;pointer-events:auto;flex-shrink:0">✕</button>
    </div>
    <div class="sht-body" id="sht-body">
      <div class="loading loading-sm"><div class="spinner"></div></div>
    </div>
  </div>
</div>

<!-- MOVEMENT -->
<div class="mv-overlay" id="mv-overlay" onclick="closeMvBg(event)">
  <div class="mv-sheet" id="mv-sheet">
    <div class="mv-handle"></div>
    <div class="mv-head">
      <div class="mv-head-left">
        <div class="mv-head-title" id="mv-title">Stock Movement</div>
        <div class="mv-head-sub" id="mv-sub"></div>
      </div>
      <button style="width:30px;height:30px;background:var(--border);border:none;border-radius:50%;cursor:pointer;color:var(--text);font-size:15px;display:flex;align-items:center;justify-content:center;touch-action:auto;pointer-events:auto;flex-shrink:0" onclick="closeMv()">✕</button>
    </div>
    <div class="mv-body">
      <div class="mv-types">
        <button class="mv-type t-in" id="mvt-in" onclick="setMvType('in')">⬆️ ចូល</button>
        <button class="mv-type" id="mvt-out" onclick="setMvType('out')">⬇️ ចេញ</button>
        <button class="mv-type" id="mvt-adj" onclick="setMvType('adjust')">⚙️ កែ</button>
      </div>
      <div class="mv-fld">
        <div class="mv-lbl">ចំនួន</div>

<script>
const tg = window.Telegram.WebApp;
try {
  tg.expand();
  tg.setHeaderColor('#0f0f0f');
  tg.setBackgroundColor('#0f0f0f');
  if (typeof tg.requestFullscreen === 'function') tg.requestFullscreen();
} catch(_) {}

function _syncSat() {
  try {
    const top = tg.safeAreaInset?.top;
    if (top != null && top > 0)
      document.documentElement.style.setProperty('--sat', top + 'px');
  } catch(_) {}
}
try { tg.onEvent('fullscreenChanged', _syncSat); tg.onEvent('safeAreaChanged', _syncSat); } catch(_) {}
setTimeout(_syncSat, 300);

const user   = tg.initDataUnsafe?.user || {};
const tgId   = String(user.id || '');
const tgName = ((user.first_name||'') + ' ' + (user.last_name||'')).trim();

let shipperData  = null;
let allOrders    = [];
let orders       = [];
let activeTab    = 'pending';
let codOnly      = false;
let lastCount    = -1;
let pollTimer    = null;
let visibleCount = 9;
const CHUNK      = 9;
let _searchAll   = '';
let _searchTimer = null;
let _currentInvId = null;

// ── SCROLL AUTO-HIDE HEADER ──────────────────────────────
let _lastScrollY = 0;
window.addEventListener('scroll', () => {
  const y = window.scrollY;
  const hdr = document.getElementById('main-hdr');
  if (!hdr) return;
  if (y > _lastScrollY + 6 && y > 60) hdr.classList.add('hdr-hidden');
  else if (y < _lastScrollY - 6)      hdr.classList.remove('hdr-hidden');
  _lastScrollY = y;
}, { passive: true });

// ── VALIDATION ────────────────────────────────────────────
const PH_MIN=9, PH_MAX=10, PW_MIN=4, PW_MAX=32;
function validatePhone(v) {
  const p=String(v||'').replace(/\D/g,'');
  if(!p)              return{ok:false,msg:'សូមបញ្ចូលលេខទូរស័ព្ទ'};
  if(p.length<PH_MIN) return{ok:false,msg:`លេខទូរស័ព្ទត្រូវ ${PH_MIN}-${PH_MAX} ខ្ទង់`};
  if(p.length>PH_MAX) return{ok:false,msg:`លេខទូរស័ព្ទត្រូវ ${PH_MIN}-${PH_MAX} ខ្ទង់`};
  if(!/^0/.test(p))   return{ok:false,msg:'ត្រូវចាប់ផ្តើមដោយ 0'};
  return{ok:true,value:p};
}
function validatePassword(v) {
  const p=String(v||'');
  if(!p||p.trim().length===0) return{ok:false,msg:'សូមបញ្ចូល Password'};
  if(p.length<PW_MIN)         return{ok:false,msg:`Password ត្រូវ ${PW_MIN}-${PW_MAX} តួ`};
  if(p.length>PW_MAX)         return{ok:false,msg:'Password ច្រើនពេក'};
  return{ok:true,value:p};
}
function sanitizeStr(v){return String(v||'').replace(/<[^>]*>/g,'').trim().substring(0,256);}
function e(v){
  return String(v||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
                       .replace(/"/g,'&quot;').replace(/'/g,'&#039;');
}
function fmtDate(v){
  if(!v)return'—';
  const s=String(v).trim();
  if(!s||s==='—')return'—';
  if(/^\d{2}\/\d{2}\/\d{4}/.test(s))return s.substring(0,16);
  const d=new Date(s);
  if(!isNaN(d)){
    return d.toLocaleString('en-GB',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit',timeZone:'Asia/Phnom_Penh'}).replace(',',' ');
  }
  return s.substring(0,20);
}
function callPhone(phone){
  const clean=String(phone||'').replace(/\D/g,'');
  if(!clean)return;
  try{ tg.openLink('tel:'+clean); }
  catch(_){ window.location.href='tel:'+clean; }
}
function gs(fn,arg){
  const data=arg!==undefined?encodeURIComponent(JSON.stringify(arg)):'';
  return fetch(`${API}?action=gs&fn=${fn}${data?'&data='+data:''}`)
    .then(r=>{if(!r.ok)throw new Error('HTTP '+r.status);return r.json();});
}

// ── SESSION ───────────────────────────────────────────────
const SESSION_TTL=12*60*60*1000;
function saveSession(d){
  try{localStorage.setItem('yb_shipper',JSON.stringify({
    phone:sanitizeStr(d.phone),name:sanitizeStr(d.name||'Shipper'),
    role:sanitizeStr(d.role||'shipper'),ts:Date.now()
  }));}catch(_){}
}
function loadSession(){
  try{
    const s=JSON.parse(localStorage.getItem('yb_shipper')||'{}');
    if(!s.phone)return null;
    if(Date.now()-(s.ts||0)>SESSION_TTL){localStorage.removeItem('yb_shipper');return null;}
    return s;
  }catch(_){return null;}
}
function clearSession(){try{localStorage.removeItem('yb_shipper');}catch(_){}}
function getLocalPhoto(){try{return localStorage.getItem('yb_shipper_photo')||'';}catch(_){return'';}}

// ── BOOT ──────────────────────────────────────────────────
const saved=loadSession();
if(tgId){
  gs('handleShipperLogin',tgId)
    .then(d=>{if(d.error){saved?bootWithData(saved):showPhoneLogin();}else{saveSession(d);bootWithData(d);}})
    .catch(()=>{saved?bootWithData(saved):showPhoneLogin();});
}else{saved?bootWithData(saved):showPhoneLogin();}

function showPhoneLogin(){
  document.getElementById('main-hdr').style.display='none';
  document.body.style.overflow='hidden';
  document.getElementById('app-content').innerHTML=`
    <div style="height:100dvh;background:#0f0f0f;display:flex;align-items:center;justify-content:center;padding:20px;padding-top:env(safe-area-inset-top)">
      <div class="login-box">
        <h3>🚚 YB Shipper Login</h3>
        <p>Phone + Password</p>
        <input id="phone-inp" class="login-input" type="tel"
          placeholder="Ex: 0769999380" maxlength="${PH_MAX}" autocomplete="tel"
          oninput="this.classList.remove('input-error')"
          onkeydown="if(event.key==='Enter')document.getElementById('pw-inp').focus()">
        <div class="input-hint">លេខ ${PH_MIN}-${PH_MAX} ខ្ទង់ ចាប់ដោយ 0</div>
        <div class="pw-wrap">
          <input id="pw-inp" class="login-input" type="password"
            placeholder="Password" maxlength="${PW_MAX}" autocomplete="current-password"
            oninput="this.classList.remove('input-error')"
            onkeydown="if(event.key==='Enter')loginByPhone()">
          <button class="pw-eye" onclick="togglePw()" tabindex="-1" id="pw-eye">👁</button>
        </div>
        <div class="input-hint">Password ${PW_MIN}-${PW_MAX} តួ</div>
        <button class="login-btn" id="login-btn" onclick="loginByPhone()">Login →</button>
      </div>
    </div>`;
  setTimeout(()=>document.getElementById('phone-inp')?.focus(),200);
}
function togglePw(){
  _pwVisible=!_pwVisible;
  const i=document.getElementById('pw-inp');if(i)i.type=_pwVisible?'text':'password';
  const ey=document.getElementById('pw-eye');if(ey)ey.textContent=_pwVisible?'🙈':'👁';
}
let _pwVisible=false;
async function loginByPhone(){
  const rawP=document.getElementById('phone-inp')?.value.trim()||'';
  const rawW=document.getElementById('pw-inp')?.value||'';
  const btn=document.getElementById('login-btn');
  const pv=validatePhone(rawP);
  if(!pv.ok){document.getElementById('phone-inp')?.classList.add('input-error');showToast('❌ '+pv.msg,true);return;}
  const wv=validatePassword(rawW);
  if(!wv.ok){document.getElementById('pw-inp')?.classList.add('input-error');showToast('❌ '+wv.msg,true);return;}
  if(btn){btn.disabled=true;btn.textContent='កំពុងផ្ទុក...';}
  try{
    const r=await gs('verifyLogin',{identifier:pv.value,password:wv.value});
    if(r.error){showToast('❌ '+sanitizeStr(r.error),true);document.getElementById('pw-inp')?.classList.add('input-error');if(btn){btn.disabled=false;btn.textContent='Login →';}return;}
    const role=String(r.role||'').toLowerCase();
    if(role!=='shipper'&&role!=='admin'){showToast('❌ គណនីនេះ មិនមែន Shipper',true);if(btn){btn.disabled=false;btn.textContent='Login →';}return;}
    saveSession(r);bootWithData(r);
  }catch(err){showToast('❌ '+sanitizeStr(err.message),true);if(btn){btn.disabled=false;btn.textContent='Login →';}}
}
function bootWithData(data){
  shipperData={phone:sanitizeStr(data.phone),name:sanitizeStr(data.name||'Shipper'),role:sanitizeStr(data.role||'shipper')};
  const role=(shipperData.role||'').toLowerCase();
  if(role&&role!=='shipper'&&role!=='admin'){clearSession();showPhoneLogin();return;}
  document.getElementById('main-hdr').style.display='flex';
  document.body.style.overflow='';
  document.getElementById('hdr-actions').style.display='flex';
  loadOrders();
}
function pushNotif(title,body){
  if(!('Notification' in window))return;
  try{if(Notification.permission==='granted')new Notification(title,{body});}catch(_){}
}
function doLogout(){
  stopPoll();clearSession();
  shipperData=null;allOrders=[];orders=[];lastCount=-1;_pwVisible=false;
  document.getElementById('hdr-actions').style.display='none';
  document.getElementById('pending-count').textContent='0';
  closeProfile();showPhoneLogin();
}

async function loadOrders(){
  document.getElementById('app-content').innerHTML=
    '<div class="loading"><div class="spinner"></div>កំពុងផ្ទើកទិន្ន័យ...</div>';
  try{
    const r=await gs('handleShipperOrders',shipperData?.phone||'');
    if(!Array.isArray(r)){if(r&&r.error)throw new Error(r.error);throw new Error('Invalid response');}
    allOrders=r;visibleCount=CHUNK;applyFilter();startPoll();
  }catch(err){showError('Load failed: '+sanitizeStr(err.message));}
}
async function refreshOrders(silent=false){
  if(!shipperData)return;
  try{
    const fresh=await gs('handleShipperOrders',shipperData.phone||'');
    if(!Array.isArray(fresh))return;
    const before=allOrders.filter(o=>!isCompleted(o)).length;
    allOrders=fresh;applyFilter();
    const after=allOrders.filter(o=>!isCompleted(o)).length;
    if(after>before)showAlert(`មានការដឹកថ្មី +${after-before}`);
    if(!silent)showToast('🔄 Updated!');
  }catch(_){if(!silent)showToast('❌ Refresh failed',true);}
}
function startPoll(){
  stopPoll();
  pollTimer=setInterval(async()=>{
    if(!shipperData)return;
    try{
      const fresh=await gs('handleShipperOrders',shipperData.phone||'');
      if(!Array.isArray(fresh))return;
      const newP=fresh.filter(o=>!isCompleted(o)).length;
      if(lastCount>=0&&newP>lastCount){
        showAlert(`មានការដឹកថ្មី +${newP-lastCount}`);
        pushNotif('🚚 YB Shipper',`មានការដឹកថ្មី +${newP-lastCount}`);
        try{tg.HapticFeedback.notificationOccurred('warning');}catch(_){}
      }
      lastCount=newP;allOrders=fresh;applyFilter();
    }catch(_){}
  },60000);
}
function stopPoll(){if(pollTimer){clearInterval(pollTimer);pollTimer=null;}}
function debounceSearch(v){
  _searchAll=(v||'').toLowerCase().trim();
  clearTimeout(_searchTimer);
  _searchTimer=setTimeout(()=>{visibleCount=CHUNK;applyFilter();},200);
}
function hasActiveSearch(){return !!_searchAll;}
function applyFilter(){
  let res=allOrders;
  if(codOnly)res=res.filter(o=>(o.payment||'').toLowerCase().includes('cod'));
  if(_searchAll){
    const q=_searchAll;
    res=res.filter(o=>
      (o.name||'').toLowerCase().includes(q)||(o.phone||'').toLowerCase().includes(q)||
      (o.location||'').toLowerCase().includes(q)||(o.ordered||'').toLowerCase().includes(q)||
      (o.pricing||'').toLowerCase().includes(q)||(o.retail||'').toLowerCase().includes(q)||
      (o.payment||'').toLowerCase().includes(q));
  }
  orders=res;renderAll();
}
function toggleCOD(){
  codOnly=!codOnly;visibleCount=CHUNK;
  const t=document.getElementById('cod-track');if(t)t.classList.toggle('on',codOnly);
  applyFilter();
}
function renderAll(){
  const pending=orders.filter(o=>!isCompleted(o));
  const completed=orders.filter(o=>isCompleted(o));
  lastCount=allOrders.filter(o=>!isCompleted(o)).length;
  document.getElementById('pending-count').textContent=pending.length;
  const searching=hasActiveSearch();
  const listToRender=searching?orders:(activeTab==='pending'?pending:completed);
  document.getElementById('app-content').innerHTML=`
    ${searching?'':renderProfileCard()}
    ${searching?'':`<div class="stats">
      <div class="stat"><div class="stat-num">${orders.length}</div><div class="stat-lbl">សរុប</div></div>
      <div class="stat"><div class="stat-num" style="color:var(--green)">${completed.length}</div><div class="stat-lbl">ដឹកដល់</div></div>
      <div class="stat"><div class="stat-num">${pending.length}</div><div class="stat-lbl">រង់ចាំ</div></div>
    </div>`}
    <div class="fbar">
      <span class="fbar-label">Filter${searching?` <span style="background:var(--accent);color:#000;font-size:9px;padding:1px 5px;border-radius:8px;font-weight:700">${orders.length}</span>`:''}</span>
      <label class="toggle" onclick="toggleCOD()">
        <div class="toggle-track ${codOnly?'on':''}" id="cod-track"><div class="toggle-thumb"></div></div>
        <span class="toggle-text">COD ប៉ុណ្ណោះ</span>
      </label>
    </div>
    ${searching?`<div style="padding:8px 12px;font-size:12px;color:var(--muted)">🔍 លទ្ធផល ${orders.length} — Search All</div>`:`<div class="tabs">
      <div class="tab ${activeTab==='pending'?'active':''}" onclick="setTab('pending')">🚚 រង់ចាំ (${pending.length})</div>
      <div class="tab ${activeTab==='completed'?'active':''}" onclick="setTab('completed')">✅ ដឹកដល់ (${completed.length})</div>
      <div class="tab" onclick="openStockSheet()">📦 ស្តុក</div>
    </div>`}
    <div class="orders" id="orders-list">${renderList(listToRender)}</div>`;
}
function renderProfileCard(){
  if(!shipperData)return'';
  const ini=(shipperData.name||'S').charAt(0).toUpperCase();
  const lp=getLocalPhoto();
  const avHtml=lp?`<img src="${lp}" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`:`${ini}`;
  return`<div class="profile" onclick="openProfile()">
    <div class="profile-av" id="mini-av">${avHtml}</div>
    <div>
      <div class="profile-name">${e(shipperData.name||tgName||'Shipper')}</div>
      <div class="profile-phone">${e(shipperData.phone||'—')}</div>
    </div>
    <div class="profile-role">SHIPPER ›</div>
  </div>`;
}
function renderList(list){
  if(!list.length)return`
    <div class="empty">
      <div class="empty-icon">${hasActiveSearch()?'🔍':activeTab==='pending'?'📭':'🎉'}</div>
      <h3>${hasActiveSearch()?'គ្មានលទ្ធផល':activeTab==='pending'?'គ្មានការដឹករង់ចាំ':'អបអរ! ដឹកគ្រប់ហើយ'}</h3>
      <p>${hasActiveSearch()?'ព្យាយាម keyword ផ្សេង':activeTab==='pending'?'ការដឹកថ្មីនឹងលេចនៅទីនេះ':'ប្រវត្តិការដឹកនឹងបង្ហាញនៅទីនេះ'}</p>
    </div>`;
  const visible=list.slice(0,visibleCount);
  const hasMore=list.length>visibleCount;
  const cards=visible.map(o=>{
    const isCod=(o.payment||'').toLowerCase().includes('cod');
    const done=isCompleted(o);
    const sid=e(o.profileId);
    return`
    <div class="order-card ${isCod?'cod-highlight':''}" data-pid="${sid}"
      onclick="cardClick(event,'${sid}')"
      ontouchstart="startHold(this,'${sid}')" ontouchend="endHold(event)" ontouchcancel="cancelHold()"
      onmousedown="startHold(this,'${sid}')" onmouseup="endHold(event)" onmouseleave="cancelHold()">
      <div class="card-top">
        <div class="card-icon">📦</div>
        <div class="card-body">
          <span class="card-name">${e(o.name||'FB User')}</span>
          <div class="card-phone" onclick="event.stopPropagation();callPhone('${e((o.phone||'').replace(/\D/g,''))}')" style="cursor:pointer">📞 ${e(o.phone||'—')}</div>
          <div class="card-loc">📍 ${e(o.location||'—')}</div>
          <div class="card-item">🏷️ ${e((o.ordered||'—').substring(0,42))}${(o.ordered||'').length>42?'…':''}</div>
        </div>
        <span class="card-badge ${isCod?'badge-cod':'badge-paid'}">${e(o.payment||'COD')}</span>
      </div>
      <div class="card-divider"></div>
      <div class="card-bottom">
        <div>
          <div class="card-price">$${e(o.pricing||o.retail||'—')}</div>
          <div class="card-date">${fmtDate(o.orderDate)}</div>
        </div>
        <div style="display:flex;gap:6px;align-items:center">
          <button class="btn-call" onclick="event.stopPropagation();callPhone('${e((o.phone||'').replace(/\D/g,''))}')">📞</button>
          ${done
            ?`<div class="btn-done">✅ ${e(o.receiveDate||'ដឹកដល់')}</div>`
            :`<button class="btn-deliver" onclick="event.stopPropagation();openOrderSteps('${sid}')">🚚 ជំហានបន្ទាប់</button>`}
        </div>
      </div>
    </div>`;
  }).join('');
  const sentinel=hasMore
    ?`<div id="scroll-sentinel" style="height:50px;display:flex;align-items:center;justify-content:center"><div class="spinner" style="width:22px;height:22px;border-width:2px"></div></div>`
    :'';
  setTimeout(()=>setupScrollObserver(list),100);
  return cards+sentinel;
}
function loadMore(){
  visibleCount+=CHUNK;
  const list=hasActiveSearch()?orders:(activeTab==='pending'?orders.filter(o=>!isCompleted(o)):orders.filter(o=>isCompleted(o)));
  document.getElementById('orders-list').innerHTML=renderList(list);
}
function setupScrollObserver(list){
  const s=document.getElementById('scroll-sentinel');if(!s)return;
  const io=new IntersectionObserver(entries=>{
    if(!entries[0].isIntersecting)return;
    if(visibleCount>=list.length){io.disconnect();return;}
    io.disconnect();loadMore();
  },{rootMargin:'120px'});
  io.observe(s);
}
function setTab(t){activeTab=t;visibleCount=CHUNK;renderAll();}
function isCompleted(o){return o.status==='Completed'||!!o.receiveDate;}

// ── HOLD (long press → invoice) ───────────────────────────
let _holdTimer=null,_holdEl=null,_holdFired=false;
function startHold(el,pid){
  cancelHold();_holdEl=el;_holdFired=false;
  const ring=document.getElementById('hold-ring');
  let count=0;
  _holdTimer=setInterval(()=>{
    count+=100;
    if(count>=300)el.classList.add('holding');
    if(count>=3000){
      clearInterval(_holdTimer);_holdTimer=null;_holdFired=true;
      el.classList.remove('holding');
      if(ring)ring.classList.add('on');
      try{tg.HapticFeedback.impactOccurred('heavy');}catch(_){}
      setTimeout(()=>{if(ring)ring.classList.remove('on');},500);
      openInvoice(pid);_holdEl=null;
    }
  },100);
}
function endHold(ev){if(_holdFired){ev&&ev.stopPropagation&&ev.stopPropagation();cancelHold();return;}cancelHold();}
function cancelHold(){
  clearInterval(_holdTimer);_holdTimer=null;
  if(_holdEl){_holdEl.classList.remove('holding');_holdEl=null;}
  const ring=document.getElementById('hold-ring');if(ring)ring.classList.remove('on');
}
function cardClick(ev,sid){if(_holdFired){_holdFired=false;ev.stopPropagation();return;}openOrderSteps(sid);}

// ── CONFIRM DELIVER (legacy simple) ──────────────────────
let _pid=null;
function askDeliver(profileId,name){
  if(!profileId)return;
  _pid=profileId;
  document.getElementById('confirm-sub').textContent=`ដឹកដល់ "${name}" ហើយ?`;
  document.getElementById('confirm-overlay').classList.add('on');
  document.getElementById('confirm-yes-btn').onclick=confirmDeliver;
}
function closeConfirm(){document.getElementById('confirm-overlay').classList.remove('on');_pid=null;}
async function confirmDeliver(){
  if(!_pid)return;

function handlePhotoUpload(ev){
  const file=ev.target.files[0];if(!file)return;
  if(!file.type.startsWith('image/')){showToast('❌ Images only',true);return;}
  if(file.size>3*1024*1024){showToast('❌ Max 3MB',true);return;}
  const r=new FileReader();
  r.onload=re=>{
    const durl=re.target.result;
    try{localStorage.setItem('yb_shipper_photo',durl);}catch(_){}
    const avImg=document.getElementById('pp-av-img');if(avImg){avImg.src=durl;avImg.style.display='';}
    const avIni=document.getElementById('pp-av-ini');if(avIni)avIni.style.display='none';
    const miniAv=document.getElementById('mini-av');
    if(miniAv)miniAv.innerHTML=`<img src="${durl}" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`;
    showToast('✅ Photo updated!');
  };
  r.readAsDataURL(file);
}

// stock sheet swipe
(function(){
  let sy=0,dy=0,drag=false;
  function isShtTarget(el){
    const h=document.getElementById('sht-handle');
    const hd=document.getElementById('sht-head');
    if(h&&h.contains(el))return true;
    if(hd&&hd.contains(el)){const cl=hd.querySelector('button');if(cl&&cl.contains(el))return false;return true;}
    return false;
  }
  document.addEventListener('touchstart',ev=>{
    if(isShtTarget(ev.target)){sy=ev.touches[0].clientY;drag=true;dy=0;const s=document.getElementById('stock-sheet');if(s)s.style.transition='none';}
  },{passive:true});
  document.addEventListener('touchmove',ev=>{
    if(!drag)return;dy=Math.max(0,ev.touches[0].clientY-sy);const s=document.getElementById('stock-sheet');if(s)s.style.transform=`translateY(${dy}px)`;
  },{passive:true});
  document.addEventListener('touchend',()=>{
    if(!drag)return;drag=false;const s=document.getElementById('stock-sheet');if(s)s.style.transition='';
    if(dy>80)closeStockSheet();else if(s)s.style.transform='';dy=0;
  });
})();

async function _loadStk(){
  const body=document.getElementById('sht-body');
  body.innerHTML='<div class="loading loading-sm"><div class="spinner"></div></div>';
  try{
    if(!shipperData?.phone)throw new Error('Not logged in');
    const res=await gs('getShipperProducts',{phone:shipperData.phone});
    if(res&&res.error)throw new Error(res.error);
    _stk=Array.isArray(res)?res:(res.products||[]);
    if(!_stk.length&&!Array.isArray(res)){
      // fallback: try passing phone directly
      const res2=await gs('getShipperProducts',shipperData.phone);
      if(Array.isArray(res2))_stk=res2;
    }
    _renderStk();
  }catch(err){
    document.getElementById('sht-body').innerHTML=`
      <div class="empty"><div class="empty-icon">⚠️</div><h3>Error</h3><p>${e(err.message)}</p>
        <button onclick="_loadStk()" style="margin-top:14px;padding:10px 22px;background:var(--accent);color:#000;border:none;border-radius:8px;font-weight:700;cursor:pointer">Retry</button></div>`;
  }
}
function _renderStk(){
  const body=document.getElementById('sht-body');
  const q=_stkSearch.toLowerCase().trim();
  const list=q?_stk.filter(p=>(p.name||'').toLowerCase().includes(q)):_stk;
  const total=_stk.length;
  const totalQty=_stk.reduce((s,p)=>s+parseInt(p.stock_qty||0),0);
  const lowCount=_stk.filter(p=>{const qty=parseInt(p.stock_qty||0);const mn=parseInt(p.min_stock||0);return mn>0&&qty<=mn;}).length;
  const grd=['linear-gradient(135deg,#f0a50028,#e05c0028)','linear-gradient(135deg,#3b82f628,#1d4ed828)','linear-gradient(135deg,#22c55e28,#16a34a28)','linear-gradient(135deg,#8b5cf628,#6d28d928)','linear-gradient(135deg,#f4372728,#dc262628)'];

    const qty=parseInt(p.stock_qty||0);const mn=parseInt(p.min_stock||0);
    const isLow=mn>0&&qty<=mn;const isOut=qty===0;
    const pid=e(p.product_id||p.id||'');const pname=e(p.name||'—');
    const barW=mn>0?Math.min(100,Math.round(qty/mn*100)):100;
    const barClr=isOut?'var(--red)':isLow?'#f97316':'var(--green)';
    const gi=(p.name||'').charCodeAt(0)%grd.length;
    const qtyClr=isOut?'out':isLow?'low':'ok';
    return`<div class="prod-card ${isOut?'out':isLow?'low':''}" onclick="openMv('${pid}','${pname}',${qty},${mn})">
      ${isOut?`<span class="prod-out-tag">🚫 អស់</span>`:isLow?`<span class="prod-low-tag">⚠️ ជិតអស់</span>`:''}
      <button class="prod-add" onclick="event.stopPropagation();openMv('${pid}','${pname}',${qty},${mn})">+</button>
      <div class="prod-img" style="background:${p.image_url?'var(--surface)':grd[gi]}">
        ${p.image_url?`<img src="${e(p.image_url)}" loading="lazy" onerror="this.style.display='none'">`:`<span style="position:relative;z-index:1">📦</span>`}
      </div>
      <div class="prod-info">
        <div class="prod-name">${pname}</div>
        <div class="prod-price">$${e(p.price||'—')}</div>
        <div class="prod-qty-row"><span class="prod-qty ${qtyClr}">${qty}</span>${mn>0?`<span class="prod-min">/ min ${mn}</span>`:''}</div>
        <div class="prod-bar-wrap"><div class="prod-bar" style="width:${barW}%;background:${barClr}"></div></div>
      </div>
    </div>`;
  }).join('');
  const pending=allOrders.filter(o=>!isCompleted(o)).slice(0,10);
  const linkedHtml=pending.length?`<div class="stk-orders-section"><div class="stk-orders-ttl">📋 Orders រង់ចាំ (${pending.length})</div>
    ${pending.map(o=>{const isCod=(o.payment||'').toLowerCase().includes('cod');
      return`<div class="stk-order-row"><div class="stk-order-dot" style="background:${isCod?'var(--accent)':'var(--green)'}"></div>
      <div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:600;margin-bottom:1px">${e(o.name||'—')}</div>
      <div style="font-size:12px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">🏷️ ${e((o.ordered||'—').substring(0,40))}${(o.ordered||'').length>40?'…':''}</div></div>
      <div style="text-align:right;flex-shrink:0;padding-left:8px"><div style="font-size:13px;font-weight:700;color:var(--accent)">$${e(o.pricing||o.retail||'—')}</div>
      <span class="card-badge ${isCod?'badge-cod':'badge-paid'}" style="font-size:10px;display:inline-block;margin-top:2px">${e(o.payment||'COD')}</span></div></div>`;}).join('')}
    </div>`:''
  body.innerHTML=`
    <div class="stk-stats">
      <div class="stk-stat"><div class="stk-stat-n">${total}</div><div class="stk-stat-l">ប្រភេទ</div></div>
      <div class="stk-stat"><div class="stk-stat-n ok">${totalQty}</div><div class="stk-stat-l">ចំនួនសរុប</div></div>
      <div class="stk-stat"><div class="stk-stat-n ${lowCount>0?'danger':'ok'}">${lowCount}</div><div class="stk-stat-l">⚠️ ជិតអស់</div></div>
    </div>
    <div class="stk-search-bar">
      <input class="stk-search-inp" id="stk-search" type="search" placeholder="🔍 ស្វែងរកទំនិញ..." value="${e(_stkSearch)}" oninput="_stkFilter(this.value)">
      <button class="stk-add-btn" onclick="openAddProduct()" title="បន្ថែមទំនិញ">＋</button>
    </div>
    ${list.length?`<div class="prod-grid">${cards}</div>${linkedHtml}`:`<div class="empty"><div class="empty-icon">${q?'🔍':'📦'}</div><h3>${q?'គ្មានលទ្ធផល':'គ្មានទំនិញ'}</h3><p>${q?'ព្យាយាម keyword ផ្សេង':'ចុច + ខាងលើ ដើម្បីបន្ថែម'}</p></div>`}`;

function updateMvResult(){
  const qty=parseInt(document.getElementById('mv-qty')?.value||0);

  if(!el||!qty||isNaN(qty))return void(el&&(el.textContent=''));
  let result;
  if(_mvType==='in')result=_mvCurQty+qty;
  else if(_mvType==='out')result=Math.max(0,_mvCurQty-qty);
  else result=qty;
  const color=result<=0?'var(--red)':result<5?'#f97316':'var(--green)';
  el.innerHTML=`→ <span style="color:${color};font-weight:700">${result}</span>`;

async function submitMv(){

  const btn=document.getElementById('mv-submit');
  btn.disabled=true;const origText=btn.textContent;btn.textContent='⏳ កំពុងរក្សាទុក...';
  try{
    const res=await gs('addMovement',{product_id:_mvPid,store_id:(typeof STORE!=='undefined')?STORE:'yb9999',type:_mvType,qty,note:sanitizeStr(note),created_by:shipperData?.phone||''});
    if(res&&res.error)throw new Error(res.error);
    const p=_stk.find(x=>(x.product_id||x.id)===_mvPid);
    if(p){const cur=parseInt(p.stock_qty||0);if(_mvType==='in')p.stock_qty=cur+qty;else if(_mvType==='out')p.stock_qty=Math.max(0,cur-qty);else p.stock_qty=qty;}

async function handleInvUpload(ev){
  const file=ev.target.files[0];if(!file)return;
  if(!file.type.startsWith('image/')){showToast('❌ Images only',true);return;}
  if(file.size>5*1024*1024){showToast('❌ Max 5MB',true);return;}
  const r=new FileReader();
  r.onload=async re=>{
    _s2.invB64=re.target.result;
    _s2.invUploading=true;
    // Re-render upload zone
    const zone=document.getElementById('inv-upload-zone');
    if(zone){zone.className='upload-zone has-img';zone.innerHTML=`<img src="${_s2.invB64}" class="upload-preview"><div class="upload-change-lbl">ចុចដើម្បីផ្លាស់ប្តូរ · Bot នឹង scan</div>`;}
    const uploadMsg=document.createElement('div');
    uploadMsg.style.cssText='text-align:center;padding:8px;font-size:13px;color:var(--accent)';
    uploadMsg.textContent='⏳ កំពុង upload ទៅ bot...';
    if(zone)zone.after(uploadMsg);
    // Send to bot
    if(_so){
      try{
        await gs('uploadVETInvoice',{
          profile_id:_so.profileId,
          image_base64:_s2.invB64,
          name:_so.name||'',
          phone:_so.phone||''
        });
        uploadMsg.textContent='✅ ផ្ញើទៅ Bot ហើយ! Bot នឹង scan + reply';
        showToast('📄 Invoice sent to Bot!');
        // Poll for bot-filled values after 8s
        setTimeout(async()=>{
          try{
            const fresh=await gs('handleShipperOrders',shipperData?.phone||'');
            if(Array.isArray(fresh)){
              allOrders=fresh;
              const updated=fresh.find(x=>x.profileId===_so.profileId);
              if(updated){
                _so=updated;
                if(updated.deliveryFee){_s2.deliveryFee=updated.deliveryFee;_s2.botFilled=true;}
                if(updated.trackingNumber){_s2.trackingNumber=updated.trackingNumber;_s2.trackingChecked=true;}
                _s2.botPartial=!!(updated.deliveryFee||updated.trackingNumber)&&!_s2.botFilled;
                document.getElementById('step-body').innerHTML=_buildS2();
                document.getElementById('step-ft').innerHTML=_buildFoot();
              }
            }
          }catch(_){}
        },8000);
      }catch(err){
        uploadMsg.textContent='❌ Upload failed: '+sanitizeStr(err.message);
      }
    }
    _s2.invUploading=false;
  };
  r.readAsDataURL(file);
  ev.target.value='';
}

function _s2sync(inp,field){
  if(field==='fee'){
    _s2.deliveryFee=inp.value;
    // Live fee hint
    const feeNum=parseFloat(inp.value)||0;
    const digits=inp.value.replace(/[^0-9]/g,'').length;
    const hint=inp.nextElementSibling;
    if(hint&&hint.classList.contains('fee-hint')){
      if(!inp.value){hint.className='fee-hint';hint.textContent='ត្រូវ ≥ ២ ខ្ទង់ (ឧ. 2.00)';}
      else if(digits<2){inp.classList.add('s2-err');hint.className='fee-hint err';hint.textContent='❌ Delivery Fee ត្រូវបញ្ចូលយ៉ាងតិច ២ ខ្ទង់';}
      else{inp.classList.remove('s2-err');hint.className='fee-hint ok';hint.textContent='✅ ត្រូវ';}
    }
  }
  if(field==='track'){
    _s2.trackingNumber=inp.value;
    _s2.trackingChecked=!!inp.value;
    const display=document.getElementById('track-display');
    const row=document.getElementById('track-row');
    if(display)display.textContent=inp.value||'ចុចដើម្បីបញ្ចូល...';
    if(row)row.classList.toggle('checked',!!inp.value);
  }
  if(field==='ship')_s2.shipperPhone=inp.value;
  const calc=document.getElementById('s2-calc');if(calc)calc.innerHTML=_buildCalc();
  _updateS2NextBtn();
  _s2saveDraft();
}
function _s2saveDraft(){
  if(!_so)return;
  try{sessionStorage.setItem('s2_'+_so.profileId,JSON.stringify({..._s2,ts:Date.now()}));}catch(_){}
}
function _updateS2NextBtn(){
  const nb=document.getElementById('s2-next');if(nb)nb.disabled=!_canS2Next();
}
function _canS2Next(){
  const digits=String(_s2.deliveryFee||'').replace(/[^0-9]/g,'').length;
  return digits>=2||_s2.botFilled;
}

function _calcTotal(){
  const o=_so;if(!o)return{retail:0,fee:0,discount:0,discShop:0,total:0};
  const retail=parseFloat(String(o.retail||o.pricing||'0').replace(/[^0-9.]/g,''))||0;
  const pricing=parseFloat(String(o.pricing||'0').replace(/[^0-9.]/g,''))||0;
  const fee=parseFloat(String(_s2.deliveryFee||o.deliveryFee||'0').replace(/[^0-9.]/g,''))||0;
  const discount=(retail>0&&pricing>0&&pricing<retail)?(retail-pricing):0;
  const discShop=_s2.discountOn?(_s2.discountAmt||1.5):0;
  const total=retail+fee-discount-discShop;
  return{retail,fee,discount,discShop,total:Math.max(0,total)};
}
function _buildCalc(){
  const{retail,fee,discount,discShop,total}=_calcTotal();
  return`
    <div class="calc-r"><span class="calc-lbl2">Retail Price</span><span class="calc-val2">$${retail.toFixed(2)}</span></div>
    <div class="calc-r"><span class="calc-lbl2">Price (ព្រមលក់)</span><span class="calc-val2">$${parseFloat(String(_so?.pricing||'0').replace(/[^0-9.]/g,''))||retail}​</span></div>
    <div class="calc-r"><span class="calc-lbl2">+ Delivery Fee</span><span class="calc-val2">$${fee.toFixed(2)}</span></div>
    ${discount>0?`<div class="calc-r"><span class="calc-lbl2">- Discount (Retail-Pricing)</span><span class="calc-val2 grn">-$${discount.toFixed(2)}</span></div>`:''}
    ${discShop>0?`<div class="calc-r"><span class="calc-lbl2">- Discount ហាង</span><span class="calc-val2 grn">-$${discShop.toFixed(2)}</span></div>`:''}
    <div class="calc-r" style="background:var(--surface)"><span class="calc-lbl2" style="font-weight:700">Total Paid</span><span class="calc-val2 acc">$${total.toFixed(2)}</span></div>`;
}

async function _saveStep2AndNext(){
  if(!_so)return;
  const digits=String(_s2.deliveryFee||'').replace(/[^0-9]/g,'').length;
  if(digits<2&&!_s2.botFilled){showToast('❌ Delivery Fee ត្រូវ ≥ ២ ខ្ទង់',true);return;}
  const btn=document.getElementById('s2-next');
  if(btn){btn.disabled=true;btn.textContent='⏳...';}
  const{total,discShop}=_calcTotal();
  const isPaid=((_so.payment||'').toLowerCase().includes('paid'));
  try{
    const payload={
      profile_id      :_so.profileId,
      tenant_id       :(typeof STORE!=='undefined')?STORE:'yb9999',
      delivery_fee    :_s2.deliveryFee||'',
      tracking_number :_s2.trackingNumber||'',
      shipper_phone   :_s2.shipperPhone||'',
      total_paid      :total.toFixed(2),
    };
    if(_s2.discountOn&&discShop>0)payload.shop_discount='$'+discShop.toFixed(2);
    if(isPaid){
      payload.status='Completed';
      payload.receive_date=new Date().toLocaleString('en-GB',{timeZone:'Asia/Phnom_Penh'});
    }
    await gs('updateOrder',payload);
    // Update local
    const idx=allOrders.findIndex(x=>x.profileId===_so.profileId);
    if(idx>=0){
      allOrders[idx]={...allOrders[idx],
        deliveryFee:_s2.deliveryFee,trackingNumber:_s2.trackingNumber,
        shipperPhone:_s2.shipperPhone,...(isPaid?{status:'Completed',receiveDate:new Date().toLocaleString()}:{})
      };
    }
    if(isPaid){showToast('✅ ទូទាត់ & ដឹកដល់!');setTimeout(()=>{closeStepSheet();refreshOrders(true);},1000);}
    else goToStep(3);
  }catch(err){
    showToast('❌ '+sanitizeStr(err.message),true);
    if(btn){btn.disabled=false;btn.textContent='Step 3 →';}
  }
}

  }
  return`
    <div class="khqr-box">
      <div class="khqr-qr" id="khqr-img-wrap">
        ${done?`<span style="font-size:38px">✅</span>`:'<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center"><div class="spinner" style="width:28px;height:28px;border-width:2px"></div></div>'}
      </div>
      <div class="khqr-amt">$${total.toFixed(2)}</div>
      <div class="khqr-sub2">${e(_s3.bank)} KHQR · ${e(_so?.name||'')}</div>

      <div class="bank-logo-circle" style="background:${b.bg};color:${b.color}">${b.id.substring(0,4)}</div>

      </div>
