<!DOCTYPE html>
<html lang="km">
<head>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="../config.js?v=2"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>YB Shipper</title>
<style>
:root {
  --bg:#0f0f0f; --surface:#1a1a1a; --card:#222; --border:#333;
  --accent:#f0a500; --accent2:#e05c00;
  --green:#22c55e; --red:#ef4444; --blue:#3b82f6;
  --text:#f0f0f0; --muted:#888;
  --font:'Segoe UI',system-ui,sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;padding-bottom:80px}

/* ── HEADER ── */
.hdr{background:linear-gradient(135deg,#1a1a1a,#222);border-bottom:1px solid var(--border);
  padding:12px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:50}
.hdr-logo{width:38px;height:38px;background:linear-gradient(135deg,var(--accent),var(--accent2));
  border-radius:10px;display:flex;align-items:center;justify-content:center;
  font-size:18px;font-weight:700;color:#000;flex-shrink:0}
.hdr-info h1{font-size:15px;font-weight:600}
.hdr-info p{font-size:11px;color:var(--muted)}
.hdr-actions{margin-left:auto;display:flex;align-items:center;gap:8px}
.hdr-badge{background:var(--accent);color:#000;font-size:11px;font-weight:700;
  padding:4px 10px;border-radius:20px;min-width:28px;text-align:center}
.icon-btn{width:34px;height:34px;border:none;background:var(--surface);border-radius:8px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--muted);
  font-size:16px;transition:background .15s}
.icon-btn:hover{background:var(--border)}

/* ── NEW ORDER ALERT ── */
.new-order-alert{background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:#000;padding:10px 16px;font-size:13px;font-weight:700;
  display:flex;align-items:center;gap:8px;cursor:pointer;
  animation:pulse-bg 1.5s infinite}
@keyframes pulse-bg{0%,100%{opacity:1}50%{opacity:.85}}
.new-order-alert.hidden{display:none}

/* ── STATS ── */
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;
  background:var(--border);border-bottom:1px solid var(--border)}
.stat{background:var(--surface);padding:10px;text-align:center}
.stat-num{font-size:20px;font-weight:700;color:var(--accent)}
.stat-lbl{font-size:10px;color:var(--muted);margin-top:2px}

/* ── FILTER BAR ── */
.fbar{background:var(--surface);border-bottom:1px solid var(--border);
  padding:8px 12px;display:flex;align-items:center;gap:8px}
.fbar-label{font-size:12px;color:var(--muted)}
.toggle{display:flex;align-items:center;gap:6px;cursor:pointer}
.toggle-track{width:36px;height:20px;background:var(--border);border-radius:10px;
  position:relative;transition:background .2s}
.toggle-track.on{background:var(--accent)}
.toggle-thumb{width:16px;height:16px;background:#fff;border-radius:50%;
  position:absolute;top:2px;left:2px;transition:left .2s;box-shadow:0 1px 3px rgba(0,0,0,.3)}
.toggle-track.on .toggle-thumb{left:18px}
.toggle-text{font-size:12px;font-weight:600;color:var(--text)}

/* ── TABS ── */
.tabs{display:flex;background:var(--surface);border-bottom:1px solid var(--border)}
.tab{flex:1;padding:11px 8px;font-size:12px;font-weight:600;color:var(--muted);
  text-align:center;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}

/* ── ORDERS ── */
.orders{padding:10px;display:flex;flex-direction:column;gap:8px}
.order-card{background:var(--card);border:1px solid var(--border);
  border-radius:12px;overflow:hidden;cursor:pointer;transition:transform .15s,border-color .15s}
.order-card:active{transform:scale(.98)}
.order-card.cod-highlight{border-color:var(--accent)66}
.card-top{padding:12px;display:flex;align-items:flex-start;gap:10px}
.card-icon{width:40px;height:40px;border-radius:10px;
  background:linear-gradient(135deg,#f0a50022,#f0a50044);
  border:1px solid var(--accent)44;
  display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.card-body{flex:1;min-width:0}
.card-name{font-size:13px;font-weight:600;margin-bottom:3px}
.card-phone{font-size:12px;color:var(--accent);font-family:monospace;font-weight:600}
.card-loc{font-size:11px;color:var(--muted);margin-top:3px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-item{font-size:11px;color:#aaa;margin-top:2px}
.card-badge{font-size:10px;font-weight:700;padding:3px 8px;border-radius:6px;flex-shrink:0}
.badge-cod{background:#f0a50022;color:var(--accent);border:1px solid var(--accent)44}
.badge-paid{background:#22c55e22;color:var(--green);border:1px solid var(--green)44}
.card-divider{height:1px;background:var(--border);margin:0 12px}
.card-bottom{padding:8px 12px;display:flex;align-items:center;justify-content:space-between;gap:8px}
.card-price{font-size:14px;font-weight:700;color:var(--text)}
.card-date{font-size:10px;color:var(--muted)}
.btn-deliver{background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:#000;font-size:11px;font-weight:700;padding:7px 14px;border-radius:7px;
  border:none;cursor:pointer;transition:opacity .15s;white-space:nowrap}
.btn-deliver:disabled{opacity:.4;cursor:not-allowed}
.btn-done{background:#22c55e22;color:var(--green);border:1px solid var(--green)44;
  font-size:11px;font-weight:600;padding:7px 12px;border-radius:7px;cursor:default}
.btn-call{background:#3b82f622;color:var(--blue);border:1px solid #3b82f644;
  font-size:11px;font-weight:600;padding:7px 12px;border-radius:7px;
  text-decoration:none;display:inline-flex;align-items:center;gap:4px}

/* ── EMPTY / LOADING ── */
.empty{text-align:center;padding:50px 20px;color:var(--muted)}
.empty-icon{font-size:44px;margin-bottom:12px}
.empty h3{font-size:15px;margin-bottom:6px;color:var(--text)}
.empty p{font-size:12px;line-height:1.5}
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:180px;gap:14px;color:var(--muted);font-size:13px}
.spinner{width:34px;height:34px;border:3px solid var(--border);
  border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── TOAST ── */
.toast{position:fixed;bottom:20px;left:50%;
  transform:translateX(-50%) translateY(100px);
  background:var(--green);color:#000;font-size:13px;font-weight:600;
  padding:12px 20px;border-radius:12px;transition:transform .3s;z-index:200;white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.error{background:var(--red);color:#fff}

/* ── POPUP OVERLAY ── */
.popup-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;
  display:flex;align-items:flex-end;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .25s}
.popup-overlay.on{opacity:1;pointer-events:all}
.popup{background:var(--surface);border-radius:20px 20px 0 0;
  width:100%;max-height:88vh;display:flex;flex-direction:column;
  transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1)}
.popup-overlay.on .popup{transform:none}
.popup-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:10px auto 0}
.popup-head{padding:14px 18px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between}
.popup-title{font-size:15px;font-weight:700}
.popup-close{width:28px;height:28px;background:var(--border);border:none;border-radius:50%;
  cursor:pointer;color:var(--text);font-size:14px;display:flex;align-items:center;justify-content:center}
.popup-body{overflow-y:auto;flex:1;padding:16px}
.popup-foot{padding:12px 16px;border-top:1px solid var(--border);display:flex;gap:8px}

/* ── DETAIL SECTIONS ── */
.detail-section{margin-bottom:16px}
.detail-label{font-size:10px;font-weight:700;color:var(--muted);
  text-transform:uppercase;letter-spacing:.6px;margin-bottom:8px}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.detail-item{background:var(--card);border-radius:8px;padding:10px}
.detail-item .key{font-size:10px;color:var(--muted);margin-bottom:3px}
.detail-item .val{font-size:13px;font-weight:600}
.detail-item.full{grid-column:1/-1}
.history-item{background:var(--card);border-radius:8px;padding:10px;margin-bottom:6px;
  border-left:3px solid var(--border)}
.history-item.completed{border-left-color:var(--green)}
.history-item.pending{border-left-color:var(--accent)}
.history-item.cancelled{border-left-color:var(--red)}
.history-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}

/* ── CONFIRM DIALOG ── */
.confirm-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:200;
  display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .2s;padding:20px}
.confirm-overlay.on{opacity:1;pointer-events:all}
.confirm-box{background:var(--surface);border-radius:16px;padding:24px;
  width:100%;max-width:320px;text-align:center;
  transform:scale(.9);transition:transform .2s}
.confirm-overlay.on .confirm-box{transform:scale(1)}
.confirm-icon{font-size:40px;margin-bottom:12px}
.confirm-title{font-size:16px;font-weight:700;margin-bottom:8px}
.confirm-sub{font-size:13px;color:var(--muted);line-height:1.5;margin-bottom:20px}
.confirm-btns{display:flex;gap:10px}
.confirm-btn{flex:1;padding:12px;border:none;border-radius:10px;
  font-size:14px;font-weight:700;cursor:pointer;transition:opacity .15s}
.confirm-btn:hover{opacity:.85}
.confirm-yes{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#000}
.confirm-no{background:var(--border);color:var(--text)}

/* ── LOGIN ── */
.login-box{margin:24px 16px;background:var(--card);
  border:1px solid var(--accent)44;border-radius:16px;padding:24px;text-align:center}
.login-box h3{font-size:16px;font-weight:700;color:var(--accent);margin-bottom:6px}
.login-box p{font-size:12px;color:var(--muted);margin-bottom:16px}
.login-input{width:100%;padding:12px;border-radius:10px;
  border:1px solid var(--border);background:var(--surface);color:var(--text);
  font-size:15px;margin-bottom:10px;text-align:center;letter-spacing:1px}
.login-input:focus{outline:none;border-color:var(--accent)}
.login-btn{width:100%;padding:12px;background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:#000;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer}

/* ── PROFILE CARD ── */
.profile{margin:10px;background:var(--card);border:1px solid var(--border);
  border-radius:12px;padding:12px;display:flex;align-items:center;gap:10px}
.profile-av{width:40px;height:40px;background:linear-gradient(135deg,var(--accent),var(--accent2));
  border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:18px;font-weight:700;color:#000;flex-shrink:0}
.profile-name{font-size:14px;font-weight:600}
.profile-phone{font-size:11px;color:var(--accent);font-family:monospace}
.profile-role{margin-left:auto;font-size:10px;font-weight:700;padding:3px 8px;
  border-radius:6px;background:var(--accent)22;color:var(--accent);border:1px solid var(--accent)44}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-logo">YB</div>
  <div class="hdr-info">
    <h1>YB Shipper</h1>
    <p id="hdr-sub">កំពុងផ្ទុក...</p>
  </div>
  <div class="hdr-actions" id="hdr-actions" style="display:none">
    <button class="icon-btn" onclick="refreshOrders()" title="Refresh">🔄</button>
    <button class="icon-btn" onclick="doLogout()" title="Logout">🚪</button>
    <div class="hdr-badge" id="pending-count">0</div>
  </div>
</div>

<!-- New order alert -->
<div class="new-order-alert hidden" id="new-alert" onclick="dismissAlert()">
  🔔 <span id="new-alert-txt">មានការដឹកថ្មី!</span> — ចុចដើម្បីមើល
</div>

<div id="app-content">
  <div class="loading"><div class="spinner"></div>កំពុងផ្ទុក...</div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Order detail popup -->
<div class="popup-overlay" id="detail-overlay" onclick="closeDetailIfBg(event)">
  <div class="popup" id="detail-popup">
    <div class="popup-handle"></div>
    <div class="popup-head">
      <span class="popup-title" id="detail-title">Order Detail</span>
      <button class="popup-close" onclick="closeDetail()">✕</button>
    </div>
    <div class="popup-body" id="detail-body"></div>
    <div class="popup-foot" id="detail-foot"></div>
  </div>
</div>

<!-- Confirm dialog -->
<div class="confirm-overlay" id="confirm-overlay">
  <div class="confirm-box">
    <div class="confirm-icon">🚚</div>
    <div class="confirm-title">បញ្ជាក់ការដឹក</div>
    <div class="confirm-sub" id="confirm-sub">ដឹកដល់អតិថិជននេះហើយ?</div>
    <div class="confirm-btns">
      <button class="confirm-btn confirm-no" onclick="closeConfirm()">បោះបង់</button>
      <button class="confirm-btn confirm-yes" id="confirm-yes-btn">✅ បញ្ជាក់</button>
    </div>
  </div>
</div>

<script>
const tg     = window.Telegram.WebApp;
try { tg.expand(); tg.setHeaderColor('#0f0f0f'); tg.setBackgroundColor('#0f0f0f'); } catch(_) {}

const user   = tg.initDataUnsafe?.user || {};
const tgId   = String(user.id || "");
const tgName = ((user.first_name||"") + " " + (user.last_name||"")).trim();

let shipperData  = null;
let orders       = [];
let allOrders    = [];   // unfiltered
let activeTab    = "pending";
let codOnly      = false;
let lastCount    = -1;   // for new order alert
let pollTimer    = null;

// ── API ──────────────────────────────────────────────────
function gs(fn, arg) {
  const data = arg !== undefined ? encodeURIComponent(JSON.stringify(arg)) : "";
  return fetch(`${API}?action=gs&fn=${fn}${data?"&data="+data:""}`).then(r=>r.json());
}

// ── BOOT ─────────────────────────────────────────────────
if (tgId) {
  gs("handleShipperLogin", tgId)
    .then(d => {
      if (d.error) { showPhoneLogin(); return; }
      shipperData = d;
      document.getElementById("hdr-sub").textContent = d.name || tgName || "Shipper";
      loadOrders();
    })
    .catch(() => showPhoneLogin());
} else {
  showPhoneLogin();
}

// ── LOGIN ─────────────────────────────────────────────────
function showPhoneLogin() {
  document.getElementById("app-content").innerHTML = `
    <div class="login-box">
      <h3>🚚 Shipper Login</h3>
      <p>បញ្ចូលលេខទូរស័ព្ទ Shipper</p>
      <input id="phone-inp" class="login-input" type="tel"
        placeholder="076 9999 380" onkeydown="if(event.key==='Enter')loginByPhone()">
      <button class="login-btn" onclick="loginByPhone()">Login →</button>
    </div>`;
  setTimeout(()=>document.getElementById("phone-inp")?.focus(), 200);
}

async function loginByPhone() {
  const raw = document.getElementById("phone-inp")?.value.trim();
  if (!raw) { showToast("❌ បញ្ចូលលេខទូរស័ព្ទ!", true); return; }
  const btn = document.querySelector(".login-btn");
  if (btn) { btn.disabled = true; btn.textContent = "កំពុងផ្ទុក..."; }
  const phone = raw.replace(/\D/g,"");
  const result = await gs("handleShipperOrders", phone);
  if (!Array.isArray(result) || result.length === 0) {
    showToast("❌ លេខទូរស័ព្ទមិនត្រឹមត្រូវ!", true);
    if (btn) { btn.disabled = false; btn.textContent = "Login →"; }
    return;
  }
  shipperData = { phone, name: "Shipper" };
  localStorage.setItem("shipper_phone", phone);
  document.getElementById("hdr-sub").textContent = raw;
  document.getElementById("hdr-actions").style.display = "flex";
  allOrders = result;
  applyFilter();
  startPoll();

function doLogout() {
  stopPoll();
  shipperData = null; orders = []; allOrders = []; lastCount = -1;
  showPhoneLogin();
  document.getElementById("hdr-sub").textContent = "កំពុងផ្ទុក...";
  document.getElementById("pending-count").textContent = "0";
}

// ── LOAD ORDERS ───────────────────────────────────────────
async function loadOrders() {
  document.getElementById("app-content").innerHTML =
    '<div class="loading"><div class="spinner"></div>កំពុងផ្ទើកទិន្ន័យ...</div>';
  try {
    const phone = shipperData?.phone || "";
    allOrders = await gs("handleShipperOrders", phone);
    if (!Array.isArray(allOrders)) allOrders = [];
    applyFilter();
    startPoll();
  } catch(e) {
    showError("Load failed: " + e.message);
  }
}

async function refreshOrders() {
  if (!shipperData) return;
  try {
    const phone = shipperData.phone || "";
    const fresh = await gs("handleShipperOrders", phone);
    if (!Array.isArray(fresh)) return;
    const pendingBefore = allOrders.filter(o=>!isCompleted(o)).length;
    allOrders = fresh;
    applyFilter();
    const pendingNow = allOrders.filter(o=>!isCompleted(o)).length;
    if (pendingNow > pendingBefore) {
      showAlert(`មានការដឹកថ្មី +${pendingNow - pendingBefore}`);
    }
    showToast("🔄 Updated!", false);
  } catch(e) { showToast("❌ Refresh failed", true); }
}

// ── POLL (every 60s) ─────────────────────────────────────
function startPoll() {
  stopPoll();
  pollTimer = setInterval(async () => {
    if (!shipperData) return;
    try {
      const fresh = await gs("handleShipperOrders", shipperData.phone || "");
      if (!Array.isArray(fresh)) return;
      const newPending = fresh.filter(o=>!isCompleted(o)).length;
      if (lastCount >= 0 && newPending > lastCount) {
        showAlert(`មានការដឹកថ្មី +${newPending - lastCount}`);
        try { tg.HapticFeedback.notificationOccurred("warning"); } catch(_){}
      }
      lastCount = newPending;
      allOrders = fresh;
      applyFilter();
    } catch(_) {}
  }, 60000);
}
function stopPoll() { if(pollTimer) { clearInterval(pollTimer); pollTimer=null; } }

// ── FILTER ────────────────────────────────────────────────
function applyFilter() {
  orders = codOnly
    ? allOrders.filter(o => (o.payment||"").toLowerCase().includes("cod"))
    : allOrders;
  renderAll();
}

function toggleCOD() {
  codOnly = !codOnly;
  const track = document.getElementById("cod-track");
  if (track) track.classList.toggle("on", codOnly);
  applyFilter();
}

// ── RENDER ────────────────────────────────────────────────
function renderAll() {
  const pending   = orders.filter(o => !isCompleted(o));
  const completed = orders.filter(o =>  isCompleted(o));

  // update lastCount
  lastCount = allOrders.filter(o=>!isCompleted(o)).length;
  document.getElementById("pending-count").textContent = pending.length;

  const html = `
    ${shipperData ? renderProfileCard() : ""}
    <div class="stats">
      <div class="stat"><div class="stat-num">${orders.length}</div><div class="stat-lbl">សរុប</div></div>
      <div class="stat"><div class="stat-num" style="color:var(--green)">${completed.length}</div><div class="stat-lbl">ដឹកដល់</div></div>
      <div class="stat"><div class="stat-num">${pending.length}</div><div class="stat-lbl">រង់ចាំ</div></div>
    </div>
    <div class="fbar">
      <span class="fbar-label">Filter:</span>
      <label class="toggle" onclick="toggleCOD()">
        <div class="toggle-track ${codOnly?'on':''}" id="cod-track">
          <div class="toggle-thumb"></div>
        </div>
        <span class="toggle-text">COD ប៉ុណ្ណោះ</span>
      </label>
    </div>
    <div class="tabs">
      <div class="tab ${activeTab==='pending'?'active':''}" onclick="setTab('pending')">
        🚚 រង់ចាំ (${pending.length})
      </div>
      <div class="tab ${activeTab==='completed'?'active':''}" onclick="setTab('completed')">
        ✅ ដឹកដល់ (${completed.length})
      </div>
    </div>
    <div class="orders">
      ${renderList(activeTab==='pending' ? pending : completed)}
    </div>`;

  document.getElementById("app-content").innerHTML = html;
}

function renderProfileCard() {
  const ini = (shipperData.name||"S").charAt(0).toUpperCase();
  return `<div class="profile">
    <div class="profile-av">${ini}</div>
    <div>
      <div class="profile-name">${shipperData.name||tgName||"Shipper"}</div>
      <div class="profile-phone">${shipperData.phone||"—"}</div>
    </div>
    <div class="profile-role">SHIPPER</div>
  </div>`;
}

function renderList(list) {
  if (!list.length) return `
    <div class="empty">
      <div class="empty-icon">${activeTab==='pending'?'📭':'🎉'}</div>
      <h3>${activeTab==='pending'?'គ្មានការដឹករង់ចាំ':'អបអរ! ដឹកគ្រប់ហើយ'}</h3>
      <p>${activeTab==='pending'?'ការដឹកថ្មីនឹងលេចនៅទីនេះ':'ប្រវត្តិការដឹកនឹងបង្ហាញនៅទីនេះ'}</p>
    </div>`;

  return list.map(o => {
    const isCod  = (o.payment||"").toLowerCase().includes("cod");
    const done   = isCompleted(o);
    return `
    <div class="order-card ${isCod?'cod-highlight':''}" onclick="openDetail('${e(o.profileId)}')">
      <div class="card-top">
        <div class="card-icon">📦</div>
        <div class="card-body">
          <div class="card-name">${e(o.name||"FB User")}</div>
          <div class="card-phone">📞 ${e(o.phone||"—")}</div>
          <div class="card-loc">📍 ${e(o.location||"—")}</div>
          <div class="card-item">🏷️ ${e((o.ordered||"—").substring(0,40))}${(o.ordered||"").length>40?"…":""}</div>
        </div>
        <span class="card-badge ${isCod?'badge-cod':'badge-paid'}">${e(o.payment||"COD")}</span>
      </div>
      <div class="card-divider"></div>
      <div class="card-bottom">
        <div>
          <div class="card-price">$${e(o.pricing||o.retail||"—")}</div>
          <div class="card-date">${e(o.orderDate||"")}</div>
        </div>
        <div style="display:flex;gap:6px;align-items:center">
          <a class="btn-call" href="https://t.me/+${e((o.phone||"").replace(/\D/g,""))}" 
   target="_blank" onclick="event.stopPropagation()">📞</a>
          ${done
            ? `<div class="btn-done">✅ ${e(o.receiveDate||"ដឹកដល់")}</div>`
            : `<button class="btn-deliver" onclick="event.stopPropagation();askDeliver('${e(o.profileId)}','${e(o.name||"")}')">
                🚚 ដឹកដល់
               </button>`
          }
        </div>
      </div>
    </div>`;
  }).join("");
}

function setTab(t) { activeTab = t; renderAll(); }
function isCompleted(o) { return o.status==="Completed" || !!o.receiveDate; }

// ── ORDER DETAIL POPUP ────────────────────────────────────
async function openDetail(profileId) {
  const o = allOrders.find(x => x.profileId === profileId);
  if (!o) return;

  document.getElementById("detail-title").textContent = o.name || "Order Detail";
  document.getElementById("detail-body").innerHTML = `
    <div class="loading"><div class="spinner"></div>កំពុងផ្ទុក...</div>`;
  document.getElementById("detail-foot").innerHTML = "";
  document.getElementById("detail-overlay").classList.add("on");

  // Render detail
  const isCod  = (o.payment||"").toLowerCase().includes("cod");
  const done   = isCompleted(o);

  document.getElementById("detail-body").innerHTML = `
    <div class="detail-section">
      <div class="detail-label">អ្នកទទួល</div>
      <div class="detail-grid">
        <div class="detail-item"><div class="key">ឈ្មោះ</div><div class="val">${e(o.name||"—")}</div></div>
        <div class="detail-item"><div class="key">ទូរស័ព្ទ</div>
          <div class="val"><a href="tel:${e((o.phone||"").replace(/\s/g,""))}" style="color:var(--accent)">${e(o.phone||"—")}</a></div>
        </div>
        <div class="detail-item full"><div class="key">ទីតាំង</div><div class="val">${e(o.location||"—")}</div></div>
      </div>
    </div>
    <div class="detail-section">
      <div class="detail-label">ការបញ្ជាទិញ</div>
      <div class="detail-grid">
        <div class="detail-item full"><div class="key">ទំនិញ</div><div class="val">${e(o.ordered||"—")}</div></div>
        <div class="detail-item"><div class="key">តម្លៃ</div><div class="val" style="color:var(--accent)">$${e(o.pricing||o.retail||"—")}</div></div>
        <div class="detail-item"><div class="key">ការទូទាត់</div>
          <div class="val"><span style="color:${isCod?'var(--accent)':'var(--green)'}">${e(o.payment||"COD")}</span></div>
        </div>
        <div class="detail-item"><div class="key">កាលបរិច្ឆេទ</div><div class="val">${e(o.orderDate||"—")}</div></div>
        <div class="detail-item"><div class="key">Status</div>
          <div class="val" style="color:${done?'var(--green)':'var(--accent)'}">${e(o.status||"Pending")}</div>
        </div>
        ${o.apvCodes?`<div class="detail-item full"><div class="key">APV Code</div><div class="val" style="font-family:monospace">${e(o.apvCodes)}</div></div>`:""}
        ${o.receiveDate?`<div class="detail-item full"><div class="key">ដឹកដល់នៅ</div><div class="val" style="color:var(--green)">${e(o.receiveDate)}</div></div>`:""}
      </div>
    </div>
    <div class="detail-section">
      <div class="detail-label">ប្រវត្តិការបញ្ជាទិញ (${e(o.phone||"")})</div>
      <div id="history-list"><div class="loading" style="min-height:80px"><div class="spinner" style="width:24px;height:24px"></div></div></div>
    </div>`;

  // Buttons
  document.getElementById("detail-foot").innerHTML = `
    <a class="btn-call" href="tel:${e((o.phone||"").replace(/\s/g,""))}" style="padding:10px 16px;font-size:13px">
      📞 ទូរស័ព្ទ
    </a>
    ${!done ? `<button onclick="closeDetail();askDeliver('${e(o.profileId)}','${e(o.name||"")}');"
      style="flex:1;padding:10px;background:linear-gradient(135deg,var(--accent),var(--accent2));
      color:#000;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer">
      🚚 ដឹកដល់
    </button>` : `<div style="flex:1;text-align:center;color:var(--green);font-weight:700;padding:10px">✅ ដឹកដល់ ${e(o.receiveDate||"")}</div>`}`;

  // Load history async
  loadHistory(o.phone||"", o.profileId);
}

async function loadHistory(phone, currentId) {
  try {
    const all = await gs("handleShipperOrders", shipperData?.phone||"");
    if (!Array.isArray(all)) return;
    // Filter by customer phone
    const cleanPhone = phone.replace(/\D/g,"").slice(-8);
    const history = all.filter(o =>
      o.phone && o.phone.replace(/\D/g,"").endsWith(cleanPhone)
    ).sort((a,b) => (b.orderDate||"").localeCompare(a.orderDate||""));

    const el = document.getElementById("history-list");
    if (!el) return;
    if (!history.length) { el.innerHTML = `<p style="font-size:12px;color:var(--muted)">គ្មានប្រវត្តិ</p>`; return; }

    el.innerHTML = history.map(h => {
      const done = isCompleted(h);
      const isCurrent = h.profileId === currentId;
      const color = done ? "var(--green)" : h.status?.toLowerCase().includes("cancel") ? "var(--red)" : "var(--accent)";
      return `<div class="history-item ${done?'completed':h.status?.toLowerCase().includes('cancel')?'cancelled':'pending'}"
        style="${isCurrent?'border-left-color:var(--blue)':''}">
        <div class="history-row">
          <span style="font-size:12px;font-weight:600">${e(h.ordered||"—").substring(0,30)}</span>
          <span style="font-size:11px;color:${color}">${e(h.status||"Pending")}</span>
        </div>
        <div class="history-row">
          <span style="font-size:11px;color:var(--muted)">${e(h.orderDate||"—")}</span>
          <span style="font-size:12px;font-weight:700;color:var(--accent)">$${e(h.pricing||h.retail||"—")}</span>
        </div>
        ${isCurrent?'<span style="font-size:10px;color:var(--blue);font-weight:600">← ការបញ្ជានេះ</span>':''}
      </div>`;
    }).join("");
  } catch(_) {
    const el = document.getElementById("history-list");
    if(el) el.innerHTML = `<p style="font-size:12px;color:var(--muted)">មិនអាចផ្ទុក</p>`;
  }
}

function closeDetail() { document.getElementById("detail-overlay").classList.remove("on"); }
function closeDetailIfBg(ev) { if(ev.target===document.getElementById("detail-overlay")) closeDetail(); }

// ── CONFIRM DELIVER ───────────────────────────────────────
let _pendingDeliverId = null;

function askDeliver(profileId, name) {
  _pendingDeliverId = profileId;
  document.getElementById("confirm-sub").textContent = `ដឹកដល់ "${name}" ហើយ?`;
  document.getElementById("confirm-overlay").classList.add("on");
  document.getElementById("confirm-yes-btn").onclick = () => confirmDeliver();
}

function closeConfirm() {
  document.getElementById("confirm-overlay").classList.remove("on");
  _pendingDeliverId = null;
}

async function confirmDeliver() {
  if (!_pendingDeliverId) return;
  const profileId = _pendingDeliverId;
  closeConfirm();

  try { tg.HapticFeedback.impactOccurred("medium"); } catch(_) {}

  const btn = document.querySelector(`[onclick*="${profileId}"]`);
  if (btn && btn.classList.contains("btn-deliver")) {
    btn.disabled = true; btn.textContent = "⏳...";
  }

  try {
    const data = await gs("handleShipperComplete", [profileId, shipperData?.phone||""]);
    if (data.success || data.completed) {
      showToast("✅ ដឹកដល់ — Order Completed!");
      try { tg.HapticFeedback.notificationOccurred("success"); } catch(_) {}
      setTimeout(loadOrders, 800);
    } else {
      showToast("❌ " + (data.error||"Failed"), true);
      if (btn) { btn.disabled=false; btn.textContent="🚚 ដឹកដល់"; }
    }
  } catch(err) {
    showToast("❌ " + err.message, true);
    if (btn) { btn.disabled=false; btn.textContent="🚚 ដឹកដល់"; }
  }
}

// ── ALERT ─────────────────────────────────────────────────
function showAlert(msg) {
  const el = document.getElementById("new-alert");
  document.getElementById("new-alert-txt").textContent = msg;
  el.classList.remove("hidden");
}
function dismissAlert() {
  document.getElementById("new-alert").classList.add("hidden");
  activeTab = "pending";
  renderAll();
}

// ── ERROR ─────────────────────────────────────────────────
function showError(msg) {
  document.getElementById("app-content").innerHTML = `
    <div class="empty">
      <div class="empty-icon">⚠️</div>
      <h3>Error</h3><p>${msg}</p>
      <button onclick="loadOrders()"
        style="margin-top:16px;padding:10px 20px;background:var(--accent);color:#000;
        border:none;border-radius:8px;font-weight:700;cursor:pointer">Retry</button>
    </div>`;
}

// ── TOAST ─────────────────────────────────────────────────
function showToast(msg, isErr) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.className = "toast show" + (isErr?" error":"");
  setTimeout(()=>{ t.className="toast"; }, 3000);
}

// ── HELPER ────────────────────────────────────────────────
function e(v) {
  return String(v||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}
</script>
