<!DOCTYPE html>
<html lang="km">
<head>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="../config.js?v=3"></script>
<meta charset="UTF-8">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<link rel="manifest" href="manifest.json">
<title>YB Shipper</title>
<style>
:root {
  --bg:#0f0f0f; --surface:#1a1a1a; --card:#222; --border:#333;
  --accent:#f0a500; --accent2:#e05c00;
  --green:#22c55e; --red:#ef4444; --blue:#3b82f6;
  --text:#f0f0f0; --muted:#888;
  --font:'Segoe UI',system-ui,sans-serif;
  --hdr-h:52px;
  --sat:env(safe-area-inset-top,0px);
  --sab:env(safe-area-inset-bottom,0px);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{height:100%;-webkit-text-size-adjust:100%}
body{
  -webkit-touch-callout: none; /* iOS Safari */
  -webkit-user-select: none;   /* Safari */
  -khtml-user-select: none;    /* Konqueror HTML */
  -moz-user-select: none;      /* Old versions of Firefox */
  -ms-user-select: none;       /* Internet Explorer/Edge */
  user-select: none;           /* Non-prefixed version, supported by modern Chrome, Edge, Opera, and Firefox */
  background:var(--bg);color:var(--text);font-family:var(--font);
  min-height:100vh;min-height:-webkit-fill-available;
  padding-bottom:calc(80px + var(--sab));
  padding-top:calc(var(--hdr-h) + var(--sat));
  overscroll-behavior-y:contain;
}

/* ── Header with iOS safe area ── */
.hdr{
  background:#0f0f0f;border-bottom:0px solid var(--border);
  padding:10px 16px;display:flex;align-items:center;gap:10px;
  position:fixed;top:0;left:0;right:0;z-index:50;
  height:calc(var(--hdr-h) + var(--sat));
  padding-top:calc(10px + var(--sat));
  /* FIX: use calc() for translateY with CSS var — avoids iOS rendering glitch */
  transition:transform .28s ease;will-change:transform;
  -webkit-backface-visibility:hidden;backface-visibility:hidden;
}
/* FIX 3: Header hide must use calc() wrapping the full expression */
.hdr.hdr-hidden{transform:translateY(calc(-1 * (var(--hdr-h) + var(--sat))))}

.hdr-logo{
  width:38px;height:38px;background:linear-gradient(135deg,var(--accent),var(--accent2));
  border-radius:10px;display:flex;align-items:center;justify-content:center;
  font-size:17px;font-weight:700;color:#000;flex-shrink:0;cursor:pointer;
  transition:transform .15s;user-select:none;position:relative;overflow:hidden;
}
.hdr-logo:active{transform:scale(.88)}
.hdr-logo .cache-ripple{
  position:absolute;inset:0;border-radius:10px;
  background:rgba(255,255,255,.35);opacity:0;pointer-events:none;
  transition:opacity .2s;
}
.hdr-logo.clearing .cache-ripple{opacity:1;animation:cache-pop .4s ease forwards}
@keyframes cache-pop{0%{transform:scale(0)}50%{transform:scale(1.2)}100%{transform:scale(1);opacity:0}}
.hdr-info{cursor:pointer;min-width:0}
.hdr-info h1{font-size:15px;font-weight:700;white-space:nowrap}
.hdr-info p{font-size:11px;color:var(--muted)}
.hdr-actions{margin-left:auto;display:flex;align-items:center;gap:8px;flex-shrink:0}
.hdr-badge{background:var(--accent);color:#000;font-size:12px;font-weight:700;
  padding:4px 10px;border-radius:20px;min-width:28px;text-align:center;flex-shrink:0}

/* ── Notification bell ── */
.hdr-notif{width:34px;height:34px;background:var(--surface);border:1px solid var(--border);
  border-radius:10px;display:flex;align-items:center;justify-content:center;
  cursor:pointer;position:relative;flex-shrink:0;font-size:16px;
  transition:background .15s}
.hdr-notif:active{background:var(--card)}
.hdr-notif-dot{position:absolute;top:5px;right:5px;width:8px;height:8px;
  background:var(--red);border-radius:50%;border:1.5px solid #0f0f0f;
  display:none}
.hdr-notif-dot.on{display:block}

.hdr-search{flex:1;background:var(--card);border:1px solid var(--border);
  border-radius:9px;padding:8px 12px;color:var(--text);font-size:13px;
  min-width:0;outline:none;transition:border-color .2s;
  -webkit-appearance:none;appearance:none}
.hdr-search:focus{border-color:var(--accent)}
.hdr-search::placeholder{color:var(--muted);font-size:12px}
.new-order-alert{background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:#000;padding:10px 16px;font-size:14px;font-weight:700;
  display:flex;align-items:center;gap:8px;cursor:pointer;
  animation:pulse-bg 1.5s infinite}
@keyframes pulse-bg{0%,100%{opacity:1}50%{opacity:.85}}
.new-order-alert.hidden{display:none}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;
  background:var(--border);border-bottom:1px solid var(--border)}
.stat{background:var(--surface);padding:11px;text-align:center;cursor:pointer;
  transition:background .15s}
.stat:active{background:var(--card)}
.stat-num{font-size:22px;font-weight:700;color:var(--accent)}
.stat-lbl{font-size:11px;color:var(--muted);margin-top:2px}
.stat.stock-btn .stat-num{font-size:18px;color:var(--blue)}
.fbar{background:var(--surface);border-bottom:1px solid var(--border);
  padding:8px 12px;display:flex;align-items:center;gap:8px}
.fbar-label{font-size:13px;color:var(--muted)}

/* ── Time toggle ── */
.time-toggle{margin-left:auto;font-size:11px;font-weight:700;
  padding:3px 9px;border-radius:8px;background:var(--card);
  border:1px solid var(--border);color:var(--muted);cursor:pointer;
  transition:all .15s;flex-shrink:0}
.time-toggle:active{background:var(--accent)22;color:var(--accent)}

.toggle{display:flex;align-items:center;gap:6px;cursor:pointer}
.toggle-track{width:36px;height:20px;background:var(--border);border-radius:10px;
  position:relative;transition:background .2s;flex-shrink:0}
.toggle-track.on{background:var(--accent)}
.toggle-thumb{width:16px;height:16px;background:#fff;border-radius:50%;
  position:absolute;top:2px;left:2px;transition:left .2s;box-shadow:0 1px 3px rgba(0,0,0,.3)}
.toggle-track.on .toggle-thumb{left:18px}
.toggle-text{font-size:13px;font-weight:600;color:var(--text);white-space:nowrap}
.tabs{display:flex;background:var(--surface);border-bottom:1px solid var(--border)}
.tab{flex:1;padding:12px 8px;font-size:13px;font-weight:600;color:var(--muted);
  text-align:center;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.orders{padding:10px;display:flex;flex-direction:column;gap:8px}
.order-card{background:var(--card);border:1px solid var(--border);
  border-radius:12px;overflow:hidden;cursor:pointer;
  transition:transform .15s,border-color .15s,box-shadow .15s}
.order-card:active{transform:scale(.98)}
.order-card.cod-highlight{border-color:var(--accent)66}
.order-card.holding{box-shadow:0 0 0 2.5px var(--accent);transform:scale(.99)}
.card-top{padding:13px;display:flex;align-items:flex-start;gap:10px}
.card-icon{width:42px;height:42px;border-radius:10px;
  background:linear-gradient(135deg,#f0a50022,#f0a50044);
  border:1px solid var(--accent)44;
  display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;
  cursor:pointer;transition:transform .15s;-webkit-tap-highlight-color:transparent}
.card-icon:active{transform:scale(.9);background:var(--accent)33}
.card-body{flex:1;min-width:0}
.card-name{font-size:14px;font-weight:700;margin-bottom:3px;color:var(--text);display:block;
  cursor:pointer;text-decoration:underline dotted var(--accent)66}
.card-phone{font-size:13px;color:var(--accent);font-family:monospace;font-weight:600;cursor:pointer}
.card-loc{font-size:12px;color:var(--muted);margin-top:3px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-item{font-size:12px;color:#aaa;margin-top:2px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-badge{font-size:11px;font-weight:700;padding:3px 8px;border-radius:6px;flex-shrink:0}
.badge-cod{background:#f0a50022;color:var(--accent);border:1px solid var(--accent)44}
.badge-paid{background:#22c55e22;color:var(--green);border:1px solid var(--green)44}
.card-divider{height:1px;background:var(--border);margin:0 12px}
.card-bottom{padding:9px 13px;display:flex;align-items:center;justify-content:space-between;gap:8px}
.card-price{font-size:15px;font-weight:700;color:var(--text)}
.card-date{font-size:11px;color:var(--muted)}

/* FIX 8: Only deliver button in card bottom — no duplicate TG/phone icons */
.btn-deliver{background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:#000;font-size:12px;font-weight:700;padding:8px 15px;border-radius:7px;
  border:none;cursor:pointer;transition:opacity .15s;white-space:nowrap}
.btn-deliver:disabled{opacity:.4;cursor:not-allowed}
.btn-done{background:#22c55e22;color:var(--green);border:1px solid var(--green)44;
  font-size:12px;font-weight:600;padding:8px 13px;border-radius:7px;cursor:default;
  white-space:nowrap}
.loyal-badge{display:inline-flex;align-items:center;gap:3px;
  background:linear-gradient(135deg,#f0a50033,#e05c0022);
  border:1px solid var(--accent)55;color:var(--accent);font-size:10px;font-weight:700;
  padding:2px 7px;border-radius:10px;margin-top:3px}
.empty{text-align:center;padding:50px 20px;color:var(--muted)}
.empty-icon{font-size:44px;margin-bottom:12px}
.empty h3{font-size:16px;margin-bottom:6px;color:var(--text)}
.empty p{font-size:13px;line-height:1.5}
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;
  position:fixed;inset:0;top:calc(var(--hdr-h) + var(--sat));
  gap:14px;color:var(--muted);font-size:14px;
  background:var(--bg);z-index:10;pointer-events:none}
.loading-sm{position:relative;inset:auto;min-height:120px;background:transparent;z-index:auto}
.spinner{width:34px;height:34px;border:2px solid var(--border);
  border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:calc(24px + var(--sab));left:50%;
  transform:translateX(-50%) translateY(120px);
  background:var(--green);color:#000;font-size:14px;font-weight:600;
  padding:13px 22px;border-radius:12px;transition:transform .3s;z-index:900;
  white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.4)}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.error{background:var(--red);color:#fff}
.hold-ring{position:fixed;inset:0;pointer-events:none;z-index:800;
  display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .1s}
.hold-ring.on{opacity:1}
.hold-ring-inner{width:70px;height:70px;border-radius:50%;
  border:3px solid var(--accent);background:rgba(240,165,0,.15);
  display:flex;align-items:center;justify-content:center;
  font-size:22px;animation:hold-pulse .6s ease infinite alternate}
@keyframes hold-pulse{from{transform:scale(1)}to{transform:scale(1.15)}}

/* ── POPUP ── */
.popup-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;
  display:flex;align-items:flex-end;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .25s}
.popup-overlay.on{opacity:1;pointer-events:all}
.popup{background:var(--surface);border-radius:20px 20px 0 0;
  width:100%;max-height:90dvh;
  display:flex;flex-direction:column;
  transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1)}
.popup-overlay.on .popup{transform:translateY(0)}
.popup-handle{width:40px;height:5px;background:var(--border);border-radius:3px;
  margin:12px auto 0;flex-shrink:0;cursor:grab;touch-action:none}
.popup-head{padding:14px 18px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;flex-shrink:0;
  cursor:grab;touch-action:pan-y;user-select:none}
.popup-title{font-size:16px;font-weight:700;pointer-events:none}
.popup-close{width:30px;height:30px;background:var(--border);border:none;border-radius:50%;
  cursor:pointer;color:var(--text);font-size:15px;
  display:flex;align-items:center;justify-content:center;touch-action:auto;pointer-events:auto}
.popup-body{overflow-y:auto;flex:1;padding:16px;-webkit-overflow-scrolling:touch;
  overscroll-behavior:contain}
.popup-foot{padding:16px;padding-bottom:calc(16px + var(--sab));
  border-top:1px solid var(--border);display:flex;gap:8px;flex-shrink:0}
.detail-section{margin-bottom:16px}
.detail-label{font-size:11px;font-weight:700;color:var(--muted);
  text-transform:uppercase;letter-spacing:.6px;margin-bottom:8px}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.detail-item{background:var(--card);border-radius:8px;padding:11px}
.detail-item .key{font-size:12px;color:var(--muted);margin-bottom:4px}
.detail-item .val{font-size:16px;font-weight:600}
.detail-item.full{grid-column:1/-1}
.history-item{background:var(--card);border-radius:8px;padding:10px;margin-bottom:6px;
  border-left:3px solid var(--border)}
.history-item.completed{border-left-color:var(--green)}
.history-item.pending{border-left-color:var(--accent)}
.history-item.cancelled{border-left-color:var(--red)}
.history-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.confirm-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:300;
  display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .2s;padding:20px}
.confirm-overlay.on{opacity:1;pointer-events:all}
.confirm-box{background:var(--surface);border-radius:16px;padding:24px;
  width:100%;max-width:320px;text-align:center;
  transform:scale(.9);transition:transform .2s}
.confirm-overlay.on .confirm-box{transform:scale(1)}
.confirm-icon{font-size:40px;margin-bottom:12px}
.confirm-title{font-size:17px;font-weight:700;margin-bottom:8px}
.confirm-sub{font-size:14px;color:var(--muted);line-height:1.5;margin-bottom:20px}
.confirm-btns{display:flex;gap:10px}
.confirm-btn{flex:1;padding:13px;border:none;border-radius:10px;
  font-size:15px;font-weight:700;cursor:pointer;transition:opacity .15s}
.confirm-btn:hover{opacity:.85}
.confirm-yes{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#000}
.confirm-no{background:var(--border);color:var(--text)}

/* ── LOGIN ── */
.login-box{background:var(--card);border:1px solid var(--accent)44;
  border-radius:16px;padding:24px;text-align:center;width:100%;max-width:340px}
.login-box h3{font-size:17px;font-weight:700;color:var(--accent);margin-bottom:6px}
.login-box p{font-size:13px;color:var(--muted);margin-bottom:16px}
.login-input{width:100%;padding:13px;border-radius:10px;
  border:1px solid var(--border);background:var(--surface);color:var(--text);
  font-size:16px;margin-bottom:10px;text-align:center;
  -webkit-appearance:none;appearance:none}
.login-input:focus{outline:none;border-color:var(--accent)}
.login-input.input-error{border-color:var(--red)!important;animation:shake .3s}
@keyframes shake{0%,100%{transform:none}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
.login-btn{width:100%;padding:13px;background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:#000;border:none;border-radius:10px;font-size:16px;font-weight:700;cursor:pointer}
.login-btn:disabled{opacity:.5;cursor:not-allowed}
.pw-wrap{position:relative;margin-bottom:10px}
.pw-wrap .login-input{margin-bottom:0;padding-right:44px}
.pw-eye{position:absolute;right:12px;top:50%;transform:translateY(-50%);
  background:none;border:none;cursor:pointer;color:var(--muted);font-size:16px}
.input-hint{font-size:12px;color:var(--muted);margin-bottom:10px;text-align:left;padding-left:4px}

/* ── PROFILE CARD ── */
.profile{margin:10px;background:linear-gradient(135deg,var(--card),#1e1e1e);
  border:1px solid var(--border);border-radius:14px;padding:14px;
  display:flex;align-items:center;gap:12px;cursor:pointer;
  transition:border-color .2s,transform .15s}
.profile:active{transform:scale(.98)}
.profile:hover{border-color:var(--accent)66}
.profile-av{width:46px;height:46px;background:linear-gradient(135deg,var(--accent),var(--accent2));
  border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:20px;font-weight:700;color:#000;flex-shrink:0;overflow:hidden;
  box-shadow:0 0 0 2px var(--accent)44}
.profile-av img{width:100%;height:100%;object-fit:cover}
.profile-info{flex:1;min-width:0}
.profile-name{font-size:15px;font-weight:700;margin-bottom:2px}
.profile-phone{font-size:12px;color:var(--accent);font-family:monospace;font-weight:600}
.profile-stats-row{display:flex;gap:8px;margin-top:5px;flex-wrap:wrap}
.profile-stat-chip{font-size:10px;padding:2px 7px;border-radius:8px;font-weight:600;
  background:var(--surface);border:1px solid var(--border);color:var(--muted)}
.profile-role{margin-left:auto;font-size:11px;font-weight:700;padding:3px 8px;
  border-radius:6px;background:var(--accent)22;color:var(--accent);border:1px solid var(--accent)44;
  flex-shrink:0}

/* ── PROFILE PAGE ── */
.profile-page{position:fixed;inset:0;background:var(--bg);z-index:150;
  transform:translateX(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);
  overflow-y:auto;padding-bottom:calc(80px + var(--sab))}
.profile-page.on{transform:none}
.pp-back{position:sticky;top:0;background:rgba(15,15,15,.9);backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);
  padding:12px 16px;padding-top:calc(12px + var(--sat));
  display:flex;align-items:center;gap:10px;z-index:10}
.pp-back-btn{width:36px;height:36px;background:var(--surface);border:none;
  border-radius:50%;cursor:pointer;color:var(--text);font-size:19px;
  display:flex;align-items:center;justify-content:center}
.pp-hero{background:linear-gradient(135deg,#1a1a1a 0%,#0f1520 100%);
  padding:24px 16px 16px;display:flex;flex-direction:column;align-items:center;
  border-bottom:1px solid var(--border)}
.pp-avatar-wrap{position:relative;display:flex;flex-direction:column;align-items:center;
  padding-bottom:4px;cursor:pointer}
.pp-avatar{width:96px;height:96px;border-radius:50%;border:3px solid var(--accent)66;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  display:flex;align-items:center;justify-content:center;
  font-size:38px;font-weight:700;color:#000;overflow:hidden;position:relative;
  box-shadow:0 0 30px var(--accent)33}
.pp-avatar img{width:100%;height:100%;object-fit:cover}
.pp-avatar-cam{position:absolute;bottom:0;left:0;right:0;
  background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;
  padding:5px;font-size:16px;color:#fff}
.pp-change-photo{display:block;text-align:center;margin-top:8px;color:var(--accent);
  font-size:12px;font-weight:600;background:none;border:none;cursor:pointer;padding:4px;opacity:.7}
.pp-info{text-align:center;padding:12px 20px 8px}
.pp-name{font-size:22px;font-weight:800;margin-bottom:4px}
.pp-username{font-size:13px;color:var(--muted);margin-bottom:10px}
.pp-rank{display:inline-flex;align-items:center;gap:5px;margin-top:8px;
  background:linear-gradient(135deg,var(--accent)22,var(--accent2)22);
  border:1px solid var(--accent)44;border-radius:20px;padding:5px 14px;
  font-size:12px;font-weight:700;color:var(--accent)}
.pp-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--border);margin:0}
.pp-stat{background:var(--surface);padding:16px 8px;text-align:center}
.pp-stat-num{font-size:24px;font-weight:800;color:var(--accent)}
.pp-stat-lbl{font-size:11px;color:var(--muted);margin-top:4px}
.pp-logout{margin:16px;padding:14px;background:var(--red)22;color:var(--red);
  border:1px solid var(--red)44;border-radius:12px;font-size:14px;font-weight:700;
  cursor:pointer;width:calc(100% - 32px);display:flex;align-items:center;
  justify-content:center;gap:8px}
.pp-divider{height:1px;background:var(--border);margin:0}

/* ── BOTTOM SHEETS ── */
.bs-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;
  display:flex;align-items:flex-end;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .25s}
.bs-overlay.on{opacity:1;pointer-events:all}
.bs-sheet{background:var(--surface);border-radius:20px 20px 0 0;
  width:100%;max-height:92dvh;display:flex;flex-direction:column;
  transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1)}
.bs-overlay.on .bs-sheet{transform:translateY(0)}
.bs-handle{width:40px;height:5px;background:var(--border);border-radius:3px;
  margin:12px auto 0;flex-shrink:0;cursor:grab}
.bs-head{padding:12px 16px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.bs-body{overflow-y:auto;flex:1;-webkit-overflow-scrolling:touch;overscroll-behavior:contain}
.bs-foot{padding:12px 16px;padding-bottom:calc(12px + var(--sab));
  border-top:1px solid var(--border);display:flex;gap:8px;flex-shrink:0}
.bs-close-btn{width:28px;height:28px;background:var(--border);border:none;border-radius:50%;
  cursor:pointer;color:var(--text);font-size:14px;
  display:flex;align-items:center;justify-content:center}

/* ── Label sheet ── */
.inv-sheet-body{background:#fff;color:#000;
  font-family:'Battambang','Khmer OS Siemreap','Segoe UI',sans-serif;
  padding:16px;overflow-y:auto;flex:1;-webkit-overflow-scrolling:touch}
.inv-sheet-head{background:#f8f8f8;padding:12px 16px;border-bottom:1px solid #ddd;
  display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.inv-sheet-foot{background:#f8f8f8;padding:10px 16px;
  padding-bottom:calc(10px + var(--sab));
  border-top:1px solid #ddd;display:flex;gap:8px;flex-shrink:0}

/* ── Stock popup ── */
.stock-popup{background:var(--surface);border-radius:20px 20px 0 0;
  width:100%;height:95dvh;display:flex;flex-direction:column;
  transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1)}
.bs-overlay.on .stock-popup{transform:translateY(0)}

/* ── Notification history panel ── */
.notif-panel{background:var(--surface);border-radius:20px 20px 0 0;
  width:100%;max-height:70dvh;display:flex;flex-direction:column;
  transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1)}
.bs-overlay.on .notif-panel{transform:translateY(0)}
.notif-item{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;gap:10px;align-items:flex-start}
.notif-item:last-child{border-bottom:none}
.notif-dot{width:8px;height:8px;background:var(--accent);border-radius:50%;flex-shrink:0;margin-top:5px}
.notif-dot.read{background:var(--border)}
.notif-text{font-size:13px;font-weight:600;color:var(--text);margin-bottom:2px}
.notif-time{font-size:11px;color:var(--muted)}

/* ── Stock dashboard chips ── */
.stock-summary{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:12px 12px 0}
.stock-chip{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px;text-align:center}
.stock-chip-num{font-size:22px;font-weight:800}
.stock-chip-lbl{font-size:10px;color:var(--muted);margin-top:3px}
.stock-in .stock-chip-num{color:var(--blue)}
.stock-out .stock-chip-num{color:var(--accent)}
.stock-rem .stock-chip-num{color:var(--green)}

/* ════════════════════════════════════════
   FIX 2: PRINT STYLES
   Key fixes:
   1. position:static so content paginates across pages
   2. overflow:visible for full content render
   3. @page margin for clean paper output
   4. toolbar hidden, content div shown properly
   ════════════════════════════════════════ */
@media print {
  /* Hide everything except print frame */
  body > *:not(#yb-print-frame) { display:none !important; }

  #yb-print-frame {
    display:block !important;
    /* FIX: static position allows multi-page pagination */
    position:static !important;
    inset:auto !important;
    background:#fff !important;
    overflow:visible !important;
    z-index:auto !important;
  }
  #yb-print-frame .yb-print-toolbar { display:none !important; }
  #yb-print-content {
    padding:0 !important;
    background:#fff !important;
  }
  @page {
    margin:6mm;
    /* Remove browser header/footer chrome */
    size:auto;
  }
}

/* Print frame (screen — hidden until triggered) */
#yb-print-frame {
  display:none;
  position:fixed;
  inset:0;
  background:#fff;
  z-index:600;
  overflow-y:auto;
}
#yb-print-frame.visible { display:block; }
.yb-print-toolbar {
  position:sticky;top:0;background:#f5f5f5;
  padding:8px 12px;display:flex;gap:8px;align-items:center;
  border-bottom:1px solid #ddd;z-index:1;
}
</style>

<script>
// ── CONFIG ──
const tg = window.Telegram?.WebApp;
if (tg && tg.isVersionAtLeast && tg.isVersionAtLeast('6.1')) {
  try { tg.expand(); tg.setHeaderColor('#0f0f0f'); tg.setBackgroundColor('#0f0f0f'); } catch(_) {}
}
const user   = tg?.initDataUnsafe?.user || {};
const tgId   = String(user.id || "");
const tgName = [user.first_name, user.last_name].filter(Boolean).join(" ");

let shipperData  = null;
let allOrders    = [];
let orders       = [];
let activeTab    = "pending";
let codOnly      = false;
let lastCount    = -1;
let pollTimer    = null;
let visibleCount = 9;
const CHUNK      = 9;
let _searchAll   = '';
let _searchTimer = null;
let _currentInvId   = null;
let _currentLabelId = null;
let _use12h         = false; // 24h default
let _notifHistory   = [];
let _tgPhone        = '';
let _tgOrderId      = '';
// FIX 5: single IntersectionObserver reference to avoid duplicates
let _scrollObserver = null;

// ── FIX 6: GMT+7 Phnom Penh date helpers ──
function fmtDateKH(d) {
  if (!d) return '—';
  const dt = typeof d === 'string'
    ? new Date(d.replace(/(\d{2})\/(\d{2})\/(\d{4})/, '$3-$2-$1'))
    : d;
  if (isNaN(dt)) return String(d);
  return dt.toLocaleString('km-KH', {
    timeZone: 'Asia/Phnom_Penh',
    day: '2-digit', month: '2-digit', year: 'numeric',
    hour: '2-digit', minute: '2-digit',
    hour12: _use12h
  });
}
function fmtDateShort(d) {
  if (!d) return '—';
  const dt = typeof d === 'string'
    ? new Date(d.replace(/(\d{2})\/(\d{2})\/(\d{4})/, '$3-$2-$1'))
    : d;
  if (isNaN(dt)) return String(d);
  return dt.toLocaleString('km-KH', {
    timeZone: 'Asia/Phnom_Penh',
    day: '2-digit', month: '2-digit', year: 'numeric'
  });
}
function nowPP() {
  return new Date().toLocaleString('km-KH', {
    timeZone: 'Asia/Phnom_Penh',
    hour: '2-digit', minute: '2-digit', second: '2-digit',
    hour12: _use12h
  });
}
function toggleTimeFormat() {
  _use12h = !_use12h;
  try { localStorage.setItem('yb_12h', _use12h ? '1' : '0'); } catch(_) {}
  const btn = document.getElementById('time-fmt-btn');
  if (btn) btn.textContent = _use12h ? '12h' : '24h';
  renderAll();
}
try { _use12h = localStorage.getItem('yb_12h') === '1'; } catch(_) {}

// ── FIX 10: Cache clear on double-tap logo ──
let _logoClickCount = 0;
let _logoClickTimer = null;
function handleLogoClick() {
  _logoClickCount++;
  clearTimeout(_logoClickTimer);
  if (_logoClickCount >= 2) {
    _logoClickCount = 0;
    doClearCache();
  } else {
    _logoClickTimer = setTimeout(() => {
      _logoClickCount = 0;
      refreshOrders(false);
    }, 400);
  }
}
function doClearCache() {
  const logo = document.getElementById('hdr-logo-btn');
  if (logo) logo.classList.add('clearing');
  setTimeout(() => { if (logo) logo.classList.remove('clearing'); }, 500);
  try {
    ['yb_shipper_photo'].forEach(k => {
      try { localStorage.removeItem(k); } catch(_) {}
    });
    if ('caches' in window) {
      caches.keys().then(names => names.forEach(n => caches.delete(n)));
    }
  } catch(_) {}
  showToast('🔄 Cache cleared!');
  setTimeout(() => { if (shipperData) loadOrders(); }, 600);
}

// ── FIX 3: Scroll auto-hide header — iOS-safe ──
let _lastScrollY = 0, _scrollTicking = false;
window.addEventListener('scroll', () => {
  if (!_scrollTicking) {
    requestAnimationFrame(() => {
      const y = window.scrollY;
      const hdr = document.getElementById('main-hdr');
      if (!hdr) { _scrollTicking = false; return; }
      if (y > _lastScrollY + 8 && y > 80) {
        hdr.classList.add('hdr-hidden');
      } else if (y < _lastScrollY - 8 || y < 10) {
        hdr.classList.remove('hdr-hidden');
      }
      _lastScrollY = y;
      _scrollTicking = false;
    });
    _scrollTicking = true;
  }
}, { passive: true });

// ── VALIDATION ──
const PH_MIN = 9, PH_MAX = 10, PW_MIN = 4, PW_MAX = 32;
function validatePhone(v) {
  const p = String(v || '').replace(/\D/g, '');
  if (!p)               return { ok:false, msg:'សូមបញ្ចូលលេខទូរស័ព្ទ' };
  if (p.length < PH_MIN) return { ok:false, msg:`លេខទូរស័ព្ទត្រូវ ${PH_MIN}-${PH_MAX} ខ្ទង់` };
  if (p.length > PH_MAX) return { ok:false, msg:`លេខទូរស័ព្ទត្រូវ ${PH_MIN}-${PH_MAX} ខ្ទង់` };
  if (!/^0/.test(p))    return { ok:false, msg:'ត្រូវចាប់ផ្តើមដោយ 0' };
  return { ok:true, value:p };
}
function validatePassword(v) {
  const p = String(v || '');
  if (!p || p.trim().length === 0) return { ok:false, msg:'សូមបញ្ចូល Password' };
  if (p.length < PW_MIN) return { ok:false, msg:`Password ត្រូវ ${PW_MIN}-${PW_MAX} តួ` };
  if (p.length > PW_MAX) return { ok:false, msg:'Password ច្រើនពេក' };
  return { ok:true, value:p };
}
function sanitizeStr(v) { return String(v || '').replace(/<[^>]*>/g, '').trim().substring(0, 256); }
function e(v) {
  return String(v || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
                         .replace(/"/g,'&quot;').replace(/'/g,'&#039;');
}

// ── LINKS ──
function openInternalLink(url) {
  if (!url) return;
  try {
    if (tg && tg.openTelegramLink && url.match(/t\.me\//)) { tg.openTelegramLink(url); return; }
    if (tg && tg.openLink) { tg.openLink(url, {try_instant_view:true}); return; }
  } catch(_) {}
  window.open(url, '_blank', 'noopener');
}

// ── FIX 7: Telegram by phone — popup with call + share options ──
function customerPhone(phone, orderId) {
  if (!phone) return;
  const clean = String(phone).replace(/\D/g, '');
  if (!clean) return;
  _tgPhone   = clean;
  _tgOrderId = orderId || '';
  // Find order for display name
  const o = orderId
    ? allOrders.find(x => x.profileId === orderId)
    : allOrders.find(x => (x.phone || '').replace(/\D/g,'') === clean) ||
      allOrders.find(x => (x.phone || '').replace(/\D/g,'').endsWith(clean.slice(-8)));
  document.getElementById('tg-popup-name').textContent = o ? (o.name || 'អតិថិជន') : 'អតិថិជន';
  document.getElementById('tg-popup-sub').textContent  = '📞 ' + clean;
  document.getElementById('tg-popup-overlay').classList.add('on');
}
function closeTgPopup() {
  document.getElementById('tg-popup-overlay').classList.remove('on');
}
function tgActionPhone() {
  closeTgPopup();
  callPhone(_tgPhone);
}
function tgActionMsg() {
  closeTgPopup();
  const o = _tgOrderId
    ? allOrders.find(x => x.profileId === _tgOrderId)
    : allOrders.find(x => (x.phone||'').replace(/\D/g,'') === _tgPhone);
  const msg = o
    ? `👤 ${o.name||''}\n📞 ${_tgPhone}\n📍 ${o.location||''}\n🏷️ ${o.ordered||''}\n💰 $${o.retail||o.pricing||''}`
    : `📞 ${_tgPhone}`;
  const url = `https://t.me/share/url?url=${encodeURIComponent('YIN BORAN Electronics')}&text=${encodeURIComponent(msg)}`;
  openInternalLink(url);
}

function callPhone(phone) {
  const clean = String(phone || '').replace(/\D/g, '');
  if (!clean) return;
  try { tg.openLink('tel:' + clean); }
  catch(_) { window.location.href = 'tel:' + clean; }
}

function gs(fn, arg) {
  const data = arg !== undefined ? encodeURIComponent(JSON.stringify(arg)) : '';
  return fetch(`${API}?action=gs&fn=${fn}${data ? '&data=' + data : ''}`)
    .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); });
}

// ── SESSION ──
const SESSION_TTL = 12 * 60 * 60 * 1000;
function saveSession(d) {
  try { localStorage.setItem('yb_shipper', JSON.stringify({
    phone: sanitizeStr(d.phone), name: sanitizeStr(d.name || 'Shipper'),
    role: sanitizeStr(d.role || 'shipper'), ts: Date.now()
  })); } catch(_) {}
}
function loadSession() {
  try {
    const s = JSON.parse(localStorage.getItem('yb_shipper') || '{}');
    if (!s.phone) return null;
    if (Date.now() - (s.ts || 0) > SESSION_TTL) { localStorage.removeItem('yb_shipper'); return null; }
    return s;
  } catch(_) { return null; }
}
function clearSession() { try { localStorage.removeItem('yb_shipper'); } catch(_) {} }

async function loginByPhone() {
  const rawP = document.getElementById('phone-inp')?.value.trim() || '';
  const rawW = document.getElementById('pw-inp')?.value || '';
  const btn  = document.getElementById('login-btn');
  const pv   = validatePhone(rawP);
  if (!pv.ok) { document.getElementById('phone-inp')?.classList.add('input-error'); showToast('❌ ' + pv.msg, true); return; }
  const wv = validatePassword(rawW);
  if (!wv.ok) { document.getElementById('pw-inp')?.classList.add('input-error'); showToast('❌ ' + wv.msg, true); return; }
  if (btn) { btn.disabled = true; btn.textContent = 'កំពុងផ្ទុក...'; }
  try {
    const r = await gs('verifyLogin', { identifier: pv.value, password: wv.value });
    if (r.error) {
      showToast('❌ ' + sanitizeStr(r.error), true);
      document.getElementById('pw-inp')?.classList.add('input-error');
      if (btn) { btn.disabled = false; btn.textContent = 'Login →'; }
      return;
    }
    const role = String(r.role || '').toLowerCase();
    if (role !== 'shipper' && role !== 'admin') {
      showToast('❌ គណនីនេះ មិនមែន Shipper', true);
      if (btn) { btn.disabled = false; btn.textContent = 'Login →'; }
      return;
    }
    saveSession(r); bootWithData(r);
  } catch(err) {
    showToast('❌ ' + sanitizeStr(err.message), true);
    if (btn) { btn.disabled = false; btn.textContent = 'Login →'; }
  }
}
function bootWithData(data) {
  shipperData = { phone: sanitizeStr(data.phone), name: sanitizeStr(data.name || 'Shipper'), role: sanitizeStr(data.role || 'shipper') };

async function loadOrders() {
  document.getElementById('app-content').innerHTML = '<div class="loading"><div class="spinner"></div></div>';
  try {
    const r = await gs('handleShipperOrders', shipperData?.phone || '');
    if (!Array.isArray(r)) { if (r && r.error) throw new Error(r.error); throw new Error('Invalid response'); }
    allOrders = r; visibleCount = CHUNK; applyFilter(); startPoll();

    updateHdrSub();
  } catch(err) { showError('Load failed: ' + sanitizeStr(err.message)); }
}
async function refreshOrders(silent = false) {
  if (!shipperData) return;
  try {
    const fresh = await gs('handleShipperOrders', shipperData.phone || '');
    if (!Array.isArray(fresh)) return;
    const before = allOrders.filter(o => !isCompleted(o)).length;
    allOrders = fresh; applyFilter();
    const after = allOrders.filter(o => !isCompleted(o)).length;
    if (after > before) pushNotifHistory(`+ ការដឹកថ្មី ${after - before}`);
    if (!silent) showToast();
    // FIX 9: Update subtitle
    updateHdrSub();
  } catch(_) { if (!silent) showToast('❌ failed', true); }
}

// FIX 9: Show last refresh time in header subtitle
function updateHdrSub() {
  const sub = document.getElementById('hdr-sub');
  if (sub) sub.textContent = 'Updated ' + nowPP();
}

function startPoll() {
  stopPoll();
  pollTimer = setInterval(async () => {
    if (!shipperData) return;
    try {
      const fresh = await gs('handleShipperOrders', shipperData.phone || '');
      if (!Array.isArray(fresh)) return;
      const newP = fresh.filter(o => !isCompleted(o)).length;
      if (lastCount >= 0 && newP > lastCount) {
        const diff = newP - lastCount;
        showAlert(`មានការដឹកថ្មី +${diff}`);
        pushNotifHistory(`+${diff} ការដឹកថ្មី — ${nowPP()}`);
        pushNotif('🚚 YB Shipper', `ការដឹកថ្មី +${diff}`);
        try { tg.HapticFeedback.notificationOccurred('warning'); } catch(_) {}
      }
      lastCount = newP; allOrders = fresh; applyFilter();
      updateHdrSub();
    } catch(_) {}
  }, 60000);
}

function loadMore() {
  visibleCount += CHUNK;
  const list = hasActiveSearch()
    ? orders
    : (activeTab === 'pending'
        ? orders.filter(o => !isCompleted(o))
        : orders.filter(o => isCompleted(o)));

// FIX 5: Disconnect previous observer before attaching new one
function setupScrollObserver(list) {
  if (_scrollObserver) { _scrollObserver.disconnect(); _scrollObserver = null; }
  const s = document.getElementById('scroll-sentinel');
  if (!s) return;
  _scrollObserver = new IntersectionObserver(entries => {
    if (!entries[0].isIntersecting) return;
    if (visibleCount >= list.length) { _scrollObserver.disconnect(); _scrollObserver = null; return; }
    _scrollObserver.disconnect(); _scrollObserver = null;
    loadMore();
  }, { rootMargin: '120px' });
  _scrollObserver.observe(s);
}

let _holdTimer = null, _holdEl = null, _holdFired = false;
function startHold(el, pid) {
  cancelHold(); _holdEl = el; _holdFired = false;
  const ring = document.getElementById('hold-ring');
  let count  = 0;
  _holdTimer = setInterval(() => {
    count += 100;
    if (count >= 200) el.classList.add('holding');
    if (count >= 2000) {
      clearInterval(_holdTimer); _holdTimer = null; _holdFired = true;
      el.classList.remove('holding');
      if (ring) ring.classList.add('on');
      try { tg.HapticFeedback.impactOccurred('heavy'); } catch(_) {}
      setTimeout(() => { if (ring) ring.classList.remove('on'); }, 500);
      openInvoicePopup(pid); _holdEl = null;
    }
  }, 100);
}
function endHold(ev) { if (_holdFired) { ev?.stopPropagation?.(); cancelHold(); return; } cancelHold(); }
function cancelHold() {
  clearInterval(_holdTimer); _holdTimer = null;
  if (_holdEl) { _holdEl.classList.remove('holding'); _holdEl = null; }
  const ring = document.getElementById('hold-ring'); if (ring) ring.classList.remove('on');
}

// ── Bottom-sheet swipe-to-close ──
function initBottomSheetSwipe(handleId, sheetId, closeFn) {
  setTimeout(() => {
    const handle = document.getElementById(handleId);
    const sheet  = document.getElementById(sheetId);
    if (!handle || !sheet) return;
    let sy = 0, dy = 0, drag = false;
    handle.addEventListener('touchstart', ev => {
      sy = ev.touches[0].clientY; drag = true; dy = 0;
      sheet.style.transition = 'none';
    }, { passive:true });
    document.addEventListener('touchmove', ev => {
      if (!drag) return;
      dy = ev.touches[0].clientY - sy;
      if (dy > 0) sheet.style.transform = `translateY(${dy}px)`;
    }, { passive:true });
    document.addEventListener('touchend', () => {
      if (!drag) return; drag = false; sheet.style.transition = '';
      if (dy > 100) { sheet.style.transform = ''; closeFn(); }
      else sheet.style.transform = '';
      dy = 0;
    });
  }, 200);
}

// ── Detail popup swipe-to-close ──
(function() {
  let sy = 0, dy = 0, drag = false;
  function isSwipeTarget(el) {
    const h     = document.getElementById('popup-handle');
    const head  = document.querySelector('.popup-head');
    const close = document.querySelector('.popup-close');
    if (close && close.contains(el)) return false;
    return (h && h.contains(el)) || (head && head.contains(el));
  }
  document.addEventListener('touchstart', ev => {
    if (isSwipeTarget(ev.target)) {
      sy = ev.touches[0].clientY; drag = true; dy = 0;
      const p = document.getElementById('detail-popup'); if (p) p.style.transition = 'none';
    }
  }, { passive:true });
  document.addEventListener('touchmove', ev => {
    if (!drag) return;
    dy = ev.touches[0].clientY - sy;
    if (dy > 0) { const p = document.getElementById('detail-popup'); if (p) p.style.transform = `translateY(${dy}px)`; }
  }, { passive:true });
  document.addEventListener('touchend', () => {
    if (!drag) return; drag = false;
    const p = document.getElementById('detail-popup'); if (p) p.style.transition = '';
    if (dy > 80) { closeDetail(); } else { if (p) p.style.transform = ''; }
    dy = 0;
  });
})();

async function loadHistory(phone, currentId) {
  try {
    const cleanPhone = phone.replace(/\D/g,'').slice(-8);
    const history    = allOrders
      .filter(o => o.phone && o.phone.replace(/\D/g,'').endsWith(cleanPhone))
      .sort((a,b) => (b.orderDate||'').localeCompare(a.orderDate||''));
    const el = document.getElementById('history-list'); if (!el) return;
    if (!history.length) { el.innerHTML = `<p style="font-size:13px;color:var(--muted)">គ្មានប្រវត្តិ</p>`; return; }
    el.innerHTML = history.map(h => {
      const done  = isCompleted(h), isCur = h.profileId === currentId;
      const color = done ? 'var(--green)' : h.status?.toLowerCase().includes('cancel') ? 'var(--red)' : 'var(--accent)';
      const cls   = done ? 'completed' : h.status?.toLowerCase().includes('cancel') ? 'cancelled' : 'pending';
      return `<div class="history-item ${cls}" style="${isCur?'border-left-color:var(--blue)':''}">
        <div class="history-row">
          <span style="font-size:13px;font-weight:600">${e((h.ordered||'—').substring(0,30))}</span>
          <span style="font-size:12px;color:${color}">${e(h.status||'Pending')}</span>
        </div>
        <div class="history-row">
          <span style="font-size:12px;color:var(--muted)">${fmtDateShort(h.orderDate||'')}</span>
          <span style="font-size:13px;font-weight:700;color:var(--accent)">$${e(h.pricing||h.retail||'—')}</span>
        </div>
        ${h.receiveDate?`<div style="font-size:11px;color:var(--green)">✅ ${fmtDateShort(h.receiveDate)}</div>`:''}
        ${isCur?'<span style="font-size:11px;color:var(--blue);font-weight:600">← ការបញ្ជានេះ</span>':''}
      </div>`;
    }).join('');
  } catch(_) {
    const el = document.getElementById('history-list');
    if (el) el.innerHTML = `<p style="font-size:13px;color:var(--muted)">មិនអាចផ្ទុក</p>`;
  }
}

// FIX 5: stockSummary — correct undefined check (item.qtyRem property, not parseInt result)
function stockSummary() {
  return _stockData.reduce((acc, x) => {
    const qIn  = parseInt(x.qtyIn)  || parseInt(x.qty) || 0;
    const qOut = parseInt(x.qtyOut) || 0;
    // FIX: check property existence first, then parseInt
    const qRem = x.qtyRem !== undefined ? (parseInt(x.qtyRem) || 0) : Math.max(0, qIn - qOut);
    acc.totalIn  += qIn;
    acc.totalOut += qOut;
    acc.totalRem += qRem;
    return acc;
  }, { totalIn: 0, totalOut: 0, totalRem: 0 });
}

              </div>
              <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:8px">
                <div style="background:var(--surface);border-radius:8px;padding:8px;text-align:center">
                  <div style="font-size:16px;font-weight:800;color:var(--blue)">${qtyIn}</div>
                  <div style="font-size:10px;color:var(--muted)">ក្នុងស្ដុក</div>
                </div>
                <div style="background:var(--surface);border-radius:8px;padding:8px;text-align:center">
                  <div style="font-size:16px;font-weight:800;color:var(--accent)">${qtyOut}</div>
                  <div style="font-size:10px;color:var(--muted)">លក់ចេញ</div>
                </div>
                <div style="background:var(--surface);border-radius:8px;padding:8px;text-align:center">
                  <div style="font-size:16px;font-weight:800;color:${qtyRem <= 2 ? 'var(--red)' : 'var(--green)'}">${qtyRem}</div>
                  <div style="font-size:10px;color:var(--muted)">នៅសល់</div>
                </div>
              </div>
              <div style="background:var(--border);border-radius:4px;height:5px;overflow:hidden">
                <div style="height:100%;width:${pct}%;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:4px;transition:width .4s"></div>
              </div>
              <div style="display:flex;justify-content:space-between;margin-top:4px">
                <span style="font-size:10px;color:var(--muted)">លក់ ${pct}%</span>
                <div style="display:flex;gap:6px">
                  <button onclick="adjustStock(${i},-1,'out')" style="padding:4px 10px;background:var(--accent)22;color:var(--accent);border:1px solid var(--accent)44;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer">−1 លក់</button>
                  <button onclick="adjustStock(${i},1,'in')"  style="padding:4px 10px;background:var(--green)22;color:var(--green);border:1px solid var(--green)44;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer">+1 Stock</button>
                </div>
              </div>
            </div>`;
          }).join('')}
    </div>`;
}

async function adjustStock(i, delta, type) {
  const item = _stockData[i]; if (!item) return;
  if (type === 'out') {
    const maxOut = parseInt(item.qtyIn) || parseInt(item.qty) || 0;
    item.qtyOut  = Math.min((parseInt(item.qtyOut)||0) + Math.abs(delta), maxOut);
  } else {
    item.qtyIn = (parseInt(item.qtyIn) || parseInt(item.qty) || 0) + delta;
    item.qty   = item.qtyIn;
  }
  item.qtyRem = Math.max(0, (parseInt(item.qtyIn)||0) - (parseInt(item.qtyOut)||0));
  try { await gs('saveShipperStock', { phone: shipperData?.phone||'', items: _stockData }); } catch(_) {}
  renderStockList(document.getElementById('stock-popup-body'));
}

function stockFormHTML(vals = {}) {
  const qtyIn  = vals.qtyIn  !== undefined ? vals.qtyIn  : (vals.qty || 0);
  const qtyOut = vals.qtyOut !== undefined ? vals.qtyOut : 0;
  return `<div style="padding:12px 12px 16px">
    <div style="font-size:15px;font-weight:700;margin-bottom:12px">${vals._title||'+ Stock ថ្មី'}</div>
    <div style="margin-bottom:10px">
      <div style="font-size:12px;color:var(--muted);margin-bottom:4px">ឈ្មោះទំនិញ</div>
      <input id="sf-name" value="${e(vals.name||'')}" style="width:100%;padding:11px;background:var(--card);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:14px;-webkit-appearance:none" placeholder="Ex: iPhone 15 Pro Max">
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px">
      <div>
        <div style="font-size:12px;color:var(--muted);margin-bottom:4px">ចំនួនក្នុងស្ដុក</div>
        <input id="sf-qty-in" type="number" min="0" value="${qtyIn}" style="width:100%;padding:11px;background:var(--card);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:14px;-webkit-appearance:none">
      </div>
      <div>
        <div style="font-size:12px;color:var(--muted);margin-bottom:4px">លក់ចេញ</div>
        <input id="sf-qty-out" type="number" min="0" value="${qtyOut}" style="width:100%;padding:11px;background:var(--card);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:14px;-webkit-appearance:none">
      </div>
    </div>
    <div style="margin-bottom:16px">
      <div style="font-size:12px;color:var(--muted);margin-bottom:4px">តម្លៃ ($)</div>
      <input id="sf-price" type="number" min="0" step="0.01" value="${vals.price||0}" style="width:100%;padding:11px;background:var(--card);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:14px;-webkit-appearance:none">
    </div>
    <div style="display:flex;gap:8px">
      <button onclick="${vals._saveFn||'saveNewStock()'}" style="flex:1;padding:12px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#000;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer">💾 រក្សាទុក</button>
      <button onclick="renderStockList(document.getElementById('stock-popup-body'))" style="padding:12px 16px;background:var(--border);color:var(--text);border:none;border-radius:10px;font-size:13px;cursor:pointer">បោះបង់</button>
    </div>
  </div>`;
}
function openAddStock()   { document.getElementById('stock-popup-body').innerHTML = stockFormHTML({ _title:'+ Stock ថ្មី', _saveFn:'saveNewStock()' }); }
function openEditStock(i) {
  const item = _stockData[i]; if (!item) return;
  document.getElementById('stock-popup-body').innerHTML = stockFormHTML({
    _title:'✏️ កែប្រែ Stock', _saveFn:`saveEditStock(${i})`,
    name: item.name, qty: item.qty, qtyIn: item.qtyIn, qtyOut: item.qtyOut, price: item.price
  });
}
async function saveNewStock() {
  const name   = (document.getElementById('sf-name')?.value||'').trim();
  const qtyIn  = parseInt(document.getElementById('sf-qty-in')?.value||'0')  || 0;
  const qtyOut = parseInt(document.getElementById('sf-qty-out')?.value||'0') || 0;
  const price  = parseFloat(document.getElementById('sf-price')?.value||'0') || 0;
  if (!name) { showToast('❌ ត្រូវការឈ្មោះ', true); return; }
  const qtyRem = Math.max(0, qtyIn - qtyOut);
  _stockData.push({ name, qty: qtyIn, qtyIn, qtyOut, qtyRem, price, shipper: shipperData?.phone||'' });
  try { await gs('saveShipperStock', { phone: shipperData?.phone||'', items: _stockData }); } catch(_) {}
  renderStockList(document.getElementById('stock-popup-body'));
  showToast('✅ បន្ថែម Stock ជោគជ័យ!');
}
async function saveEditStock(i) {
  const name   = (document.getElementById('sf-name')?.value||'').trim();
  const qtyIn  = parseInt(document.getElementById('sf-qty-in')?.value||'0')  || 0;
  const qtyOut = parseInt(document.getElementById('sf-qty-out')?.value||'0') || 0;
  const price  = parseFloat(document.getElementById('sf-price')?.value||'0') || 0;
  if (!name) { showToast('❌ ត្រូវការឈ្មោះ', true); return; }
  const qtyRem = Math.max(0, qtyIn - qtyOut);
  _stockData[i] = { ..._stockData[i], name, qty: qtyIn, qtyIn, qtyOut, qtyRem, price };
  try { await gs('saveShipperStock', { phone: shipperData?.phone||'', items: _stockData }); } catch(_) {}
  renderStockList(document.getElementById('stock-popup-body'));
  showToast('✅ កែប្រែជោគជ័យ!');
}
async function deleteStock(i) {
  _stockData.splice(i, 1);
  try { await gs('saveShipperStock', { phone: shipperData?.phone||'', items: _stockData }); } catch(_) {}
  renderStockList(document.getElementById('stock-popup-body'));
  showToast('🗑️ លុបជោគជ័យ');
}

// ── Profile Page ──
async function openProfile() {
  document.getElementById('profile-page').classList.add('on');
  document.body.style.overflow = 'hidden';
  const el = document.getElementById('pp-content');
  el.innerHTML = '<div class="loading loading-sm"><div class="spinner"></div></div>';
  try {
    const p    = await gs('userProfile', shipperData?.phone || '');
    const ini  = (p.name || shipperData?.name || 'S').charAt(0).toUpperCase();
    const lp   = getLocalPhoto();
    const hasPhoto = lp || (p.photo && !p.photo.includes('INSERT') && p.photo.startsWith('http'));
    const photoSrc = lp || e(p.photo || '');
    const hasLink  = p.link && !p.link.includes('INSERT') && p.link.length > 3 && !p.link.startsWith('tg:');
    const achieved = parseInt(p.stats?.achievements) || 0;
    let rank = '🚚 Starter', rankColor = 'var(--muted)';
    if      (achieved >= 50) { rank = '💎 Diamond'; rankColor = '#229ED9'; }
    else if (achieved >= 20) { rank = '🥇 Gold';    rankColor = 'var(--accent)'; }
    else if (achieved >= 10) { rank = '🥈 Silver';  rankColor = '#aaa'; }
    else if (achieved >= 5)  { rank = '🥉 Bronze';  rankColor = '#cd7f32'; }
    el.innerHTML = `
      <div class="pp-hero">
        <div class="pp-avatar-wrap" onclick="triggerPhotoUpload()">
          <div class="pp-avatar">
            ${hasPhoto ? `<img id="pp-av-img" src="${photoSrc}" onerror="this.style.display='none';document.getElementById('pp-av-ini').style.display='flex'">` : ''}
            <span id="pp-av-ini" style="${hasPhoto?'display:none':'display:flex'};align-items:center;justify-content:center;width:100%;height:100%">${ini}</span>
            <div class="pp-avatar-cam">📷</div>
          </div>
          <button class="pp-change-photo">ប្តូររូបភាព</button>
        </div>
        <input type="file" id="photo-file-inp" accept="image/*" style="display:none" onchange="handlePhotoUpload(event)">
        <div class="pp-info">
          <div class="pp-name">${e(p.name||'Shipper')}</div>
          ${p.username ? `<div class="pp-username">@${e(p.username)}</div>` : ''}
          <div class="pp-rank" style="color:${rankColor};border-color:${rankColor}44;background:${rankColor}11">${rank}</div>
          ${p.bio  ? `<div class="pp-bio"  style="margin-top:10px">${e(p.bio)}</div>` : ''}
          ${hasLink? `<button class="pp-link" onclick="openInternalLink('${e(p.link)}')">🔗 ${e(p.link.replace(/^https?:\/\//,'').substring(0,32))}</button>` : ''}
        </div>
      </div>
      <div class="pp-stats">
        <div class="pp-stat"><div class="pp-stat-num">${achieved}</div><div class="pp-stat-lbl">✅ ដឹកបាន</div></div>
        <div class="pp-stat"><div class="pp-stat-num">${parseInt(p.stats?.pending)||0}</div><div class="pp-stat-lbl">🚚 កំពុងដឹក</div></div>
        <div class="pp-stat"><div class="pp-stat-num">${parseInt(p.stats?.total)||0}</div><div class="pp-stat-lbl">📦 សរុប</div></div>
      </div>
      <div class="pp-divider"></div>
      <button class="pp-logout" onclick="doLogout()">🚪 Logout</button>`;
  } catch(_) {
    const ini = (shipperData?.name||'S').charAt(0).toUpperCase();
    const lp  = getLocalPhoto();
    el.innerHTML = `
      <div class="pp-hero">
        <div class="pp-avatar-wrap" onclick="triggerPhotoUpload()">
          <div class="pp-avatar">
            ${lp ? `<img src="${lp}">` : `<span>${ini}</span>`}
            <div class="pp-avatar-cam">📷</div>
          </div>
          <button class="pp-change-photo">ប្តូររូបភាព</button>
        </div>
        <input type="file" id="photo-file-inp" accept="image/*" style="display:none" onchange="handlePhotoUpload(event)">
        <div class="pp-info">
          <div class="pp-name">${e(shipperData?.name||'Shipper')}</div>
          <div class="pp-username">${e(shipperData?.phone||'')}</div>
        </div>
      </div>
      <div class="pp-stats">
        <div class="pp-stat"><div class="pp-stat-num">—</div><div class="pp-stat-lbl">✅ ដឹកបាន</div></div>
        <div class="pp-stat"><div class="pp-stat-num">—</div><div class="pp-stat-lbl">🚚 កំពុងដឹក</div></div>
        <div class="pp-stat"><div class="pp-stat-num">—</div><div class="pp-stat-lbl">📦 សរុប</div></div>
      </div>
      <div class="pp-divider"></div>
      <button class="pp-logout" onclick="doLogout()">🚪 Logout</button>`;
  }
}
function triggerPhotoUpload() { document.getElementById('photo-file-inp')?.click(); }
function handlePhotoUpload(ev) {
  const file = ev.target.files[0]; if (!file) return;
  if (!file.type.startsWith('image/')) { showToast('❌ Images only', true); return; }
  if (file.size > 3*1024*1024) { showToast('❌ Max 3MB', true); return; }
  const r = new FileReader();
  r.onload = re => {
    const durl = re.target.result;
    try { localStorage.setItem('yb_shipper_photo', durl); } catch(_) {}
    const avImg  = document.getElementById('pp-av-img');  if (avImg)  { avImg.src = durl; avImg.style.display = ''; }
    const avIni  = document.getElementById('pp-av-ini');  if (avIni)  avIni.style.display = 'none';
    const miniAv = document.getElementById('mini-av');
    if (miniAv) miniAv.innerHTML = `<img src="${durl}" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`;
    showToast('✅ Photo updated!');
  };
  r.readAsDataURL(file);
}
function closeProfile() { document.getElementById('profile-page').classList.remove('on'); document.body.style.overflow = ''; }

// ── Alerts / Toast ──
function showAlert(msg) {
  document.getElementById('new-alert-txt').textContent = sanitizeStr(msg);
  document.getElementById('new-alert').classList.remove('hidden');
  try {
    const ctx = new AudioContext(); const osc = ctx.createOscillator(); const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination); osc.frequency.value = 520;
    gain.gain.setValueAtTime(.3, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(.001, ctx.currentTime + .6);
    osc.start(ctx.currentTime); osc.stop(ctx.currentTime + .6);
  } catch(_) {}
  pushNotif('🚚 YB Shipper', sanitizeStr(msg));
}
function dismissAlert() {
  document.getElementById('new-alert').classList.add('hidden');
  activeTab = 'pending'; visibleCount = CHUNK; renderAll();
}
function showError(msg) {
  document.getElementById('app-content').innerHTML = `
    <div class="empty">
      <div class="empty-icon">⚠️</div><h3>Error</h3><p>${e(msg)}</p>
      <button onclick="loadOrders()"
        style="margin-top:16px;padding:11px 22px;background:var(--accent);color:#000;
        border:none;border-radius:8px;font-weight:700;cursor:pointer;font-size:15px">Retry</button>
    </div>`;
}
function showToast(msg, isErr) {
  const t = document.getElementById('toast');
  t.textContent = sanitizeStr(msg);
  t.className   = 'toast show' + (isErr ? ' error' : '');
  setTimeout(() => { t.className = 'toast'; }, 3000);
}
</script>
