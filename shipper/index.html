<!DOCTYPE html>
<html lang="km">
<head>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="../config.js?v=2"></script>
<meta charset="UTF-8">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<link rel="manifest" href="manifest.json">
<title>YB Shipper</title>
<style>
:root {
  --bg:#0f0f0f; --surface:#1a1a1a; --card:#222; --border:#333;
  --accent:#f0a500; --accent2:#e05c00;
  --green:#22c55e; --red:#ef4444; --blue:#3b82f6;
  --text:#f0f0f0; --muted:#888;
  --font:'Segoe UI',system-ui,sans-serif;
  --hdr-h:64px;
  --sat:env(safe-area-inset-top,0px);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}

/* FIX 1: body padding-top ត្រឹមត្រូវ */
body{
  background:var(--bg);color:var(--text);font-family:var(--font);
  min-height:100vh;padding-bottom:80px;
  padding-top:calc(var(--hdr-h) + var(--sat));
}

/* FIX 1: header — extends behind Dynamic Island */
.hdr{
  background:#0f0f0f;border-bottom:1px solid var(--border);
  padding:12px 16px;
  display:flex;align-items:center;gap:10px;
  position:fixed;top:0;left:0;right:0;z-index:50;
  height:calc(var(--hdr-h) + var(--sat));
  padding-top:calc(12px + var(--sat));
  transition:transform .28s ease;will-change:transform;
}
.hdr.hdr-hidden{transform:translateY(-100%)}
.hdr-spacer{display:none}

.hdr-logo{width:40px;height:40px;background:linear-gradient(135deg,var(--accent),var(--accent2));
  border-radius:10px;display:flex;align-items:center;justify-content:center;
  font-size:19px;font-weight:700;color:#000;flex-shrink:0;cursor:pointer;
  transition:transform .15s;user-select:none}
.hdr-logo:active{transform:scale(.92)}
.hdr-info{cursor:pointer}
.hdr-info h1{font-size:16px;font-weight:700}
.hdr-info p{font-size:12px;color:var(--muted)}
.hdr-actions{margin-left:auto;display:flex;align-items:center;gap:8px}
.hdr-badge{background:var(--accent);color:#000;font-size:12px;font-weight:700;
  padding:4px 10px;border-radius:20px;min-width:28px;text-align:center}

.hdr-search{flex:1;background:var(--card);border:1px solid var(--border);
  border-radius:9px;padding:8px 12px;color:var(--text);font-size:13px;
  min-width:0;outline:none;transition:border-color .2s}
.hdr-search:focus{border-color:var(--accent)}
.hdr-search::placeholder{color:var(--muted);font-size:12px}

.new-order-alert{background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:#000;padding:10px 16px;font-size:14px;font-weight:700;
  display:flex;align-items:center;gap:8px;cursor:pointer;
  animation:pulse-bg 1.5s infinite}
@keyframes pulse-bg{0%,100%{opacity:1}50%{opacity:.85}}
.new-order-alert.hidden{display:none}

.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;
  background:var(--border);border-bottom:1px solid var(--border)}
.stat{background:var(--surface);padding:11px;text-align:center}
.stat-num{font-size:22px;font-weight:700;color:var(--accent)}
.stat-lbl{font-size:11px;color:var(--muted);margin-top:2px}

.fbar{background:var(--surface);border-bottom:1px solid var(--border);
  padding:8px 12px;display:flex;align-items:center;gap:8px}
.fbar-label{font-size:13px;color:var(--muted)}
.toggle{display:flex;align-items:center;gap:6px;cursor:pointer}
.toggle-track{width:36px;height:20px;background:var(--border);border-radius:10px;
  position:relative;transition:background .2s}
.toggle-track.on{background:var(--accent)}
.toggle-thumb{width:16px;height:16px;background:#fff;border-radius:50%;
  position:absolute;top:2px;left:2px;transition:left .2s;box-shadow:0 1px 3px rgba(0,0,0,.3)}
.toggle-track.on .toggle-thumb{left:18px}
.toggle-text{font-size:13px;font-weight:600;color:var(--text)}

.tabs{display:flex;background:var(--surface);border-bottom:1px solid var(--border)}
.tab{flex:1;padding:12px 8px;font-size:13px;font-weight:600;color:var(--muted);
  text-align:center;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}

.orders{padding:10px;display:flex;flex-direction:column;gap:8px}
.order-card{background:var(--card);border:1px solid var(--border);
  border-radius:12px;overflow:hidden;cursor:pointer;
  transition:transform .15s,border-color .15s,box-shadow .15s}
.order-card:active{transform:scale(.98)}
.order-card.cod-highlight{border-color:var(--accent)66}
.order-card.holding{box-shadow:0 0 0 2.5px var(--accent);transform:scale(.99)}
.card-top{padding:13px;display:flex;align-items:flex-start;gap:10px}
.card-icon{width:42px;height:42px;border-radius:10px;
  background:linear-gradient(135deg,#f0a50022,#f0a50044);
  border:1px solid var(--accent)44;
  display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.card-body{flex:1;min-width:0}
.card-name{font-size:14px;font-weight:700;margin-bottom:3px;color:var(--text);display:block}
.card-phone{font-size:13px;color:var(--accent);font-family:monospace;font-weight:600}
.card-loc{font-size:12px;color:var(--muted);margin-top:3px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-item{font-size:12px;color:#aaa;margin-top:2px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-badge{font-size:11px;font-weight:700;padding:3px 8px;border-radius:6px;flex-shrink:0}
.badge-cod{background:#f0a50022;color:var(--accent);border:1px solid var(--accent)44}
.badge-paid{background:#22c55e22;color:var(--green);border:1px solid var(--green)44}
.card-divider{height:1px;background:var(--border);margin:0 12px}
.card-bottom{padding:9px 13px;display:flex;align-items:center;justify-content:space-between;gap:8px}
.card-price{font-size:15px;font-weight:700;color:var(--text)}
.card-date{font-size:11px;color:var(--muted)}
.btn-deliver{background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:#000;font-size:12px;font-weight:700;padding:8px 15px;border-radius:7px;
  border:none;cursor:pointer;transition:opacity .15s;white-space:nowrap}
.btn-deliver:disabled{opacity:.4;cursor:not-allowed}
.btn-done{background:#22c55e22;color:var(--green);border:1px solid var(--green)44;
  font-size:12px;font-weight:600;padding:8px 13px;border-radius:7px;cursor:default}
.btn-call{background:#3b82f622;color:var(--blue);border:1px solid #3b82f644;
  font-size:12px;font-weight:600;padding:8px 13px;border-radius:7px;
  text-decoration:none;display:inline-flex;align-items:center;gap:4px;cursor:pointer;border:none}

.empty{text-align:center;padding:50px 20px;color:var(--muted)}
.empty-icon{font-size:44px;margin-bottom:12px}
.empty h3{font-size:16px;margin-bottom:6px;color:var(--text)}
.empty p{font-size:13px;line-height:1.5}
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;
  position:fixed;inset:0;top:calc(var(--hdr-h) + var(--sat));
  gap:14px;color:var(--muted);font-size:14px;
  background:var(--bg);z-index:10;pointer-events:none}
.loading-sm{position:relative;inset:auto;min-height:180px;background:transparent;z-index:auto;display:flex;flex-direction:column;align-items:center;justify-content:center;width:100%}
.spinner{width:36px;height:36px;border:3px solid var(--border);
  border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}

.toast{position:fixed;bottom:24px;left:50%;
  transform:translateX(-50%) translateY(100px);
  background:var(--green);color:#000;font-size:14px;font-weight:600;
  padding:13px 22px;border-radius:12px;transition:transform .3s;z-index:900;
  white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.4)}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.error{background:var(--red);color:#fff}

.hold-ring{position:fixed;inset:0;pointer-events:none;z-index:800;
  display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .1s}
.hold-ring.on{opacity:1}
.hold-ring-inner{width:70px;height:70px;border-radius:50%;
  border:3px solid var(--accent);background:rgba(240,165,0,.15);
  display:flex;align-items:center;justify-content:center;
  font-size:22px;animation:hold-pulse .6s ease infinite alternate}
@keyframes hold-pulse{from{transform:scale(1)}to{transform:scale(1.15)}}

.popup-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;
  display:flex;align-items:flex-end;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .25s}
.popup-overlay.on{opacity:1;pointer-events:all}
.popup{background:var(--surface);border-radius:20px 20px 0 0;
  width:100%;max-height:100dvh;height:auto;
  display:flex;flex-direction:column;
  transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1)}
.popup-overlay.on .popup{transform:translateY(0)}
@media(max-width:900px){.popup{border-radius:0;max-height:100dvh;height:100dvh}}
.popup-handle{width:40px;height:5px;background:var(--border);border-radius:3px;
  margin:12px auto 0;flex-shrink:0;cursor:grab;touch-action:none}
.popup-head{padding:14px 18px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;flex-shrink:0;
  cursor:grab;touch-action:pan-y;user-select:none}
.popup-title{font-size:16px;font-weight:700;pointer-events:none}
.popup-close{width:30px;height:30px;background:var(--border);border:none;border-radius:50%;
  cursor:pointer;color:var(--text);font-size:15px;
  display:flex;align-items:center;justify-content:center;touch-action:auto;pointer-events:auto}
.popup-body{overflow-y:auto;flex:1;padding:16px;-webkit-overflow-scrolling:touch;
  overscroll-behavior:contain}
.popup-foot{padding:12px 16px;border-top:1px solid var(--border);display:flex;gap:8px;flex-shrink:0}

.detail-section{margin-bottom:16px}
.detail-label{font-size:11px;font-weight:700;color:var(--muted);
  text-transform:uppercase;letter-spacing:.6px;margin-bottom:8px}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.detail-item{background:var(--card);border-radius:8px;padding:11px}
.detail-item .key{font-size:12px;color:var(--muted);margin-bottom:4px}
.detail-item .val{font-size:16px;font-weight:600}
.detail-item.full{grid-column:1/-1}
.history-item{background:var(--card);border-radius:8px;padding:10px;margin-bottom:6px;
  border-left:3px solid var(--border)}
.history-item.completed{border-left-color:var(--green)}
.history-item.pending{border-left-color:var(--accent)}
.history-item.cancelled{border-left-color:var(--red)}
.history-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}

.confirm-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:300;
  display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .2s;padding:20px}
.confirm-overlay.on{opacity:1;pointer-events:all}
.confirm-box{background:var(--surface);border-radius:16px;padding:24px;
  width:100%;max-width:320px;text-align:center;
  transform:scale(.9);transition:transform .2s}
.confirm-overlay.on .confirm-box{transform:scale(1)}
.confirm-icon{font-size:40px;margin-bottom:12px}
.confirm-title{font-size:17px;font-weight:700;margin-bottom:8px}
.confirm-sub{font-size:14px;color:var(--muted);line-height:1.5;margin-bottom:20px}
.confirm-btns{display:flex;gap:10px}
.confirm-btn{flex:1;padding:13px;border:none;border-radius:10px;
  font-size:15px;font-weight:700;cursor:pointer;transition:opacity .15s}
.confirm-btn:hover{opacity:.85}
.confirm-yes{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#000}
.confirm-no{background:var(--border);color:var(--text)}

/* LOGIN */
.login-box{background:var(--card);border:1px solid var(--accent)44;
  border-radius:16px;padding:24px;text-align:center;width:100%;max-width:340px}
.login-box h3{font-size:17px;font-weight:700;color:var(--accent);margin-bottom:6px}
.login-box p{font-size:13px;color:var(--muted);margin-bottom:16px}
.login-input{width:100%;padding:13px;border-radius:10px;
  border:1px solid var(--border);background:var(--surface);color:var(--text);
  font-size:16px;margin-bottom:10px;text-align:center}
.login-input:focus{outline:none;border-color:var(--accent)}
.login-input.input-error{border-color:var(--red)!important;animation:shake .3s}
@keyframes shake{0%,100%{transform:none}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
.login-btn{width:100%;padding:13px;background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:#000;border:none;border-radius:10px;font-size:16px;font-weight:700;cursor:pointer}
.login-btn:disabled{opacity:.5;cursor:not-allowed}
.pw-wrap{position:relative;margin-bottom:10px}
.pw-wrap .login-input{margin-bottom:0;padding-right:44px}
.pw-eye{position:absolute;right:12px;top:50%;transform:translateY(-50%);
  background:none;border:none;cursor:pointer;color:var(--muted);font-size:16px}
.input-hint{font-size:12px;color:var(--muted);margin-bottom:10px;text-align:left;padding-left:4px}

.profile{margin:10px;background:var(--card);border:1px solid var(--border);
  border-radius:12px;padding:12px;display:flex;align-items:center;gap:10px;cursor:pointer}
.profile:hover{border-color:var(--accent)66}
.profile-av{width:42px;height:42px;background:linear-gradient(135deg,var(--accent),var(--accent2));
  border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:19px;font-weight:700;color:#000;flex-shrink:0;overflow:hidden}
.profile-av img{width:100%;height:100%;object-fit:cover}
.profile-name{font-size:15px;font-weight:600}
.profile-phone{font-size:12px;color:var(--accent);font-family:monospace}
.profile-role{margin-left:auto;font-size:11px;font-weight:700;padding:3px 8px;
  border-radius:6px;background:var(--accent)22;color:var(--accent);border:1px solid var(--accent)44}

.profile-page{position:fixed;inset:0;background:var(--bg);z-index:150;
  transform:translateX(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);
  overflow-y:auto;padding-bottom:80px}
.profile-page.on{transform:none}
.pp-back{position:sticky;top:0;background:rgba(15,15,15,.9);backdrop-filter:blur(8px);
  padding:12px 16px;display:flex;align-items:center;gap:10px;z-index:10}
.pp-back-btn{width:36px;height:36px;background:var(--surface);border:none;
  border-radius:50%;cursor:pointer;color:var(--text);font-size:19px;
  display:flex;align-items:center;justify-content:center}
.pp-cover{display:none}
.pp-avatar-wrap{position:relative;display:flex;flex-direction:column;align-items:center;
  padding-top:24px;padding-bottom:4px;cursor:pointer}
.pp-avatar{width:96px;height:96px;border-radius:50%;border:3px solid var(--accent)44;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  display:flex;align-items:center;justify-content:center;
  font-size:38px;font-weight:700;color:#000;overflow:hidden;position:relative}
.pp-avatar img{width:100%;height:100%;object-fit:cover}
.pp-avatar-cam{position:absolute;bottom:0;left:0;right:0;
  background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;
  padding:5px;font-size:16px;color:#fff}
.pp-change-photo{display:block;text-align:center;margin-top:8px;color:var(--accent);
  font-size:14px;font-weight:600;background:none;border:none;cursor:pointer;padding:4px}
.pp-info{text-align:center;padding:8px 20px 16px}
.pp-name{font-size:23px;font-weight:800;margin-bottom:4px}
.pp-username{font-size:14px;color:var(--muted);margin-bottom:10px}
.pp-bio{font-size:14px;color:var(--text);line-height:1.6;margin-bottom:12px;
  max-width:280px;margin-left:auto;margin-right:auto}
.pp-link{display:inline-flex;align-items:center;gap:6px;color:var(--accent);
  font-size:14px;font-weight:600;cursor:pointer;
  background:var(--accent)11;padding:6px 14px;border-radius:20px;
  border:1px solid var(--accent)33;text-decoration:none}
.pp-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;
  background:var(--border);margin:16px 0}
.pp-stat{background:var(--surface);padding:17px 8px;text-align:center}
.pp-stat-num{font-size:25px;font-weight:800;color:var(--accent)}
.pp-stat-lbl{font-size:11px;color:var(--muted);margin-top:4px}
.pp-logout{margin:0 16px 16px;padding:15px;background:var(--red)22;color:var(--red);
  border:1px solid var(--red)44;border-radius:12px;font-size:15px;font-weight:700;
  cursor:pointer;width:calc(100% - 32px);display:flex;align-items:center;
  justify-content:center;gap:8px}
.pp-logout:hover{background:var(--red)44}
.pp-divider{height:1px;background:var(--border);margin:0 16px 16px}

.invoice-overlay{position:fixed;inset:0;background:#fff;color:#000;z-index:600;
  overflow-y:auto;display:none;-webkit-overflow-scrolling:touch}
.invoice-overlay.on{display:block}
.inv-toolbar{position:sticky;top:0;background:#f5f5f5;
  padding:8px 12px;display:flex;gap:8px;align-items:center;
  border-bottom:1px solid #ddd;z-index:1}
@media print{
  body>*:not(#invoice-overlay){display:none!important}
  #invoice-overlay{display:block!important;position:static!important;overflow:visible!important}
  .inv-toolbar{display:none!important}
  #invoice-content{padding:0!important}
}

/* ====================================================
   STOCK SHEET + MOVEMENT FORM — v62
   ==================================================== */

/* ── Stock fullscreen sheet ── */
.stock-overlay{
  position:fixed;inset:0;z-index:130;
  background:transparent;pointer-events:none;
  transition:background .3s}
.stock-overlay.on{background:rgba(0,0,0,.72);pointer-events:all}

.stock-sheet{
  position:fixed;
  top:var(--sat);
  left:0;right:0;bottom:0;
  background:var(--bg);
  border-radius:16px 16px 0 0;
  display:flex;flex-direction:column;
  transform:translateY(105%);
  transition:transform .38s cubic-bezier(0.32,0.72,0,1);
  z-index:131}
.stock-overlay.on .stock-sheet{transform:none}

.sht-handle{
  width:36px;height:5px;background:var(--border);border-radius:3px;
  margin:10px auto 0;flex-shrink:0;cursor:grab;touch-action:none}
.sht-head{
  padding:14px 16px 12px;
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:10px;
  flex-shrink:0;cursor:grab;user-select:none}
.sht-title{font-size:16px;font-weight:700;flex:1}
.sht-body{
  overflow-y:auto;flex:1;
  -webkit-overflow-scrolling:touch;
  overscroll-behavior:contain}

/* ── Stats bar ── */
.stk-stats{
  display:grid;grid-template-columns:repeat(3,1fr);
  gap:1px;background:var(--border);
  border-bottom:1px solid var(--border)}
.stk-stat{background:var(--surface);padding:10px 8px;text-align:center;cursor:pointer;transition:background .15s}.stk-stat:active{background:var(--card)}
.stk-stat-n{font-size:19px;font-weight:800;color:var(--accent)}
.stk-stat-n.danger{color:var(--red)}
.stk-stat-n.ok{color:var(--green)}
.stk-stat-l{font-size:11px;color:var(--muted);margin-top:1px}

/* ── Search bar in stock ── */
.stk-search-bar{
  padding:10px 12px;
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:8px}
.stk-search-inp{
  flex:1;background:var(--card);border:1px solid var(--border);
  border-radius:9px;padding:9px 12px;
  color:var(--text);font-size:14px;outline:none;
  transition:border-color .2s}
.stk-search-inp:focus{border-color:var(--accent)}
.stk-add-btn{
  width:38px;height:38px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  border:none;border-radius:10px;
  font-size:20px;color:#000;font-weight:700;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;flex-shrink:0;transition:transform .15s}
.stk-add-btn:active{transform:scale(.9)}

/* ── Product grid ── */
.prod-grid{
  display:grid;grid-template-columns:1fr 1fr;
  gap:10px;padding:12px}
.prod-card{
  background:var(--card);border:1.5px solid var(--border);
  border-radius:14px;overflow:hidden;
  cursor:pointer;position:relative;
  transition:transform .15s,border-color .2s}
.prod-card:active{transform:scale(.97)}
.prod-card.low{border-color:rgba(239,68,68,.55)}
.prod-card.out{border-color:rgba(239,68,68,.9)}
.prod-img{
  width:100%;aspect-ratio:1/1;
  display:flex;align-items:center;justify-content:center;
  font-size:32px;position:relative;overflow:hidden}
.prod-img img{
  width:100%;height:100%;object-fit:cover;
  position:absolute;inset:0}
.prod-add{

.prod-low-tag{

.prod-name{

.prod-price{

.prod-qty-row{

.prod-qty{font-size:15px;font-weight:800;color:var(--text)}

/* ── Linked orders in stock ── */
.stk-orders-section{

.stk-orders-ttl{

/* ── Movement form bottom sheet ── */
.mv-overlay{
  position:fixed;inset:0;z-index:200;
  background:rgba(0,0,0,.72);
  opacity:0;pointer-events:none;
  transition:opacity .25s}
.mv-overlay.on{opacity:1;pointer-events:all}
.mv-sheet{
  position:absolute;bottom:0;left:0;right:0;
  background:var(--surface);
  border-radius:22px 22px 0 0;
  padding-bottom:max(env(safe-area-inset-bottom,16px),16px);
  transform:translateY(100%);
  transition:transform .3s cubic-bezier(.4,0,.2,1)}
.mv-overlay.on .mv-sheet{transform:none}
.mv-handle{
  width:36px;height:5px;background:var(--border);
  border-radius:3px;margin:10px auto 6px}
.mv-head{
  padding:10px 16px 14px;
  border-bottom:1px solid var(--border);
  display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.mv-head-left{flex:1;min-width:0}
.mv-head-title{
  font-size:15px;font-weight:700;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mv-head-sub{font-size:12px;color:var(--muted);margin-top:2px}
.mv-body{padding:16px}
.mv-types{display:flex;gap:8px;margin-bottom:18px}
.mv-type{
  flex:1;padding:11px 4px;
  border:1.5px solid var(--border);border-radius:12px;
  background:var(--card);color:var(--muted);
  font-size:13px;font-weight:700;
  cursor:pointer;text-align:center;transition:all .18s}
.mv-type.t-in  {border-color:var(--green);background:rgba(34,197,94,.13);color:var(--green)}
.mv-type.t-out {border-color:var(--red);background:rgba(239,68,68,.13);color:var(--red)}
.mv-type.t-adj {border-color:var(--blue);background:rgba(59,130,246,.13);color:var(--blue)}
.mv-fld{margin-bottom:14px}
.mv-lbl{
  font-size:11px;font-weight:700;
  color:var(--muted);text-transform:uppercase;
  letter-spacing:.5px;margin-bottom:7px}
.mv-inp{
  width:100%;padding:13px 14px;
  background:var(--card);border:1.5px solid var(--border);
  border-radius:12px;color:var(--text);
  font-size:16px;outline:none;transition:border-color .2s}
.mv-inp:focus{border-color:var(--accent)}
.mv-qty-wrap{position:relative}
.mv-qty-inp{padding-right:80px}
.mv-qty-result{
  position:absolute;right:12px;top:50%;
  transform:translateY(-50%);
  font-size:12px;font-weight:700;
  color:var(--muted);pointer-events:none}
.mv-submit{
  width:100%;padding:15px;
  border:none;border-radius:14px;
  font-size:16px;font-weight:700;
  cursor:pointer;transition:opacity .15s,background .2s;
  margin-top:4px}
.mv-submit:disabled{opacity:.45;cursor:not-allowed}
.mv-submit.s-in  {background:linear-gradient(135deg,var(--green),#16a34a);color:#fff}
.mv-submit.s-out {background:linear-gradient(135deg,var(--red),#b91c1c);color:#fff}
.mv-submit.s-adj {background:linear-gradient(135deg,var(--blue),#1d4ed8);color:#fff}
/* ====================================================
   STEP POPUP — 3-step order flow v63
   ==================================================== */
.step-overlay{position:fixed;inset:0;z-index:160;background:transparent;pointer-events:none;transition:background .3s}
.step-overlay.on{background:rgba(0,0,0,.82);pointer-events:all}
.step-sht{position:fixed;top:var(--sat);left:0;right:0;bottom:0;background:var(--bg);border-radius:16px 16px 0 0;display:flex;flex-direction:column;transform:translateY(105%);transition:transform .38s cubic-bezier(0.32,0.72,0,1);z-index:161}
.step-overlay.on .step-sht{transform:none}
.step-handle{width:36px;height:5px;background:var(--border);border-radius:3px;margin:10px auto 0;flex-shrink:0;touch-action:none;cursor:grab}
/* indicator */
.step-ind{display:flex;align-items:center;justify-content:center;padding:11px 20px 2px}
.si-dot{width:8px;height:8px;border-radius:50%;background:var(--border);transition:all .25s;flex-shrink:0}
.si-dot.active{width:24px;border-radius:4px;background:var(--accent)}
.si-dot.done{background:var(--green)}
.si-line{flex:1;max-width:28px;height:2px;background:var(--border);transition:background .25s}
.si-line.done{background:var(--green)}
.step-num-lbl{font-size:10px;color:var(--muted);text-align:center;padding:3px 0 6px;letter-spacing:.3px}
/* head */
.step-hd{padding:10px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0}
.step-hd-l{min-width:0;flex:1}
.step-hd-ttl{font-size:15px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.step-hd-sub{font-size:11px;color:var(--muted);margin-top:1px}
/* body + footer */
.step-body{overflow-y:auto;flex:1;padding:14px 16px;-webkit-overflow-scrolling:touch;overscroll-behavior:contain}
.step-ft{padding:10px 14px max(env(safe-area-inset-bottom,12px),12px);border-top:1px solid var(--border);display:flex;gap:7px;flex-shrink:0}
/* foot buttons */
.ft-back{padding:12px 14px;background:var(--surface);color:var(--muted);border:1px solid var(--border);border-radius:11px;font-size:13px;font-weight:600;cursor:pointer;flex-shrink:0;white-space:nowrap;transition:background .15s}
.ft-back:active{background:var(--card)}
.ft-next{flex:1;padding:12px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#000;border:none;border-radius:11px;font-size:14px;font-weight:700;cursor:pointer;transition:opacity .15s}
.ft-next:disabled{background:var(--border);color:var(--muted);cursor:not-allowed;opacity:.6}
.ft-skip{padding:12px 10px;background:var(--surface);color:var(--muted);border:1px solid var(--border);border-radius:11px;font-size:12px;font-weight:600;cursor:pointer;flex-shrink:0;white-space:nowrap}
.ft-confirm{flex:1;padding:12px;background:linear-gradient(135deg,var(--green),#16a34a);color:#fff;border:none;border-radius:11px;font-size:14px;font-weight:700;cursor:pointer;transition:opacity .15s}
.ft-confirm:disabled{opacity:.4;cursor:not-allowed}
/* Section labels */
.s-lbl{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.7px;margin:0 0 8px}
/* Detail cells (step1) */
.d2-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:14px}
.d2-cell{background:var(--card);border-radius:9px;padding:10px 11px;border:1px solid var(--border)}
.d2-cell.full{grid-column:1/-1}
.d2-k{font-size:10px;color:var(--muted);margin-bottom:3px}
.d2-v{font-size:13px;font-weight:600;color:var(--text)}
.d2-v.acc{color:var(--accent)}
.d2-v.grn{color:var(--green)}
.d2-v.tg-link{color:var(--blue);cursor:pointer;border-bottom:1px dotted var(--blue)55;display:inline-block}
.lock-banner{background:var(--accent)0c;border:1px dashed rgba(240,165,0,.3);border-radius:9px;padding:9px 12px;font-size:12px;color:var(--muted);text-align:center}
/* Step 2 */
.bot-row{display:flex;align-items:center;gap:8px;padding:8px 11px;border-radius:9px;margin-bottom:12px;font-size:12px;font-weight:600}
.bot-ok {background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.25);color:var(--green)}
.bot-wait{background:rgba(240,165,0,.1);border:1px solid rgba(240,165,0,.25);color:var(--accent)}
.bot-none{background:var(--card);border:1px solid var(--border);color:var(--muted)}
.s2-inp{width:100%;padding:12px 13px;background:var(--card);border:1.5px solid var(--border);border-radius:10px;color:var(--text);font-size:15px;outline:none;transition:border-color .2s}
.s2-inp:focus{border-color:var(--accent)}
.s2-inp.bot-locked{border-color:rgba(34,197,94,.45);color:var(--green);background:rgba(34,197,94,.06)}
.s2-inp.s2-err{border-color:rgba(239,68,68,.55)!important}
.s2-half{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.s2-lbl{font-size:11px;color:var(--muted);margin-bottom:5px;font-weight:600}
.calc-tbl{background:var(--card);border-radius:10px;overflow:hidden;border:1px solid var(--border);margin-top:10px}
.calc-r{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;border-bottom:1px solid var(--border);font-size:13px}
.calc-r:last-child{border-bottom:none;background:var(--surface)}
.calc-lbl2{color:var(--muted)}
.calc-val2{font-weight:600;color:var(--text)}
.calc-val2.acc{color:var(--accent);font-size:15px;font-weight:800}
/* Step 3 payment types */
.pay-type-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.pay-radio-lbl{cursor:pointer}
.pay-radio-lbl input{position:absolute;opacity:0;width:0;height:0;pointer-events:none}
.pay-radio-lbl input:checked~.pay-card-body{border-color:var(--accent);background:rgba(240,165,0,.07)}
.pay-card-body{background:var(--card);border:2px solid var(--border);border-radius:13px;padding:14px 10px;text-align:center;transition:all .18s;display:flex;flex-direction:column;align-items:center;gap:5px}
.pay-card-body:active{transform:scale(.97)}
.pay-card-ico{font-size:26px}
.pay-card-lbl{font-size:13px;font-weight:700;color:var(--text)}
.pay-card-sub{font-size:10px;color:var(--muted)}
/* Bank chips */
.bank-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:4px;margin-bottom:12px}
.bank-scroll::-webkit-scrollbar{display:none}
.bank-row2{display:flex;gap:8px;width:max-content;padding:2px 0}
.bank-chip2{display:flex;flex-direction:column;align-items:center;gap:4px;padding:8px 11px;border-radius:11px;background:var(--card);border:1.5px solid var(--border);cursor:pointer;transition:all .18s;flex-shrink:0;min-width:90px}
.bank-chip2.sel{border-color:var(--accent);background:rgba(240,165,0,.12);box-shadow:0 0 0 3px rgba(240,165,0,.2)}
.bank-logo-circle{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;letter-spacing:-.3px}
.bank-chip2-name{font-size:12px;font-weight:700;color:var(--muted)}
.bank-chip2.sel .bank-chip2-name{color:var(--accent);font-weight:800}
/* KHQR box */
.khqr-box{background:var(--card);border-radius:12px;padding:16px;text-align:center;border:1px solid var(--border);margin-bottom:10px}
.khqr-qr{width:130px;height:130px;margin:0 auto 10px;background:var(--surface);border-radius:10px;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:52px}
.khqr-amt{font-size:22px;font-weight:800;color:var(--accent)}
.khqr-sub2{font-size:12px;color:var(--muted);margin-top:2px}
.khqr-badge{display:inline-flex;align-items:center;gap:5px;margin-top:8px;padding:5px 13px;border-radius:20px;font-size:12px;font-weight:700}
.kb-wait{background:rgba(240,165,0,.12);color:var(--accent);border:1px solid rgba(240,165,0,.28)}
.kb-done{background:rgba(34,197,94,.12);color:var(--green);border:1px solid rgba(34,197,94,.28)}
/* Manual payment */
.amt-row{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.amt-prefix{font-size:22px;font-weight:800;color:var(--accent)}
.amt-inp{flex:1;background:var(--card);border:1.5px solid var(--border);border-radius:10px;padding:12px 14px;color:var(--text);font-size:20px;font-weight:700;outline:none;transition:border-color .2s}
.amt-inp:focus{border-color:var(--accent)}
.amt-inp:disabled{opacity:.6;cursor:not-allowed;border-color:var(--green)44}
.upload-zone{border:2px dashed var(--border);border-radius:12px;padding:20px 14px;text-align:center;cursor:pointer;transition:all .2s}
.upload-zone:active{background:var(--card)}
.upload-zone.has-img{border:1.5px solid rgba(34,197,94,.4);border-style:solid;padding:8px;background:rgba(34,197,94,.04)}
.upload-zone.locked{pointer-events:none;opacity:.7}
.upload-ico{font-size:28px;margin-bottom:7px}
.upload-lbl{font-size:13px;font-weight:600;color:var(--muted)}
.upload-sub2{font-size:11px;color:var(--muted);margin-top:3px}
.upload-preview{width:100%;border-radius:8px;object-fit:cover;max-height:160px;display:block}
.upload-change-lbl{font-size:11px;color:var(--accent);margin-top:6px;text-align:center}
/* APV + Timeline */
.apv-bar{display:flex;align-items:center;justify-content:space-between;background:var(--card);border-radius:9px;padding:9px 12px;margin-top:8px;border:1px solid var(--border)}
.apv-l{font-size:10px;color:var(--muted)}
.apv-c{font-size:14px;font-weight:800;color:var(--accent);font-family:monospace}
.apv-cp{font-size:10px;color:var(--blue);background:rgba(59,130,246,.12);border:1px solid rgba(59,130,246,.25);border-radius:5px;padding:3px 8px;cursor:pointer}
.tl-wrap{position:relative;padding-left:18px}
.tl-wrap::before{content:'';position:absolute;left:5px;top:8px;bottom:8px;width:2px;background:var(--border)}
.tl-item2{position:relative;padding:0 0 13px 13px}
.tl-item2:last-child{padding-bottom:0}
.tl-d{position:absolute;left:-14px;top:2px;width:10px;height:10px;border-radius:50%;background:var(--border);border:2.5px solid var(--bg)}
.tl-d.done{background:var(--green)}
.tl-d.cur{background:var(--accent)}
.tl-strong{display:block;font-size:12px;font-weight:700;color:var(--text);margin-bottom:1px}
.tl-txt2{font-size:12px;color:var(--muted)}
.paid-lock-banner{background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.25);border-radius:10px;padding:11px 14px;text-align:center;font-size:14px;font-weight:700;color:var(--green);margin-bottom:14px}
/* ====================================================
   END STEP POPUP STYLES
   ==================================================== */
   END STOCK STYLES
   ==================================================== */
/* ── v64 additions ── */
.s2-discount-row{display:flex;align-items:center;gap:10px;background:var(--card);border:1.5px solid var(--border);border-radius:10px;padding:12px 13px;margin-bottom:8px;cursor:pointer;transition:border-color .2s}
.s2-discount-row.checked{border-color:var(--green);background:rgba(34,197,94,.07)}
.disc-check{width:20px;height:20px;border-radius:5px;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;background:var(--surface);transition:all .18s}
.disc-check.on{background:var(--green);border-color:var(--green);color:#fff;font-size:13px}
.vet-upload{border:2px dashed var(--border);border-radius:12px;padding:16px;text-align:center;cursor:pointer;transition:all .2s;margin-bottom:10px}

.vet-preview{width:100%;border-radius:8px;object-fit:cover;max-height:140px;display:block}
.calc-new{background:var(--card);border-radius:11px;overflow:hidden;border:1px solid var(--border);margin-top:10px}
.cn-row{display:flex;justify-content:space-between;align-items:center;padding:8px 13px;border-bottom:1px solid var(--border);font-size:13px}

.khqr-ov{position:fixed;inset:0;z-index:280;background:rgba(0,0,0,.9);display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .25s}

.khqr-ov.on .khqr-popup{transform:none}
.khqr-ph{width:36px;height:5px;background:var(--border);border-radius:3px;margin:10px auto 0}
.khqr-hd{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--border)}
.khqr-bd{padding:16px;text-align:center}
.khqr-qr-box{width:220px;height:220px;margin:0 auto 14px;background:#fff;border-radius:12px;display:flex;align-items:center;justify-content:center;overflow:hidden;border:3px solid #f0a500}
.khqr-qr-box img{width:100%;height:100%;object-fit:contain}
.khqr-paid-btn{width:100%;padding:14px;background:linear-gradient(135deg,var(--green),#16a34a);color:#fff;border:none;border-radius:13px;font-size:16px;font-weight:700;cursor:pointer;margin-top:10px}
.alert-ov{position:fixed;inset:0;z-index:400;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
.alert-ov.on{opacity:1;pointer-events:all}
.alert-box2{background:var(--surface);border-radius:18px;padding:28px 24px;text-align:center;min-width:240px;max-width:80vw;transform:scale(.92);transition:transform .2s}

.alert-msg{font-size:17px;font-weight:700;color:var(--text);line-height:1.4;margin:10px 0 18px}
.alert-ok{padding:12px 36px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#000;border:none;border-radius:11px;font-size:15px;font-weight:700;cursor:pointer}

/* ── Skeleton shimmer loader ────────────────────────────── */
@keyframes shimmer{from{background-position:-400px 0}to{background-position:400px 0}}
.skel{background:linear-gradient(90deg,var(--card) 25%,var(--surface) 50%,var(--card) 75%);
  background-size:400px 100%;animation:shimmer 1.4s ease-in-out infinite}
.skel-card{aspect-ratio:1/1;border-radius:2px}
.cat-skeleton{display:grid;grid-template-columns:repeat(3,1fr);gap:2px;padding:2px}

#root{min-height:100vh}
.content{padding:10px;animation:fadeIn .18s ease;display:flex;flex-direction:column;gap:8px}
@keyframes fadeIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
.catalog-badge{font-size:12px;font-weight:700;padding:6px 13px;border-radius:20px;
  background:rgba(240,165,0,.1);color:var(--accent);border:1px solid rgba(240,165,0,.35);
  cursor:pointer;white-space:nowrap;flex-shrink:0}
/* catalog 3-col grid */
.cat-hdr{position:sticky;top:0;z-index:15;
  background:linear-gradient(180deg,rgba(15,15,15,.97),rgba(15,15,15,.85));

  border-bottom:1px solid var(--border);transition:transform .25s ease}

.cat-hdr-row{display:flex;align-items:center;gap:10px}
.cat-hdr-back{width:34px;height:34px;background:var(--surface);border:1px solid var(--border);
  border-radius:50%;color:var(--text);font-size:16px;display:flex;align-items:center;

<script>
// ── Safe Telegram init (works in TG WebApp + iPhone Safari) ──
const tg = window.Telegram?.WebApp ?? {
  expand:()=>{}, setHeaderColor:()=>{}, setBackgroundColor:()=>{},
  requestFullscreen:()=>{}, exitFullscreen:()=>{},
  isFullscreen:false, isExpanded:false,
  safeAreaInset:{top:0,bottom:0,left:0,right:0},
  initDataUnsafe:{}, initData:'',
  HapticFeedback:{notificationOccurred:()=>{},impactOccurred:()=>{},selectionChanged:()=>{}},
  onEvent:()=>{}, offEvent:()=>{},
  openLink:(u)=>{ try{window.open(u,'_blank');}catch(_){} },
  openTelegramLink:(u)=>{ try{window.open(u,'_blank');}catch(_){} },
  close:()=>{}, ready:()=>{}, showAlert:(m,cb)=>{ alert(m); if(cb)cb(); },
};
try { tg.expand(); tg.setHeaderColor('#0f0f0f'); tg.setBackgroundColor('#0f0f0f'); } catch(_) {}
try { if(typeof tg.requestFullscreen==='function') tg.requestFullscreen(); } catch(_) {}

// ── Safe area sync ────────────────────────────────────────────
function _syncSat() {
  try {
    // 1. Telegram fullscreen safe area
    const tgTop = tg.safeAreaInset?.top;
    if (tgTop > 0) {
      document.documentElement.style.setProperty('--sat', tgTop + 'px');
      return;
    }
  } catch(_) {}
  // 2. iPhone Safari — env(safe-area-inset-top) via CSS (already default)
  // --sat is set in :root as env(safe-area-inset-top,0px) — no JS needed
}
try { tg.onEvent('fullscreenChanged', _syncSat); tg.onEvent('safeAreaChanged', _syncSat); } catch(_) {}
setTimeout(_syncSat, 400);

const user   = tg.initDataUnsafe?.user || {};
const tgId   = String(user.id || "");
const tgName = ((user.first_name||"") + " " + (user.last_name||"")).trim();

let shipperData  = null;
let allOrders    = [];
let orders       = [];
let activeTab    = "pending";
let codOnly      = false;
let lastCount    = -1;
let pollTimer    = null;
let visibleCount = 9;
const CHUNK      = 9;
let _searchAll   = '';
let _searchTimer = null;
let _currentInvId = null;

// ── SCROLL AUTO-HIDE HEADER ──────────────────────────────
let _lastScrollY = 0;
window.addEventListener('scroll', () => {
  const y   = window.scrollY;
  const hdr = document.getElementById('main-hdr');
  if (!hdr) return;
  if (y > _lastScrollY + 6 && y > 60) {
    hdr.classList.add('hdr-hidden');
  } else if (y < _lastScrollY - 6) {
    hdr.classList.remove('hdr-hidden');
  }
  _lastScrollY = y;
}, { passive: true });

// ── VALIDATION ────────────────────────────────────────────
const PH_MIN=9, PH_MAX=10, PW_MIN=4, PW_MAX=32;
function validatePhone(v) {
  const p=String(v||'').replace(/\D/g,'');
  if(!p)              return{ok:false,msg:'សូមបញ្ចូលលេខទូរស័ព្ទ'};
  if(p.length<PH_MIN) return{ok:false,msg:`លេខទូរស័ព្ទត្រូវ ${PH_MIN}-${PH_MAX} ខ្ទង់`};
  if(p.length>PH_MAX) return{ok:false,msg:`លេខទូរស័ព្ទត្រូវ ${PH_MIN}-${PH_MAX} ខ្ទង់`};
  if(!/^0/.test(p))   return{ok:false,msg:'ត្រូវចាប់ផ្តើមដោយ 0'};
  return{ok:true,value:p};
}
function validatePassword(v) {
  const p=String(v||'');
  if(!p||p.trim().length===0) return{ok:false,msg:'សូមបញ្ចូល Password'};
  if(p.length<PW_MIN)         return{ok:false,msg:`Password ត្រូវ ${PW_MIN}-${PW_MAX} តួ`};
  if(p.length>PW_MAX)         return{ok:false,msg:'Password ច្រើនពេក'};
  return{ok:true,value:p};
}
function sanitizeStr(v){return String(v||'').replace(/<[^>]*>/g,'').trim().substring(0,256);}
function e(v){
  return String(v||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
                       .replace(/"/g,'&quot;').replace(/'/g,'&#039;');
}
function fmtDate(v){
  if(!v)return'—';
  const s=String(v).trim();
  if(!s||s==='—')return'—';
  // Already dd/MM/yyyy format
  if(/^\d{2}\/\d{2}\/\d{4}/.test(s))return s.substring(0,16);
  // Parse JS Date string
  const d=new Date(s);
  if(!isNaN(d)){
    return d.toLocaleString('en-GB',{
      day:'2-digit',month:'2-digit',year:'numeric',
      hour:'2-digit',minute:'2-digit',
      timeZone:'Asia/Phnom_Penh'
    }).replace(',',' ');
  }
  return s.substring(0,20);
}

function callPhone(phone){
  const clean=String(phone||'').replace(/\D/g,'');
  if(!clean)return;
  // Open Telegram contact externally (+855 format)
  const intl=clean.startsWith('0')?'855'+clean.substring(1):clean;
  try{
    tg.openLink('https://t.me/+'+intl);
  }catch(_){
    window.open('https://t.me/+'+intl,'_blank');
  }
}
function openTGContact(phone){
  const clean=String(phone||'').replace(/\D/g,'');
  if(!clean)return;
  const intl=clean.startsWith('0')?'855'+clean.substring(1):clean;
  // Open Telegram contact externally
  try{
    tg.openLink('https://t.me/+'+intl,{try_browser:true});
  }catch(_){window.open('https://t.me/+'+intl,'_blank');}

function gs(fn,arg){
  const data=arg!==undefined?encodeURIComponent(JSON.stringify(arg)):'';
  return fetch(`${API}?action=gs&fn=${fn}${data?'&data='+data:''}`)
    .then(r=>{if(!r.ok)throw new Error('HTTP '+r.status);return r.json();});
}

const SESSION_TTL=12*60*60*1000;
function saveSession(d){
  try{localStorage.setItem('yb_shipper',JSON.stringify({
    phone:sanitizeStr(d.phone),name:sanitizeStr(d.name||'Shipper'),
    role:sanitizeStr(d.role||'shipper'),ts:Date.now()
  }));}catch(_){}
}
function loadSession(){
  try{
    const s=JSON.parse(localStorage.getItem('yb_shipper')||'{}');
    if(!s.phone)return null;
    if(Date.now()-(s.ts||0)>SESSION_TTL){localStorage.removeItem('yb_shipper');return null;}
    return s;
  }catch(_){return null;}
}

async function loginByPhone(){
  const rawP=document.getElementById('phone-inp')?.value.trim()||'';
  const rawW=document.getElementById('pw-inp')?.value||'';
  const btn=document.getElementById('login-btn');
  const pv=validatePhone(rawP);
  if(!pv.ok){document.getElementById('phone-inp')?.classList.add('input-error');showToast('❌ '+pv.msg,true);return;}
  const wv=validatePassword(rawW);
  if(!wv.ok){document.getElementById('pw-inp')?.classList.add('input-error');showToast('❌ '+wv.msg,true);return;}
  if(btn){btn.disabled=true;btn.textContent='កំពុងផ្ទុក...';}
  try{
    const r=await gs('verifyLogin',{identifier:pv.value,password:wv.value});
    if(r.error){showToast('❌ '+sanitizeStr(r.error),true);document.getElementById('pw-inp')?.classList.add('input-error');if(btn){btn.disabled=false;btn.textContent='Login →';}return;}
    const role=String(r.role||'').toLowerCase();
    if(role!=='shipper'&&role!=='admin'){showToast('❌ គណនីនេះ មិនមែន Shipper',true);if(btn){btn.disabled=false;btn.textContent='Login →';}return;}
    saveSession(r);bootWithData(r);
  }catch(err){showToast('❌ '+sanitizeStr(err.message),true);if(btn){btn.disabled=false;btn.textContent='Login →';}}
}

async function loadOrders(){
  document.getElementById('root').innerHTML=
    '<div class="loading"><div class="spinner"></div>កំពុងផ្ទើកទិន្ន័យ...</div>';
  try{

    if(!Array.isArray(r)){if(r&&r.error)throw new Error(r.error);throw new Error('Invalid response');}
    allOrders=r;visibleCount=CHUNK;applyFilter();startPoll();
  }catch(err){showError('Load failed: '+sanitizeStr(err.message));}

async function refreshOrders(silent=false){
  if(!shipperData)return;
  try{
    const fresh=await gs('handleShipperOrders',shipperData.phone||'');
    if(!Array.isArray(fresh))return;
    const before=allOrders.filter(o=>!isCompleted(o)).length;
    allOrders=fresh;applyFilter();
    const after=allOrders.filter(o=>!isCompleted(o)).length;
    if(after>before)showAlert(`មានការដឹកថ្មី +${after-before}`);
    if(!silent)showToast('🔄 Updated!');
  }catch(_){if(!silent)showToast('❌ Refresh failed',true);}
}

function startPoll(){
  stopPoll();
  pollTimer=setInterval(async()=>{
    if(!shipperData)return;
    try{
      const fresh=await gs('handleShipperOrders',shipperData.phone||'');
      if(!Array.isArray(fresh))return;
      const newP=fresh.filter(o=>!isCompleted(o)).length;
      if(lastCount>=0&&newP>lastCount){
        showAlert(`មានការដឹកថ្មី +${newP-lastCount}`);
        pushNotif('🚚 YB Shipper',`មានការដឹកថ្មី +${newP-lastCount}`);
        try{tg.HapticFeedback.notificationOccurred('warning');}catch(_){}
      }
      lastCount=newP;allOrders=fresh;applyFilter();
    }catch(_){}
  },60000);
}
function stopPoll(){if(pollTimer){clearInterval(pollTimer);pollTimer=null;}}

  }).join('');
  const sentinel=hasMore

function loadMore(){
  visibleCount+=CHUNK;
  const list=hasActiveSearch()?orders:(activeTab==='pending'?orders.filter(o=>!isCompleted(o)):orders.filter(o=>isCompleted(o)));
  document.getElementById('orders-list').innerHTML=renderList(list);
}
function setupScrollObserver(list){
  const s=document.getElementById('scroll-sentinel');if(!s)return;
  const io=new IntersectionObserver(entries=>{
    if(!entries[0].isIntersecting)return;
    if(visibleCount>=list.length){io.disconnect();return;}
    io.disconnect();loadMore();
  },{rootMargin:'120px'});
  io.observe(s);
}

function isCompleted(o){return o.status==='Completed'||!!o.receiveDate;}

let _holdTimer=null,_holdEl=null,_holdFired=false;
function startHold(el,pid){
  cancelHold();
  _holdEl=el;_holdFired=false;
  const ring=document.getElementById('hold-ring');
  let count=0;
  _holdTimer=setInterval(()=>{
    count+=100;
    if(count>=300)el.classList.add('holding');
    if(count>=3000){
      clearInterval(_holdTimer);_holdTimer=null;
      _holdFired=true;
      el.classList.remove('holding');
      if(ring)ring.classList.add('on');
      try{tg.HapticFeedback.impactOccurred('heavy');}catch(_){}
      setTimeout(()=>{if(ring)ring.classList.remove('on');},500);
      openInvoice(pid);
      _holdEl=null;
    }
  },100);
}
function endHold(ev){
  if(_holdFired){ev&&ev.stopPropagation&&ev.stopPropagation();cancelHold();return;}
  cancelHold();
}
function cancelHold(){
  clearInterval(_holdTimer);_holdTimer=null;
  if(_holdEl){_holdEl.classList.remove('holding');_holdEl=null;}
  const ring=document.getElementById('hold-ring');
  if(ring)ring.classList.remove('on');
}
function cardClick(ev,sid){
  if(_holdFired){_holdFired=false;ev.stopPropagation();return;}
  openOrderSteps(sid);
}

(function(){
  let sy=0,dy=0,drag=false;
  function isSwipeTarget(el){
    const h=document.getElementById('popup-handle');
    const head=document.querySelector('.popup-head');
    const close=document.querySelector('.popup-close');
    if(close&&close.contains(el))return false;
    return(h&&h.contains(el))||(head&&head.contains(el));
  }
  document.addEventListener('touchstart',ev=>{
    if(isSwipeTarget(ev.target)){
      sy=ev.touches[0].clientY;drag=true;dy=0;
      const p=document.getElementById('detail-popup');if(p)p.style.transition='none';
    }
  },{passive:true});
  document.addEventListener('touchmove',ev=>{
    if(!drag)return;
    dy=ev.touches[0].clientY-sy;
    if(dy>0){const p=document.getElementById('detail-popup');if(p)p.style.transform=`translateY(${dy}px)`;}
  },{passive:true});
  document.addEventListener('touchend',()=>{
    if(!drag)return;
    drag=false;
    const p=document.getElementById('detail-popup');if(p)p.style.transition='';
    if(dy>80){closeDetail();}else{if(p)p.style.transform='';}
    dy=0;
  });
})();

async function loadHistory(phone,currentId){
  try{
    const cleanPhone=phone.replace(/\D/g,'').slice(-8);
    const history=allOrders
      .filter(o=>o.phone&&o.phone.replace(/\D/g,'').endsWith(cleanPhone))
      .sort((a,b)=>(b.orderDate||'').localeCompare(a.orderDate||''));
    const el=document.getElementById('history-list');if(!el)return;
    if(!history.length){el.innerHTML=`<p style="font-size:13px;color:var(--muted)">គ្មានប្រវត្តិ</p>`;return;}
    el.innerHTML=history.map(h=>{
      const done=isCompleted(h),isCur=h.profileId===currentId;
      const color=done?'var(--green)':h.status?.toLowerCase().includes('cancel')?'var(--red)':'var(--accent)';
      const cls=done?'completed':h.status?.toLowerCase().includes('cancel')?'cancelled':'pending';
      return`<div class="history-item ${cls}" style="${isCur?'border-left-color:var(--blue)':''}">
        <div class="history-row">
          <span style="font-size:13px;font-weight:600">${e((h.ordered||'—').substring(0,30))}</span>
          <span style="font-size:12px;color:${color}">${e(h.status||'Pending')}</span>
        </div>
        <div class="history-row">
          <span style="font-size:12px;color:var(--muted)">${e(h.orderDate||'—')}</span>
          <span style="font-size:13px;font-weight:700;color:var(--accent)">$${e(h.pricing||h.retail||'—')}</span>
        </div>
        ${isCur?'<span style="font-size:11px;color:var(--blue);font-weight:600">← ការបញ្ជានេះ</span>':''}
      </div>`;
    }).join('');
  }catch(_){
    const el=document.getElementById('history-list');
    if(el)el.innerHTML=`<p style="font-size:13px;color:var(--muted)">មិនអាចផ្ទុក</p>`;
  }
}

// ── Swipe-down on stock sheet ─────────────────────────────
(function(){
  let sy=0,dy=0,drag=false;
  function isShtTarget(el){
    const h=document.getElementById('sht-handle');
    const hd=document.getElementById('sht-head');
    if(h&&h.contains(el))return true;
    if(hd&&hd.contains(el)){
      // exclude close button
      const cl=hd.querySelector('.popup-close');
      if(cl&&cl.contains(el))return false;
      return true;
    }
    return false;
  }
  document.addEventListener('touchstart',ev=>{
    if(isShtTarget(ev.target)){
      sy=ev.touches[0].clientY;drag=true;dy=0;
      const s=document.getElementById('stock-sheet');
      if(s)s.style.transition='none';
    }
  },{passive:true});
  document.addEventListener('touchmove',ev=>{
    if(!drag)return;
    dy=Math.max(0,ev.touches[0].clientY-sy);
    const s=document.getElementById('stock-sheet');
    if(s)s.style.transform=`translateY(${dy}px)`;
  },{passive:true});
  document.addEventListener('touchend',()=>{
    if(!drag)return;drag=false;
    const s=document.getElementById('stock-sheet');
    if(s)s.style.transition='';
    if(dy>80)closeStockSheet();
    else if(s)s.style.transform='';
    dy=0;
  });
})();

function _renderStk(){
  const body=document.getElementById('sht-body');
  const q=_stkSearch.toLowerCase().trim();
  const list=q?_stk.filter(p=>(p.name||'').toLowerCase().includes(q)):_stk;

  const total=_stk.length;
  const totalQty=_stk.reduce((s,p)=>s+parseInt(p.stock_qty||0),0);
  const lowCount=_stk.filter(p=>{
    const qty=parseInt(p.stock_qty||0);
    const mn=parseInt(p.min_stock||0);
    return mn>0&&qty<=mn;
  }).length;

  // gradient pool for no-image cards
  const grd=['linear-gradient(135deg,#f0a50028,#e05c0028)',
             'linear-gradient(135deg,#3b82f628,#1d4ed828)',
             'linear-gradient(135deg,#22c55e28,#16a34a28)',
             'linear-gradient(135deg,#8b5cf628,#6d28d928)',
             'linear-gradient(135deg,#f4372728,#dc262628)'];

  const cards=list.map(p=>{
    const qty=parseInt(p.stock_qty||0);
    const mn=parseInt(p.min_stock||0);
    const isLow=mn>0&&qty<=mn;
    const isOut=qty===0;
    const pid=e(p.product_id||p.id||'');
    const pname=e(p.name||'—');
    const barW=mn>0?Math.min(100,Math.round(qty/mn*100)):100;
    const barClr=isOut?'var(--red)':isLow?'#f97316':'var(--green)';
    const gi=(p.name||'').charCodeAt(0)%grd.length;

function _stkFilter(v){
  _stkSearch=v||'';
  clearTimeout(_stkFilterTimer);
  _stkFilterTimer=setTimeout(()=>{
    // Smart update: only replace prod-grid, not entire body
    const grid=document.getElementById('stk-prod-grid');
    if(grid){ _renderStkGrid(grid); return; }
    _renderStk();
  },160);
}
let _stkFilterTimer=null;

function _renderStkGrid(gridEl){
  if(!gridEl){_renderStk();return;}
  const q=_stkSearch.toLowerCase().trim();
  const list=q?_stk.filter(p=>(p.name||'').toLowerCase().includes(q)||(p.category||'').toLowerCase().includes(q)):_stk;
  const grd=['linear-gradient(135deg,#f0a50028,#e05c0028)',
             'linear-gradient(135deg,#3b82f628,#1d4ed828)',
             'linear-gradient(135deg,#22c55e28,#16a34a28)',
             'linear-gradient(135deg,#8b5cf628,#6d28d928)',
             'linear-gradient(135deg,#f4372728,#dc262628)'];
  gridEl.innerHTML=list.map(p=>{
    const qty=parseInt(p.stock_qty||0);
    const mn=parseInt(p.min_stock||0);
    const isLow=mn>0&&qty<=mn, isOut=qty===0;
    const pid=e(p.product_id||p.id||'');
    const pname=e(p.name||'—');
    const barW=mn>0?Math.min(100,Math.round(qty/mn*100)):100;
    const barClr=isOut?'var(--red)':isLow?'#f97316':'var(--green)';
    const gi=(p.name||'').charCodeAt(0)%grd.length;
    const qtyClr=isOut?'out':isLow?'low':'ok';
    return`<div class="prod-card ${isOut?'out':isLow?'low':''}" onclick="openProductDetail('${pid}')">
      ${isOut?'<span class="prod-out-tag">🚫 អស់</span>':isLow?'<span class="prod-low-tag">⚠️ ជិតអស់</span>':''}
      <button class="prod-add" onclick="event.stopPropagation();openMv('${pid}','${pname}',${qty},${mn})">+</button>
      <div class="prod-img" style="background:${p.image_url?'var(--surface)':grd[gi]}">
        ${p.image_url?`<img src="${e(p.image_url)}" loading="lazy" onerror="this.style.display='none'">`:
          '<span style="position:relative;z-index:1">📦</span>'}
      </div>
      <div class="prod-info">
        <div class="prod-name">${pname}</div>
        <div class="prod-price">${fmtPrice(p.price)}</div>

          <span class="prod-qty ${qtyClr}">${qty}</span>

  }).join('');
}

async function _submitAddProduct(){
  const name =(document.getElementById('np-name')?.value||'').trim();
  const catSel=document.getElementById('np-cat')?.value||'';
  const catNew=(document.getElementById('np-cat-new')?.value||'').trim();
  const cat  =catSel==='__new'?catNew:catSel;
  const price=(document.getElementById('np-price')?.value||'').trim();
  const qty  =parseInt(document.getElementById('np-qty')?.value||'0')||0;
  const min  =parseInt(document.getElementById('np-min')?.value||'0')||0;
  const code =(document.getElementById('np-code')?.value||'').trim();
  if(!name){showToast('❌ ត្រូវវាយឈ្មោះ',true);return;}
  const btn=document.querySelector('[onclick="_submitAddProduct()"]');

    await gs('insertProduct',{name,category:cat,price,qty,code,remark:'',stock:'In Stock'});

  }
}

// ── Movement form ─────────────────────────────────────────
function openMv(productId,productName,currentQty,minQty){
  _mvPid=productId;
  _mvCurQty=parseInt(currentQty)||0;
  _mvType='in';
  document.getElementById('mv-title').textContent=productName||'Stock Movement';
  const isLow=parseInt(minQty||0)>0&&_mvCurQty<=parseInt(minQty||0);
  document.getElementById('mv-sub').innerHTML=
    `ស្តុក: <strong style="color:${isLow?'var(--red)':'var(--accent)'}">${_mvCurQty}</strong>`
    +(parseInt(minQty||0)>0?` <span style="color:var(--muted);font-size:11px">/ min ${minQty}</span>`:'');
  document.getElementById('mv-qty').value='';
  document.getElementById('mv-note').value='';
  document.getElementById('mv-result').textContent='';
  setMvType('in');
  document.getElementById('mv-overlay').classList.add('on');
  setTimeout(()=>document.getElementById('mv-qty').focus(),350);
}
function closeMv(){
  document.getElementById('mv-overlay').classList.remove('on');
  _mvPid=null;
}
function closeMvBg(ev){
  if(ev.target===document.getElementById('mv-overlay'))closeMv();
}
function setMvType(t){
  _mvType=t;
  ['in','out','adjust'].forEach(x=>{
    const btn=document.getElementById(`mvt-${x==='adjust'?'adj':x}`);
    if(!btn)return;
    btn.className='mv-type'+(t===x?` t-${x==='adjust'?'adj':x}`:'');
  });
  const sb=document.getElementById('mv-submit');
  if(sb){
    sb.className=`mv-submit s-${t==='adjust'?'adj':t}`;
    sb.textContent=t==='in'?'⬆️ បន្ថែមស្តុក':t==='out'?'⬇️ ដកស្តុក':'⚙️ កែតម្រូវ';
  }
  updateMvResult();
}
function updateMvResult(){
  const qty=parseInt(document.getElementById('mv-qty')?.value||0);
  const el=document.getElementById('mv-result');
  if(!el||!qty||isNaN(qty))return void(el&&(el.textContent=''));
  let result;
  if(_mvType==='in')     result=_mvCurQty+qty;
  else if(_mvType==='out') result=Math.max(0,_mvCurQty-qty);
  else                     result=qty;
  const color=result<=0?'var(--red)':result<5?'#f97316':'var(--green)';
  el.innerHTML=`→ <span style="color:${color};font-weight:700">${result}</span>`;
}
async function submitMv(){
  if(!_mvPid)return;
  const qtyVal=document.getElementById('mv-qty').value;
  const note=document.getElementById('mv-note').value.trim();
  const qty=parseInt(qtyVal);
  if(!qtyVal||isNaN(qty)||qty<=0){
    showToast('❌ សូមបញ្ចូលចំនួន',true);
    document.getElementById('mv-qty').focus();
    return;
  }
  const storeId=(typeof STORE!=='undefined')?STORE:'yb9999';
  const btn=document.getElementById('mv-submit');
  btn.disabled=true;
  const origText=btn.textContent;
  btn.textContent='⏳ កំពុងរក្សាទុក...';
  try{
    const res=await gs('addMovement',{
      product_id:_mvPid,store_id:storeId,
      type:_mvType,qty,
      note:sanitizeStr(note),
      created_by:shipperData?.phone||''
    });
    if(res&&res.error)throw new Error(res.error);
    // Optimistic local update
    const p=_stk.find(x=>(x.product_id||x.id)===_mvPid);
    if(p){
      const cur=parseInt(p.stock_qty||0);
      if(_mvType==='in')       p.stock_qty=cur+qty;
      else if(_mvType==='out') p.stock_qty=Math.max(0,cur-qty);
      else                     p.stock_qty=qty;
    }
    try{tg.HapticFeedback.notificationOccurred('success');}catch(_){}
    showToast('✅ រក្សាទុកហើយ!');
    closeMv();
    _stkCacheTs=0; // invalidate cache
    _renderStk();
  }catch(err){
    showToast('❌ '+sanitizeStr(err.message),true);
  }finally{
    btn.disabled=false;btn.textContent=origText;
  }
}

let _view = 'main';  // main | order-detail | stock | profile | catalog
let _catOffset = 0;  // catalog pagination
let _ppPhotoOffset = 0;

function setView(v) {
  _view = v;
  // Fix body padding: sub-views have their own sticky header inside #root
  document.body.style.paddingTop = (v === 'main') ? '' : '0';
  window.scrollTo(0,0);
  renderView();
}

function renderView() {
  const root = document.getElementById('root');
  if(!root) return;
  // remove invoice overlay if showing
  if(_view !== 'invoice') closeInvoiceOverlay();
  // Rebuild based on view
  switch(_view) {
    case 'main':         renderMain();   break;
    case 'order-detail': renderDetail(); break;
    case 'stock':        renderStock();  break;
    case 'profile':      renderProfile();break;
    case 'catalog':      renderCatalog();break;
  }
  // Auto-hide header on main + catalog
  // if(_view==='main' || _view==='stock') this.bindMainScroll();
}

// ── MAIN VIEW ─────────────────────────────────────────────
function renderMain() {
  const root = document.getElementById('root');
  const pending   = allOrders.filter(o=>!isCompleted(o));
  const completed = allOrders.filter(o=>isCompleted(o));
  lastCount = pending.length;
  const searching = hasActiveSearch();
  const listToRender = searching ? orders : (activeTab==='pending' ? pending : completed);

  // ── Smart update: if header already exists, only swap orders list ──
  // This preserves search input focus (Fix #5)
  if(document.getElementById('main-hdr')) {
    const pc = document.getElementById('pending-count');
    if(pc) pc.textContent = pending.length;
    const ol = document.getElementById('orders-list');
    if(ol) { ol.innerHTML = renderList(listToRender); return; }
  }

  root.innerHTML = `
    ${_buildMainHeader()}
    <div id="main-body">
      ${searching?'':renderProfileCardHTML()}
      ${searching?'':_buildStats(pending.length, completed.length)}
      <div class="fbar">
        <span class="fbar-label">Filter${searching?` <span style="background:var(--accent);color:#000;font-size:9px;padding:1px 5px;border-radius:8px;font-weight:700">${orders.length}</span>`:''}</span>
        <label class="toggle" onclick="toggleCOD()">
          <div class="toggle-track ${codOnly?'on':''}" id="cod-track"><div class="toggle-thumb"></div></div>
          <span class="toggle-text">COD ប៉ុណ្ណោះ</span>
        </label>
      </div>
      ${searching?`<div style="padding:8px 12px;font-size:12px;color:var(--muted)">🔍 លទ្ធផល ${orders.length}</div>`:`<div class="tabs">
        <div class="tab ${activeTab==='pending'?'active':''}"  onclick="setTab('pending')">🚚 រង់ចាំ (${pending.length})</div>
        <div class="tab ${activeTab==='completed'?'active':''}" onclick="setTab('completed')">✅ ដឹកដល់ (${completed.length})</div>
        <div class="tab" onclick="setView('stock')">📦 ស្តុក</div>

  // bindMainScroll();
}

      </div>

async function _loadProfilePhotos() {
  try {
    // Use products from _stk as photos (real product images)
    const products = (_stkCache||_stk||[]).filter(p=>p.image_url&&p.image_url.startsWith('http'));
    const photos = products.slice(_ppPhotoOffset, _ppPhotoOffset+6).map(p=>({url:p.image_url,name:p.name}));
    // Also try API (Phase 3)
    // const res = await gs('getProfilePhotos', {phone: shipperData?.phone||'', offset: _ppPhotoOffset, limit: 6});
    // const photos = Array.isArray(res) ? res : [];
    const grid = document.getElementById('pp-grid');
    const sentinel = document.getElementById('pp-sentinel');
    if(!grid) return;
    if(photos.length) {
      photos.forEach(ph => {
        const item = document.createElement('div');
        item.className = 'pp-grid-item';
        if(ph.url) {
          const img = document.createElement('img');
          img.src = ph.url;
          img.onload = () => img.classList.add('loaded');
          img.onerror = () => { item.innerHTML = ph.emoji||'📷'; };
          item.appendChild(img);
        } else {
          item.innerHTML = ph.emoji||'📷';
        }
        grid.appendChild(item);
      });
      _ppPhotoOffset += photos.length;
      if(sentinel && photos.length < 6) { sentinel.textContent = '— ចប់ —'; return; }
    } else {
      if(sentinel) sentinel.textContent = '';
      return;
    }
    // Observe sentinel for more
    if(sentinel) {
      sentinel.textContent = '⏳ Scroll ដើម្បីផ្ទុកបន្ថែម';
      const io = new IntersectionObserver(es => {
        if(!es[0].isIntersecting) return;
        io.disconnect(); _loadProfilePhotos();
      }, {rootMargin:'80px'});
      io.observe(sentinel);
    }
  } catch(_) {
    const sentinel = document.getElementById('pp-sentinel');
    if(sentinel) sentinel.textContent = '';
  }
}

let _allCatalogItems = [];
async function _loadCatalogItems(reset=false) {
  try {
    if(reset||!_allCatalogItems.length){
      const res=await gs('getPublicProducts',{store_id:typeof STORE!=='undefined'?STORE:'yb9999'});
      _allCatalogItems=Array.isArray(res)?res:(res?.products||[]);
      // Build category chips
      _buildCatChips();
    }
    _renderCatalogGrid();
  }catch(err){
    const grid=document.getElementById('cat-grid');
    if(grid)grid.innerHTML=`<div style="grid-column:1/-1;padding:30px;text-align:center;color:#aeaeb2">${e(err.message)}</div>`;
  }
}
function _buildCatChips(){
  const chips=document.getElementById('cat-chips');
  if(!chips)return;
  const cats=[...new Set(_allCatalogItems.map(p=>p.category||'').filter(Boolean))];
  chips.innerHTML=['ទំហស់',...cats].map(c=>`
    <div class="cat-chip ${c===_catCatFilter?'active':''}"
      onclick="_catCatFilter='${e(c)}';document.querySelectorAll('.cat-chip').forEach(x=>x.classList.remove('active'));this.classList.add('active');_renderCatalogGrid()">
      ${e(c)}
    </div>`).join('');
}
function _renderCatalogGrid(){
  const grid=document.getElementById('cat-grid');
  if(!grid)return;
  const q=(_catSearch||'').toLowerCase().trim();
  let list=_allCatalogItems;
  if(_catCatFilter&&_catCatFilter!=='ទំហស់') list=list.filter(p=>p.category===_catCatFilter);
  if(q) list=list.filter(p=>(p.name||'').toLowerCase().includes(q)||(p.code||'').toLowerCase().includes(q));
  grid.innerHTML='';
  if(!list.length){
    grid.innerHTML='<div style="grid-column:1/-1;padding:40px;text-align:center;color:#aeaeb2">😕 គ្មានផលិតផល</div>';
    return;
  }
  list.forEach(p=>{
    const div=document.createElement('div');
    div.className='cat-prod-card';
    const hasImg=p.image_url&&p.image_url.startsWith('http');
    const inStock=parseInt(p.stock_qty||p.available||0)>0||(p.stockStatus||'').toLowerCase().includes('in');
    div.innerHTML=`
      <div class="cat-prod-img">${hasImg?`<img src="${e(p.image_url)}" loading="lazy" onload="this.classList.add('loaded')" onerror="this.style.display='none'">`:'<span>📦</span>'}</div>
      <div class="cat-prod-info">
        <div class="cat-prod-name">${e(p.name||'—')}</div>
        <div class="cat-prod-price">${fmtPrice(p.price)}</div>
        <div class="cat-prod-stock">✓ ${inStock?'មានស្ថុក':'អស់'}</div>
        <button class="cat-add-btn" onclick="event.stopPropagation();_catAddToCart(${JSON.stringify(JSON.stringify(p))})">
          + ដាក់ក្នុងត្រន
        </button>
      </div>`;
    div.onclick=()=>openCatalogProduct(p);
    grid.appendChild(div);
  });
  const s=document.getElementById('cat-sentinel');
  if(s)s.textContent=list.length+' ផលិតផល';
  // update cart badge
  _updateCartBadge();
}
function _updateCartBadge(){
  const total=_catCart.reduce((s,x)=>s+x.qty,0);
  const b=document.getElementById('cat-cart-count');
  if(!b)return;
  if(total>0){b.textContent=total;b.style.display='flex';}
  else b.style.display='none';
}

// ── Loading component ─────────────────────────────────────────
function loadingHTML(msg=''){
  return '<div class="lc"><div class="spinner"></div>'+(msg?`<span>${msg}</span>`:'' )+'</div>';
}

// ── Global swipe-right = back handler ─────────────────────────
(function(){
  let _sx=0,_sy=0,_sd=false;
  document.addEventListener('touchstart',ev=>{
    _sx=ev.touches[0].clientX;
    _sy=ev.touches[0].clientY;
    _sd=false;
  },{passive:true});
  document.addEventListener('touchend',ev=>{
    if(_sd) return;
    const dx=ev.changedTouches[0].clientX-_sx;
    const dy=Math.abs(ev.changedTouches[0].clientY-_sy);
    // Swipe right from left edge (< 60px) → back
    if(dx>60&&dy<80&&_sx<60&&_view!=='main'){
      _sd=true;
      if(_view==='order-detail')     {closeStepSheet();return;}
      if(_view==='stock')            {setView('main');return;}
      if(_view==='profile')          {setView('main');return;}
      if(_view==='catalog')          {setView('main');return;}
      if(_view==='product-detail')   {renderCatalog();return;}
      setView('main');
    }
  },{passive:true});
})();

    }
    const total=_catCart.reduce((s,x)=>s+parseFloat(x.price||0)*x.qty,0);

      <div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #e5e5ea">
        <div style="width:48px;height:48px;background:#f5f5f7;border-radius:10px;overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center">

let _so=null, _step=1;

  {id:'ABA',    name:'ABA Bank',   color:'#000',bg:'#f0a500',logo:'🟡'},

];

function openOrderSteps(profileId){
  const o=allOrders.find(x=>x.profileId===profileId);
  if(!o)return;
  _so=o;
  // Restore step2 draft
  try{const sv=JSON.parse(sessionStorage.getItem('s2_'+profileId)||'{}');if(sv.ts)_s2={..._s2,...sv};}catch(_){}
  // Seed s2 from order fields if bot already filled
  if(o.deliveryFee&&!_s2.deliveryFee) _s2.deliveryFee=o.deliveryFee;
  if(o.trackingNumber&&!_s2.trackingNumber) _s2.trackingNumber=o.trackingNumber;
  _s2.botFilled=!!(o.deliveryFee&&o.trackingNumber);
  _s2.botPartial=!!(o.deliveryFee||o.trackingNumber)&&!_s2.botFilled;
  if(!_s2.shipperPhone)_s2.shipperPhone=shipperData?.phone||'';
  // Routing
  const done=isCompleted(o);
  if(done)_step=3;
  else if(_s2.botFilled)_step=3;
  else _step=1;
  _s3={payType:'',bank:'',amount:'',receiptImg:'',confirmed:done};
  _s3PaidSoFar=0;
  setView('order-detail');
  _saveStepState();
}
function closeStepSheet(){
  const ov=document.getElementById('step-overlay');
  if(ov)ov.classList.remove('on');
  document.body.style.overflow='';
  document.body.style.touchAction='';
  _clearStepState();
  if(_view==='order-detail')setView('main');
}
function closeStepBg(ev){}

// Swipe-down on step sheet
(function(){
  let sy=0,dy=0,drag=false;
  function isTgt(el){
    const h=document.getElementById('step-handle');
    return h&&h.contains(el);
  }
  document.addEventListener('touchstart',ev=>{
    if(isTgt(ev.target)){sy=ev.touches[0].clientY;drag=true;dy=0;
      const s=document.getElementById('step-sht');if(s)s.style.transition='none';}
  },{passive:true});
  document.addEventListener('touchmove',ev=>{
    if(!drag)return;
    dy=Math.max(0,ev.touches[0].clientY-sy);
    const s=document.getElementById('step-sht');if(s)s.style.transform=`translateY(${dy}px)`;
  },{passive:true});
  document.addEventListener('touchend',()=>{
    if(!drag)return;drag=false;
    const s=document.getElementById('step-sht');if(s)s.style.transition='';
    if(dy>90)closeStepSheet();else if(s)s.style.transform='';
    dy=0;
  });
})();

function goToStep(n){
  if(n<1){closeStepSheet();_clearStepState();return;}
  if(n>3)return;
  _step=n;
  _renderStep();
  document.getElementById('step-body').scrollTop=0;
  _saveStepState();
}

function _renderStep(){
  const o=_so;if(!o)return;
  const done=isCompleted(o);
  const isCod=(o.payment||'').toLowerCase().includes('cod');
  const labels=['','ការបញ្ជាទិញ','ការដឹកជញ្ជូន','ការទូទាត់'];
  // Indicator
  document.getElementById('step-ind').innerHTML=[1,2,3].map((n,i)=>{
    const cls=n<_step?'done':n===_step?'active':'';
    const line=i<2?`<div class="si-line ${n<_step?'done':''}"></div>`:'';
    return`<div class="si-dot ${cls}"></div>${line}`;
  }).join('');
  document.getElementById('step-num-lbl').innerHTML=
    `<span style="color:${done?'var(--green)':'var(--accent)'}">Step ${_step} / 3</span> — ${labels[_step]}`;
  // Header
  document.getElementById('step-hd-ttl').textContent=o.name||'Order Detail';
  document.getElementById('step-hd-sub').textContent=
    `$${e(o.pricing||o.retail||'—')} · ${e(o.payment||'COD')} · ${fmtDate(o.orderDate)}`;
  // Body
  document.getElementById('step-body').innerHTML=
    _step===1?_buildS1():_step===2?_buildS2():_buildS3();
  // Footer
  document.getElementById('step-ft').innerHTML=_buildFoot();
}

function _s2sync(inp,field){
  if(field==='fee')_s2.deliveryFee=inp.value;
  if(field==='track')_s2.trackingNumber=inp.value;
  if(field==='ship')_s2.shipperPhone=inp.value;
  // Save draft
  try{sessionStorage.setItem('s2_'+(_so?.profileId||''),JSON.stringify({..._s2,ts:Date.now()}));}catch(_){}
  // Update calc
  const calc=document.getElementById('s2-calc');if(calc)calc.innerHTML=_buildCalc();
  // Toggle Next button
  const nb=document.getElementById('s2-next');
  if(nb)nb.disabled=!_canS2Next();
  // Remove error border when user fills fee
  if(field==='fee'&&inp.value){inp.classList.remove('s2-err');}
}

function _calcTotal(){
  const o=_so;if(!o)return{retail:0,pricing:0,fee:0,discount:0,shopDisc:0,total:0};
  const retail=parseFloat(String(o.retail||o.pricing||'0').replace(/[^0-9.]/g,''))||0;
  const pricing=parseFloat(String(o.pricing||'0').replace(/[^0-9.]/g,''))||0;
  const fee=parseFloat(String(_s2.deliveryFee||o.deliveryFee||'0').replace(/[^0-9.]/g,''))||0;
  const discount=(retail>0&&pricing>0&&pricing<retail)?(retail-pricing):0;
  const shopDisc=_s2.shopDiscount?(parseFloat(_s2.shopDiscountAmt||1.5)||1.5):0;
  const total=pricing+fee-shopDisc;
  return{retail,pricing,fee,discount,shopDisc,total};
}
function _buildCalcNew(){
  const o=_so;if(!o)return'';
  const retail  =parseFloat(String(o.retail  ||o.pricing||'0').replace(/[^0-9.]/g,''))||0;
  const pricing =parseFloat(String(o.pricing ||'0').replace(/[^0-9.]/g,''))||0;
  const fee     =parseFloat(String(_s2.deliveryFee||o.deliveryFee||'0').replace(/[^0-9.]/g,''))||0;
  const shopDisc=_s2.shopDiscount?(parseFloat(_s2.shopDiscountAmt||1.5)||1.5):0;
  const custDisc=(retail>0&&pricing>0&&pricing<retail)?(retail-pricing):0;
  const totalDisc=custDisc+shopDisc;
  const total   =pricing+fee-shopDisc;
  _s2._total=total;
  let html='';
  html+='<div class="cn-row"><span class="cn-label">Retail Price</span><span class="cn-val">$'+retail.toFixed(2)+'</span></div>';
  html+='<div class="cn-row"><span class="cn-label">Price ព្រមលក់</span><span class="cn-val acc" style="font-size:14px">$'+pricing.toFixed(2)+'</span></div>';
  html+='<div class="cn-row"><span class="cn-label">Ordered</span><span class="cn-val" style="font-size:12px;max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+e((o.ordered||'—').substring(0,40))+'</span></div>';
  html+='<div class="cn-row"><span class="cn-label">Delivery Fee</span><span class="cn-val">+$'+fee.toFixed(2)+'</span></div>';
  if(totalDisc>0) html+='<div class="cn-row"><span class="cn-label">Discount</span><span class="cn-val grn">-$'+totalDisc.toFixed(2)+'</span></div>';
  html+='<div class="cn-row total-row"><span class="cn-label" style="font-weight:700;color:var(--text)">Total Paid</span><span class="cn-val acc">$'+total.toFixed(2)+'</span></div>';
  return html;
}
function _buildCalc(){return _buildCalcNew();}
function _canS2Next(){return parseFloat(_s2.deliveryFee||'0')>0||_s2.botFilled;}

async function _saveStep2AndNext(){
  if(!_so)return;
  const btn=document.getElementById('s2-next');
  if(btn){btn.disabled=true;btn.textContent='⏳...';}
  try{
    await gs('updateOrder',{
      profile_id   :_so.profileId,
      tenant_id    :typeof STORE!=='undefined'?STORE:'yb9999',
      delivery_fee :_s2.deliveryFee||'',
      tracking_number:_s2.trackingNumber||'',
      shipper_phone:_s2.shipperPhone||'',
      total_paid    :_calcTotal().total.toFixed(2),
      shop_discount :_s2.shopDiscount?(_s2.shopDiscountAmt||'1.5'):'',
    });
    // Update local order object
    const idx=allOrders.findIndex(x=>x.profileId===_so.profileId);
    if(idx>=0){
      allOrders[idx]={...allOrders[idx],
        deliveryFee:_s2.deliveryFee,
        trackingNumber:_s2.trackingNumber};
    }
    _s2.saved=true;
    try{sessionStorage.setItem('s2_'+_so.profileId,JSON.stringify({..._s2,ts:Date.now()}));}catch(_){}
    // Update local order cache so next open detects saved state
    const idx2=allOrders.findIndex(x=>x.profileId===_so.profileId);
    if(idx2>=0){allOrders[idx2]={...allOrders[idx2],deliveryFee:_s2.deliveryFee,shipperPhone:_s2.shipperPhone};}
    goToStep(3);
  }catch(err){
    showToast('❌ '+sanitizeStr(err.message),true);
    if(btn){btn.disabled=false;btn.textContent='✓ Update';}
  }
}
