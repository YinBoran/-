<!DOCTYPE html>
<html lang="km">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>YB Admin</title>
<script src="https://www.google.com/recaptcha/api.js" async defer></script>
<style>
/* ══════════════════════════════════════════
   DESIGN TOKENS
══════════════════════════════════════════ */
:root{
  --bg:#0f0f0f; --surface:#1a1a1a; --card:#222; --border:#2a2a2a;
  --accent:#f0a500; --accent2:#e05c00;
  --green:#22c55e; --red:#ef4444; --blue:#3b82f6; --purple:#8b5cf6;
  --text:#f0f0f0; --muted:#777;
  --font:'Segoe UI',system-ui,-apple-system,sans-serif;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bot:env(safe-area-inset-bottom,0px);
}

/* ══════════════════════════════════════════
   RESET — PDF Rule 1: no text select / blue highlight
══════════════════════════════════════════ */
*{
  margin:0;padding:0;box-sizing:border-box;
  -webkit-user-select:none;user-select:none;
  -webkit-tap-highlight-color:transparent;
  -webkit-touch-callout:none;
}
input,textarea{
  -webkit-user-select:text;user-select:text;
}
body{
  background:var(--bg);color:var(--text);
  font-family:var(--font);min-height:100vh;
  overflow-x:hidden;
  padding-top:var(--safe-top);
}

/* ══════════════════════════════════════════
   PDF Rule 3: CIRCLE SPINNER (global, fixed center)
══════════════════════════════════════════ */
#spinner{
  position:fixed;top:50%;left:50%;
  transform:translate(-50%,-50%);
  z-index:9999;pointer-events:none;
  opacity:0;transition:opacity .2s;
}
#spinner.show{opacity:1}
.circle{
  width:44px;height:44px;
  border:4px solid #ffffff18;
  border-top:4px solid var(--accent);
  border-radius:50%;
  animation:spin .75s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* ══════════════════════════════════════════
   PDF Rule 2: SKELETON LOADING
══════════════════════════════════════════ */
.skeleton{
  background:linear-gradient(90deg,#1e1e1e 25%,#2a2a2a 50%,#1e1e1e 75%);
  background-size:200% 100%;
  animation:shimmer 1.4s infinite;
  border-radius:6px;
}
@keyframes shimmer{
  0%{background-position:200% 0}
  100%{background-position:-200% 0}
}
.skel-row{height:14px;margin-bottom:10px}
.skel-row.short{width:55%;height:11px}
.skel-row.med{width:75%}
.skel-card{
  background:var(--card);border:1px solid var(--border);
  border-radius:12px;padding:14px;margin-bottom:8px;
}

/* ══════════════════════════════════════════
   PDF Rule 4: FULL SCREEN SHEET (Dynamic Island)
   top = env(safe-area-inset-top, 59px) for notch/DI
══════════════════════════════════════════ */
#fullsheet{
  position:fixed;
  top:max(env(safe-area-inset-top,0px), 8px);
  left:0;right:0;bottom:0;
  background:var(--surface);
  border-radius:20px 20px 0 0;
  z-index:9998;
  transform:translateY(100%);
  transition:transform .35s cubic-bezier(.32,.72,0,1);
  overflow-y:auto;
  -webkit-overflow-scrolling:touch;
  will-change:transform;
}
#fullsheet.open{transform:translateY(0)}
.fs-handle{
  width:36px;height:4px;background:#444;
  border-radius:2px;margin:14px auto 0;
  flex-shrink:0;
}
.fs-hdr{
  position:sticky;top:0;background:var(--surface);
  padding:12px 16px 10px;
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  z-index:1;
}
.fs-title{font-size:16px;font-weight:700}
.fs-close{
  width:32px;height:32px;border:none;background:var(--card);
  border-radius:50%;color:var(--muted);font-size:16px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
}
.fs-body{padding:16px 16px calc(var(--safe-bot) + 24px)}

#fsOverlay{
  position:fixed;inset:0;background:#00000070;
  z-index:9997;opacity:0;pointer-events:none;
  transition:opacity .3s;
}
#fsOverlay.show{opacity:1;pointer-events:all}

/* ══════════════════════════════════════════
   LOGIN
══════════════════════════════════════════ */
/* ── Login screen: no scroll when visible ── */
body.login-open{overflow:hidden;height:100vh}

#loginScreen{
  position:fixed;inset:0;display:flex;align-items:center;
  justify-content:center;
  background:radial-gradient(ellipse at 50% 0%,#1a120044 0%,transparent 60%),
             var(--bg);
  padding:20px;z-index:9999;overflow-y:auto;
}
.login-box{
  background:var(--card);border:1px solid var(--border);
  border-radius:24px;padding:32px 24px;
  width:100%;max-width:390px;
  box-shadow:0 24px 64px rgba(0,0,0,.4);
}
.login-logo{
  width:68px;height:68px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  border-radius:20px;display:flex;align-items:center;justify-content:center;
  font-size:28px;font-weight:800;color:#000;
  margin:0 auto 16px;
  box-shadow:0 8px 32px #f0a50033;
}
.login-title{text-align:center;font-size:21px;font-weight:700;margin-bottom:4px}
.login-sub{text-align:center;font-size:13px;color:var(--muted);margin-bottom:28px}
.form-group{margin-bottom:14px}
.form-label{font-size:12px;color:var(--muted);margin-bottom:6px;display:block;font-weight:500}
.form-input{
  width:100%;padding:13px 14px;background:var(--surface);
  border:1.5px solid var(--border);border-radius:12px;
  color:var(--text);font-size:14px;font-family:var(--font);
  outline:none;transition:border-color .2s,box-shadow .2s;
  -webkit-appearance:none;
}
.form-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px #f0a50018}
.form-input.valid{border-color:#22c55e}
.form-input.invalid{border-color:#ef4444}
.field-hint{font-size:11px;margin-top:5px;min-height:15px;transition:color .2s;padding-left:2px}
.field-hint.ok{color:#22c55e}
.field-hint.err{color:#ef4444}
.field-hint.info{color:var(--muted)}
.pw-strength-bar{height:3px;border-radius:2px;margin-top:6px;
  width:0;transition:width .3s,background .3s}
.btn-primary{
  width:100%;padding:14px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  border:none;border-radius:12px;color:#000;font-size:15px;font-weight:700;
  cursor:pointer;font-family:var(--font);transition:opacity .15s,transform .1s;
  margin-top:8px;
}
.btn-primary:active{opacity:.85;transform:scale(.98)}
.btn-primary:disabled{opacity:.45;cursor:not-allowed;transform:none}
.recaptcha-wrap{display:flex;justify-content:center;margin:14px 0}
#otpScreen{display:none}
/* OTP delivery status box */
.otp-delivery{
  border-radius:12px;padding:12px 14px;margin-bottom:16px;
  font-size:13px;line-height:1.6;text-align:center;
  border:1px solid;
}
.otp-delivery.ok{
  background:rgba(34,197,94,.08);color:#16a34a;
  border-color:rgba(34,197,94,.25);
}
.otp-delivery.warn{
  background:rgba(234,179,8,.1);color:#b45309;
  border-color:rgba(234,179,8,.3);
}
/* OTP countdown timer */
.otp-timer{
  display:flex;align-items:center;justify-content:center;gap:8px;
  margin:10px 0 14px;
}
.otp-timer-text{font-size:12px;color:var(--muted)}
.otp-timer-count{
  font-size:14px;font-weight:700;font-family:monospace;
  color:var(--accent);min-width:36px;text-align:center;
}
.otp-timer-count.expiring{color:#ef4444}
.otp-input{
  font-size:28px;text-align:center;letter-spacing:12px;
  font-weight:700;padding:16px;
}
.btn-resend{
  width:100%;padding:11px;background:transparent;
  border:1.5px solid var(--border);border-radius:12px;
  color:var(--muted);font-size:13px;font-weight:600;
  cursor:pointer;font-family:var(--font);
  transition:all .2s;margin-top:6px;
}
.btn-resend:not(:disabled):hover{border-color:var(--accent);color:var(--accent)}
.btn-resend:disabled{opacity:.4;cursor:not-allowed}
.back-btn{
  background:none;border:none;color:var(--muted);font-size:13px;
  cursor:pointer;width:100%;text-align:center;
  font-family:var(--font);padding:10px;margin-top:4px;
}
.back-btn:hover{color:var(--text)}
.login-err{
  background:#ef444418;border:1px solid #ef444440;
  border-radius:10px;padding:10px 14px;font-size:13px;
  color:#ef4444;margin-bottom:14px;display:none;
  animation:fadeIn .2s ease;
}
@keyframes fadeIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:none}}

/* ══════════════════════════════════════════
   HEADER
══════════════════════════════════════════ */
.hdr{
  background:rgba(26,26,26,.95);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);
  padding:12px 16px;
  display:flex;align-items:center;gap:10px;
  position:sticky;top:0;z-index:100;
}
.hdr-logo{
  width:38px;height:38px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  border-radius:11px;display:flex;align-items:center;justify-content:center;
  font-size:17px;font-weight:800;color:#000;flex-shrink:0;
}
.hdr-info h1{font-size:15px;font-weight:600}
.hdr-info p{font-size:11px;color:var(--muted);margin-top:1px}
.hdr-actions{margin-left:auto;display:flex;align-items:center;gap:6px}
.role-badge{
  font-size:11px;font-weight:700;padding:3px 10px;
  border-radius:20px;background:var(--accent);color:#000;
}
.role-badge.manager{background:var(--blue);color:#fff}
.role-badge.shop{background:var(--green);color:#000}
.role-badge.stock{background:var(--purple);color:#fff}
.role-badge.shipper{background:#06b6d4;color:#000}
.icon-btn{
  width:34px;height:34px;border:none;background:var(--surface);
  border-radius:9px;cursor:pointer;display:flex;align-items:center;
  justify-content:center;color:var(--muted);font-size:15px;
  transition:background .15s;
}
.icon-btn:active{background:var(--border)}

/* ══════════════════════════════════════════
   TABS
══════════════════════════════════════════ */
.tabs{
  display:flex;background:var(--surface);
  border-bottom:1px solid var(--border);
  overflow-x:auto;
}
.tabs::-webkit-scrollbar{display:none}
.tab{
  flex:none;padding:11px 16px;font-size:12px;font-weight:600;
  color:var(--muted);cursor:pointer;
  border-bottom:2px solid transparent;
  transition:color .2s,border-color .2s;
  white-space:nowrap;
}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}

/* ══════════════════════════════════════════
   STATS
══════════════════════════════════════════ */
.stats-grid{
  display:grid;grid-template-columns:repeat(4,1fr);
  gap:1px;background:var(--border);
  border-bottom:1px solid var(--border);
}
.stat-box{
  background:var(--surface);padding:12px 6px;text-align:center;
}
.stat-num{font-size:22px;font-weight:700;color:var(--accent)}
.stat-lbl{font-size:10px;color:var(--muted);margin-top:2px;line-height:1.3}

/* ══════════════════════════════════════════
   FILTER BAR
══════════════════════════════════════════ */
.fbar{
  background:var(--surface);border-bottom:1px solid var(--border);
  padding:8px 12px;display:flex;gap:8px;align-items:center;flex-wrap:wrap;
}
.search-input{
  flex:1;min-width:150px;padding:9px 12px;background:var(--bg);
  border:1.5px solid var(--border);border-radius:9px;color:var(--text);
  font-size:13px;outline:none;font-family:var(--font);
  transition:border-color .2s;
}
.search-input:focus{border-color:var(--accent)}
.filter-select{
  padding:9px 10px;background:var(--bg);border:1.5px solid var(--border);
  border-radius:9px;color:var(--text);font-size:12px;outline:none;cursor:pointer;
}
.btn-add{
  padding:9px 14px;background:var(--accent);border:none;border-radius:9px;
  color:#000;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;
  font-family:var(--font);transition:opacity .15s;
}
.btn-add:active{opacity:.8}

/* ══════════════════════════════════════════
   TABLE
══════════════════════════════════════════ */
.table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;font-size:13px}
th{
  background:var(--surface);padding:10px 12px;text-align:left;
  font-size:11px;font-weight:600;color:var(--muted);
  border-bottom:1px solid var(--border);white-space:nowrap;
  position:sticky;top:0;z-index:2;
}
td{
  padding:10px 12px;border-bottom:1px solid #1c1c1c;
  vertical-align:middle;
}
tr{transition:background .1s}
tr:active td{background:#ffffff06}
.badge{
  display:inline-block;padding:3px 9px;border-radius:20px;
  font-size:11px;font-weight:600;
}
.bp{background:#f0a50018;color:var(--accent)}
.bpa{background:#22c55e18;color:var(--green)}
.bc{background:#3b82f618;color:var(--blue)}
.bx{background:#ef444418;color:var(--red)}
.bco{background:#8b5cf618;color:var(--purple)}
.action-btns{display:flex;gap:6px}
.btn-sm{
  padding:5px 10px;border:none;border-radius:7px;font-size:11px;font-weight:600;
  cursor:pointer;font-family:var(--font);transition:opacity .15s;
}
.btn-sm:active{opacity:.7}
.be{background:#3b82f618;color:var(--blue)}
.bd{background:#ef444418;color:var(--red)}

/* ══════════════════════════════════════════
   CONTENT
══════════════════════════════════════════ */
.content{padding:12px}
#mainApp{display:none}

/* ══════════════════════════════════════════
   SIDE PANEL (edit drawer — narrower than fullsheet)
══════════════════════════════════════════ */
#panelOverlay{
  position:fixed;inset:0;background:#00000070;z-index:200;
  opacity:0;pointer-events:none;transition:opacity .25s;
}
#panelOverlay.open{opacity:1;pointer-events:all}
#sidePanel{
  position:fixed;right:0;top:0;bottom:0;width:min(420px,100vw);
  background:var(--card);border-left:1px solid var(--border);
  overflow-y:auto;z-index:201;
  transform:translateX(100%);transition:transform .25s ease;
  display:flex;flex-direction:column;
}
#sidePanel.open{transform:translateX(0)}
.panel-hdr{
  padding:14px 16px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;background:var(--card);z-index:1;
}
.panel-title{font-size:16px;font-weight:700}
.panel-body{padding:16px;flex:1}
.panel-footer{
  padding:12px 16px;border-top:1px solid var(--border);
  display:flex;gap:8px;
  padding-bottom:calc(12px + var(--safe-bot));
}
.field-group{margin-bottom:14px}
.field-label{font-size:12px;color:var(--muted);margin-bottom:5px;display:block;font-weight:500}
.field-input{
  width:100%;padding:11px 12px;background:var(--surface);
  border:1.5px solid var(--border);border-radius:10px;
  color:var(--text);font-size:13px;outline:none;font-family:var(--font);
  transition:border-color .2s;
}
.field-input:focus{border-color:var(--accent)}
textarea.field-input{min-height:72px;resize:vertical}
select.field-input{cursor:pointer}
.btn-save{
  flex:1;padding:12px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  border:none;border-radius:10px;color:#000;font-size:14px;font-weight:700;
  cursor:pointer;font-family:var(--font);transition:opacity .15s;
}
.btn-save:active{opacity:.85}
.btn-cancel{
  padding:12px 14px;background:var(--surface);border:1px solid var(--border);
  border-radius:10px;color:var(--muted);font-size:14px;cursor:pointer;
  font-family:var(--font);
}

/* ══════════════════════════════════════════
   EMPTY / ERROR
══════════════════════════════════════════ */
.empty{text-align:center;padding:52px 16px;color:var(--muted)}
.empty-icon{font-size:44px;margin-bottom:12px;opacity:.6}

/* ══════════════════════════════════════════
   TOAST
══════════════════════════════════════════ */
#toast{
  position:fixed;bottom:calc(20px + var(--safe-bot));left:50%;
  transform:translateX(-50%) translateY(0);
  background:#1c1c1e;border:1px solid var(--border);
  border-radius:12px;padding:11px 20px;font-size:13px;font-weight:600;
  z-index:9999;white-space:nowrap;pointer-events:none;
  opacity:0;transition:opacity .25s,transform .25s;
}
#toast.show{opacity:1}
#toast.success{border-color:var(--green);color:var(--green)}
#toast.error{border-color:var(--red);color:var(--red)}
#toast.info{border-color:var(--blue);color:var(--blue)}

/* ══════════════════════════════════════════
   LOW STOCK ALERT BANNER
══════════════════════════════════════════ */
.stock-alert{
  background:#ef444412;border:1px solid #ef444430;
  border-radius:10px;padding:12px 14px;
  font-size:13px;color:var(--red);
  display:flex;align-items:center;gap:8px;margin-bottom:12px;
}

/* ══════════════════════════════════════════
   PRODUCT CARD GRID (Phase 2 — 2 columns)
══════════════════════════════════════════ */
.prod-grid{
  display:grid;grid-template-columns:repeat(2,1fr);gap:10px;
}
.prod-card{
  background:var(--card);border:1px solid var(--border);
  border-radius:14px;overflow:hidden;cursor:pointer;
  transition:border-color .15s;
}
.prod-card.low-stock{border-color:#ef444444}
.prod-card:active{opacity:.9}
.prod-img{
  width:100%;aspect-ratio:1;object-fit:cover;
  background:var(--surface);display:block;
}
.prod-img-placeholder{
  width:100%;aspect-ratio:1;background:var(--surface);
  display:flex;align-items:center;justify-content:center;
  font-size:36px;
}
.prod-info{padding:10px}
.prod-name{font-size:13px;font-weight:600;margin-bottom:4px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.prod-price{font-size:14px;font-weight:700;color:var(--accent)}
.prod-qty{font-size:11px;color:var(--muted);margin-top:3px}
.prod-qty.low{color:var(--red);font-weight:600}

/* ══════════════════════════════════════════
   RESPONSIVE
══════════════════════════════════════════ */
@media(max-width:520px){
  .stats-grid{grid-template-columns:repeat(2,1fr)}
  th:nth-child(n+6),td:nth-child(n+6){display:none}
  .stat-num{font-size:18px}
}
@media(max-width:380px){
  th:nth-child(n+5),td:nth-child(n+5){display:none}
}
</style>
</head>
<body>

<!-- ══ GLOBAL SPINNER ════════════════════ -->
<div id="spinner"><div class="circle"></div></div>

<!-- ══ GLOBAL FULLSCREEN SHEET ══════════ -->
<div id="fsOverlay" onclick="closeFullSheet()"></div>
<div id="fullsheet">
  <div class="fs-handle"></div>
  <div class="fs-hdr">
    <span class="fs-title" id="fsTitle"></span>
    <button class="fs-close" onclick="closeFullSheet()">✕</button>
  </div>
  <div class="fs-body" id="fsBody"></div>
</div>

<!-- ══ LOGIN ═════════════════════════════ -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-logo" id="loginLogo">YB</div>
    <h2 class="login-title">YB Admin</h2>
    <p class="login-sub" id="loginSub">Dashboard v6.2</p>
    <div class="login-err" id="loginErr"></div>

    <!-- Step 1: Credentials -->
    <div id="credScreen">
      <div class="form-group">
        <label class="form-label">Phone / Username</label>
        <input class="form-input" id="inputId" type="text" placeholder="09xxxxxxxx"
               autocomplete="username" inputmode="text"
               oninput="validateId(this)"
               onkeydown="if(event.key==='Enter')document.getElementById('inputPw').focus()">
        <div class="field-hint info" id="hintId">លេខទូរស័ព្ទ 9-10 ខ្ទង់ ឬ username</div>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input class="form-input" id="inputPw" type="password" placeholder="••••••••"
               autocomplete="current-password"
               oninput="validatePw(this)"
               onkeydown="if(event.key==='Enter')doLoginStep1()">
        <div class="pw-strength-bar" id="pwBar"></div>
        <div class="field-hint info" id="hintPw">យ៉ាងតិច 4 តួអក្សរ</div>
      </div>
      <div class="recaptcha-wrap">
        <div class="g-recaptcha" data-sitekey="6LccVxUtAAAAADwMsRysGzfAAX3Wt_CguC5ktLrF"></div>
      </div>
      <button class="btn-primary" id="btnLogin" onclick="doLoginStep1()">ចូល</button>
    </div>

    <!-- Step 2: OTP -->
    <div id="otpScreen">
      <!-- OTP delivery status: ok or warn (no telegram) -->
      <div class="otp-delivery ok" id="otpDelivery">
        📲 OTP បានផ្ញើទៅ Telegram<br>

<!-- ══════════════════════════════════════════
     JAVASCRIPT
══════════════════════════════════════════ -->
<script>
// ════════════════════════════════════════
// CONFIG
// ════════════════════════════════════════
const API_URL = (typeof window.API !== 'undefined' ? window.API : 'https://mr.yinboran.workers.dev/');

// ── TEST_MODE: driven by Settings.Connect Type (TEST/PROD) ──
// ប្ដូរ: Settings sheet → Connect Type → TEST ឬ PROD
// មិនចាំបាច់ប្ដូរ code ទៀតទេ
let TEST_MODE = false; // updated on init from getAppConfig

// ── Session IN MEMORY ONLY — never localStorage ──
let S = null; // { token, expires, name, role, tenantId, permissions }
let _tab = 'orders';
let _orders = [], _products = [];
let _qOrder = '', _statusFilter = '';

// ════════════════════════════════════════
// SPINNER (PDF Rule 3)
// ════════════════════════════════════════
let _spinCount = 0;
function showSpinner(){ _spinCount++; document.getElementById('spinner').classList.add('show'); }
function hideSpinner(){ if(--_spinCount<=0){ _spinCount=0; document.getElementById('spinner').classList.remove('show'); } }

// ════════════════════════════════════════
// FULLSCREEN SHEET (PDF Rule 4 + swipe down)
// ════════════════════════════════════════
function openFullSheet(title, html){
  document.getElementById('fsTitle').textContent = title;
  document.getElementById('fsBody').innerHTML = html;
  document.getElementById('fullsheet').classList.add('open');
  document.getElementById('fsOverlay').classList.add('show');
  initSwipeDown();
}
function closeFullSheet(){
  document.getElementById('fullsheet').classList.remove('open');
  document.getElementById('fsOverlay').classList.remove('show');
}
// PDF Rule: swipe down > 100px → dismiss
function initSwipeDown(){
  const sheet = document.getElementById('fullsheet');
  let sy = 0, dragging = false;
  const onStart = e => { sy = (e.touches||[e])[0].clientY; dragging = true; };
  const onEnd   = e => {
    if(!dragging) return; dragging = false;
    const dy = (e.changedTouches||[e])[0].clientY - sy;
    if(dy > 100) closeFullSheet();
  };
  sheet.removeEventListener('touchstart', sheet._ts||null);
  sheet.removeEventListener('touchend',   sheet._te||null);
  sheet._ts = onStart; sheet._te = onEnd;
  sheet.addEventListener('touchstart', onStart, { passive:true });
  sheet.addEventListener('touchend',   onEnd,   { passive:true });
}

// ════════════════════════════════════════
// SKELETON (PDF Rule 2)
// ════════════════════════════════════════
function skeletonRows(n){
  return Array(n).fill(0).map(()=>`
    <div class="skel-card">
      <div class="skeleton skel-row"></div>
      <div class="skeleton skel-row med"></div>
      <div class="skeleton skel-row short"></div>
    </div>`).join('');
}
function showSkeleton(){ document.getElementById('tabContent').innerHTML = skeletonRows(5); }

// ════════════════════════════════════════
// API
// ════════════════════════════════════════
async function api(action, data){
  const body = Object.assign({ action }, data||{});
  if(S && S.token) body.token = S.token;
  try{
    showSpinner();
    const r = await fetch(API_URL,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify(body)
    });
    return await r.json();
  }catch(e){ return { error:'Network: '+e.message }; }
  finally{ hideSpinner(); }
}

// ════════════════════════════════════════
// LOGIN
// ════════════════════════════════════════
let _loginPhone = '';
let _otpTimer   = null;
let _resendTimer = null;

function showErr(m){
  const el = document.getElementById('loginErr');
  el.textContent = m; el.style.display = m ? 'block' : 'none';
}

// ── Validation ────────────────────────────────────────────
function validateId(el) {
  const v = el.value.trim();
  const hint = document.getElementById('hintId');
  const isPhone = /^0[0-9]{8,9}$/.test(v.replace(/\s/g,''));
  const isUser  = v.length >= 3 && /^[a-zA-Z0-9_.]+$/.test(v);
  if (!v) {
    el.className = 'form-input';
    hint.textContent = 'លេខទូរស័ព្ទ 9-10 ខ្ទង់ ឬ username';
    hint.className = 'field-hint info';
  } else if (isPhone || isUser) {
    el.className = 'form-input valid';
    hint.textContent = isPhone ? '✓ លេខទូរស័ព្ទត្រឹមត្រូវ' : '✓ Username ត្រឹមត្រូវ';
    hint.className = 'field-hint ok';
  } else {
    el.className = 'form-input invalid';
    hint.textContent = v.length < 3 ? 'ខ្លីពេក' : 'ទម្រង់ខុស — 09xxxxxxxx ឬ username';
    hint.className = 'field-hint err';
  }
}

function validatePw(el) {
  const v = el.value;
  const hint = document.getElementById('hintPw');
  const bar  = document.getElementById('pwBar');
  if (!v) {
    el.className = 'form-input';
    hint.textContent = 'យ៉ាងតិច 4 តួអក្សរ';
    hint.className = 'field-hint info';
    bar.style.cssText = 'width:0';
    return;
  }
  if (v.length < 4) {
    el.className = 'form-input invalid';
    hint.textContent = `ខ្លីពេក — ${v.length}/4`;
    hint.className = 'field-hint err';
    bar.style.cssText = 'width:25%;background:#ef4444;height:3px;border-radius:2px;margin-top:6px';
  } else if (v.length < 8) {
    el.className = 'form-input valid';
    hint.textContent = '✓ OK';
    hint.className = 'field-hint ok';
    bar.style.cssText = 'width:60%;background:#f59e0b;height:3px;border-radius:2px;margin-top:6px';
  } else {
    el.className = 'form-input valid';
    hint.textContent = '✓ ខ្លាំង';
    hint.className = 'field-hint ok';
    bar.style.cssText = 'width:100%;background:#22c55e;height:3px;border-radius:2px;margin-top:6px';
  }
}

function validateOtp(el) {
  el.value = el.value.replace(/\D/g,'').slice(0,6);
  const hint = document.getElementById('hintOtp');
  const btn  = document.getElementById('btnOtp');
  const len  = el.value.length;
  if (len === 0) {
    el.className = 'form-input otp-input';
    hint.textContent = 'បញ្ចូល 6 ខ្ទង់';
    hint.className = 'field-hint info';
    btn.disabled = true;
  } else if (len < 6) {
    el.className = 'form-input otp-input';
    hint.textContent = `${len} / 6`;
    hint.className = 'field-hint info';
    btn.disabled = true;
  } else {
    el.className = 'form-input otp-input valid';
    hint.textContent = '✓ ត្រៀមរួចហើយ';
    hint.className = 'field-hint ok';
    btn.disabled = false;
    setTimeout(() => doLoginStep2(), 400);
  }
}

// ── OTP delivery status ────────────────────────────────────
function showOTPDelivery(res) {
  const box  = document.getElementById('otpDelivery');
  const hint = document.getElementById('otpHint');
  const ph   = res.phone || _loginPhone.slice(-4);
  if (res.noTelegram) {
    box.className = 'otp-delivery warn';
    box.innerHTML = `⚠️ User នេះគ្មាន Telegram linked<br>
      <small>Admin ផ្ញើ OTP ផ្ទាល់ ឬ ប្រើ <b>#otp ${_loginPhone}</b> នៅ Bot</small>`;
  } else {
    box.className = 'otp-delivery ok';
    box.innerHTML = `📲 OTP បានផ្ញើទៅ Telegram<br>
      លេខ <strong>***${ph}</strong>`;
  }
}

// ── 5-minute OTP countdown ─────────────────────────────────
function startOTPCountdown() {
  clearInterval(_otpTimer);
  clearInterval(_resendTimer);
  let total = 300; // 5 minutes in seconds
  let resend = 60; // resend available after 60s
  const countEl  = document.getElementById('otpCountdown');
  const resendBtn = document.getElementById('btnResend');
  const resendSec = document.getElementById('resendSec');

  resendBtn.disabled = true;
  resendSec.textContent = resend;
  resendBtn.textContent = `ផ្ញើម្ដងទៀត (${resend}s)`;

  _otpTimer = setInterval(() => {
    total--;
    if (total <= 0) {
      clearInterval(_otpTimer);
      countEl.textContent = '0:00';
      countEl.className = 'otp-timer-count expiring';
      resendBtn.disabled = false;
      resendBtn.textContent = 'ផ្ញើ OTP ថ្មី';
      showErr('OTP ផុតកំណត់ — ចុច "ផ្ញើ OTP ថ្មី"');
      return;
    }
    const m = Math.floor(total / 60);
    const s = total % 60;
    countEl.textContent = `${m}:${String(s).padStart(2,'0')}`;
    if (total <= 30) countEl.className = 'otp-timer-count expiring';

    // Enable resend after 60s
    resend--;
    if (resend > 0) {
      resendBtn.textContent = `ផ្ញើម្ដងទៀត (${resend}s)`;
    } else if (resend === 0) {
      resendBtn.disabled = false;
      resendBtn.textContent = 'ផ្ញើម្ដងទៀត';
    }
  }, 1000);
}

async function resendOTP() {
  const btn = document.getElementById('btnResend');
  btn.disabled = true;
  btn.textContent = 'កំពុងផ្ញើ...';
  const pw  = document.getElementById('inputPw').value;
  const cap = TEST_MODE ? 'test_bypass'
            : (typeof grecaptcha !== 'undefined' ? grecaptcha.getResponse() : '');
  const res = await api('loginStep1', { identifier: _loginPhone, password: pw, recaptchaToken: cap });
  if (res.error) {
    showErr(res.error);
    btn.disabled = false;
    btn.textContent = 'ផ្ញើម្ដងទៀត';
    return;
  }
  showOTPDelivery(res);
  document.getElementById('inputOtp').value = '';
  document.getElementById('inputOtp').className = 'form-input otp-input';
  document.getElementById('hintOtp').textContent = 'បញ្ចូល 6 ខ្ទង់';
  document.getElementById('btnOtp').disabled = true;
  document.getElementById('otpCountdown').className = 'otp-timer-count';
  showErr('');
  startOTPCountdown();
}

// ── Step 1 ─────────────────────────────────────────────────
async function doLoginStep1(){
  const id  = document.getElementById('inputId').value.trim();
  const pw  = document.getElementById('inputPw').value;
  const cap = TEST_MODE ? 'test_bypass'
            : (typeof grecaptcha !== 'undefined' ? grecaptcha.getResponse() : '');

  if (!id)        { showErr('បញ្ចូល Phone ឬ Username'); return; }
  if (pw.length < 4) { showErr('Password យ៉ាងតិច 4 តួអក្សរ'); return; }
  if (!TEST_MODE && !cap) { showErr('Please complete reCAPTCHA'); return; }

  const btn = document.getElementById('btnLogin');
  btn.disabled = true; btn.textContent = 'Verifying...';
  showErr('');

  const res = await api('loginStep1', { identifier:id, password:pw, recaptchaToken:cap });
  btn.disabled = false; btn.textContent = 'ចូល';

  if (res.error) {
    showErr(res.error);
    if (typeof grecaptcha !== 'undefined') grecaptcha.reset();
    return;
  }

  _loginPhone = id.replace(/\D/g,'');
  showOTPDelivery(res);
  document.getElementById('credScreen').style.display = 'none';
  document.getElementById('otpScreen').style.display  = 'block';
  document.getElementById('inputOtp').value = '';
  document.getElementById('btnOtp').disabled = true;
  document.getElementById('otpCountdown').className = 'otp-timer-count';
  startOTPCountdown();
  setTimeout(() => document.getElementById('inputOtp').focus(), 150);
}

// ── Step 2 ─────────────────────────────────────────────────
async function doLoginStep2(){
  const code = document.getElementById('inputOtp').value.trim();
  if (code.length < 6) return;

  const btn = document.getElementById('btnOtp');
  btn.disabled = true; btn.textContent = 'Checking...';
  showErr('');

  const res = await api('loginStep2', { phone:_loginPhone, otpCode:code });
  btn.disabled = false; btn.textContent = 'Verify';

  if (res.error) {
    showErr(res.error);
    document.getElementById('inputOtp').value = '';
    document.getElementById('inputOtp').className = 'form-input otp-input';
    document.getElementById('hintOtp').textContent = 'បញ្ចូល 6 ខ្ទង់';
    document.getElementById('hintOtp').className = 'field-hint info';
    return;
  }

  clearInterval(_otpTimer);
  S = { token:res.token, expires:res.expires, name:res.name, role:res.role,
        tenantId:res.tenantId||'', photo:res.photo||'', permissions:{} };
  bootApp();
}

function backToCred(){
  clearInterval(_otpTimer);
  document.getElementById('credScreen').style.display = 'block';
  document.getElementById('otpScreen').style.display  = 'none';
  document.getElementById('inputOtp').value = '';
  document.getElementById('btnOtp').disabled = true;
  document.getElementById('otpCountdown').textContent = '5:00';
  document.getElementById('otpCountdown').className = 'otp-timer-count';
  document.getElementById('hintOtp').textContent = 'បញ្ចូល 6 ខ្ទង់';
  document.getElementById('hintOtp').className = 'field-hint info';
  if (typeof grecaptcha !== 'undefined') grecaptcha.reset();
  showErr('');
}

async function doLogout(){
  if(S) await api('logout');
  S = null; location.reload();
}

// ════════════════════════════════════════
// BOOT
// ════════════════════════════════════════
async function bootApp(){
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('mainApp').style.display     = 'block';
  document.body.classList.remove('login-open');

  // Get permissions
  const perm = await api('getUserPermissions');
  if(!perm.error){ S.permissions = perm.permissions||{}; S.tenantId = perm.tenantId||S.tenantId; }

  // Apply role badge
  const badge = document.getElementById('roleBadge');
  badge.textContent = S.role; badge.className = 'role-badge '+S.role;
  document.getElementById('appSub').textContent = S.name+' · '+(S.tenantId||'all');

  // Store branding + sync TEST_MODE from Connect Type
  const cfg = await api('getAppConfig');
  if(!cfg.error){
    document.getElementById('appName').textContent = cfg.storeName||'YB Admin';
    const ini = cfg.storeInitials||'YB';
    document.getElementById('appLogo').textContent  = ini;
    document.getElementById('loginLogo').textContent = ini;
    if(cfg.primaryColor) document.documentElement.style.setProperty('--accent', cfg.primaryColor);
    TEST_MODE = (cfg.connectType||'').toUpperCase() === 'TEST';
  }

  // Hide tabs by role
  applyRoleTabs();
  switchTab('orders');
}

function applyRoleTabs(){
  const p = S.permissions||{};
  const hide = id => { const e=document.getElementById(id); if(e) e.style.display='none'; };
  if(!p.customers) hide('tCustomers');
  if(!p.stock)     hide('tStock');
  if(!p.users)     hide('tUsers');
  if(!p.reports)   hide('tReports');
  if(!p.settings)  hide('tSettings');
  if(S.role==='stock'){ const t=document.querySelector('[data-tab="orders"]'); if(t) t.style.display='none'; }
}

// ════════════════════════════════════════
// TABS
// ════════════════════════════════════════
function switchTab(tab){
  _tab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab===tab));
  loadTab(tab);
}
function refreshTab(){ loadTab(_tab); }

function loadTab(tab){
  showSkeleton(); // PDF Rule 2: show skeleton before fetch
  switch(tab){
    case 'orders':    loadOrders();    break;
    case 'products':  loadProducts();  break;
    case 'customers': loadCustomers(); break;
    case 'stock':     loadStock();     break;
    case 'users':     loadUsers();     break;
    case 'reports':   loadReports();   break;
    case 'settings':  loadSettings();  break;
    default: document.getElementById('tabContent').innerHTML=`<div class="empty"><div class="empty-icon">🚧</div>Coming soon</div>`;
  }
}

// ════════════════════════════════════════
// ORDERS
// ════════════════════════════════════════
async function loadOrders(){
  const res = await api('handleOrderRecords');
  if(res.error){ renderErr(res.error); return; }
  _orders = Array.isArray(res) ? res : [];
  updateStats(_orders);
  renderOrders(_orders);
}

function updateStats(o){
  document.getElementById('sTotal').textContent   = o.length;
  document.getElementById('sPending').textContent = o.filter(x=>/pending/i.test(x.status)).length;
  document.getElementById('sPaid').textContent    = o.filter(x=>/^paid$/i.test(x.status)).length;
  document.getElementById('sDone').textContent    = o.filter(x=>/complet/i.test(x.status)).length;
}

function renderOrders(data){
  const canEdit = S.permissions && S.permissions.edit;
  const fl = data.filter(o=>{
    const q = _qOrder.toLowerCase();
    const mq = !q || [o.name,o.phone,o.ordered,o.profileId].some(v=>(v||'').toLowerCase().includes(q));
    const ms = !_statusFilter || (o.status||'').toLowerCase().includes(_statusFilter.toLowerCase());
    return mq && ms;
  });

  _flOrders = fl;
  document.getElementById('tabContent').innerHTML = ` placeholder="Search name, phone..." value="${esc(_qOrder)}"
             oninput="_qOrder=this.value;renderOrders(_orders)">
      <select class="filter-select" onchange="_statusFilter=this.value;renderOrders(_orders)">
        <option value="">All</option>
        <option value="Pending"   ${_statusFilter==='Pending'   ?'selected':''}>Pending</option>
        <option value="Paid"      ${_statusFilter==='Paid'      ?'selected':''}>Paid</option>
        <option value="Completed" ${_statusFilter==='Completed' ?'selected':''}>Completed</option>
        <option value="Cancelled" ${_statusFilter==='Cancelled' ?'selected':''}>Cancelled</option>
      </select>
      ${canEdit?'<button class="btn-add" onclick="openAddOrder()">+ Add</button>':''}
    </div>
    <div class="table-wrap">
      <table>
        <thead><tr>
          <th>Name</th><th>Phone</th><th>Ordered</th><th>Pricing</th><th>Status</th><th>Date</th>
          ${canEdit?'<th></th>':''}
        </tr></thead>
        <tbody>${fl.length ? fl.map((o,i)=>`
          <tr onclick="_openOrderByIdx(${i})" style="cursor:pointer">
            <td style="font-weight:600">${esc(o.name||'—')}</td>
            <td><code style="font-size:12px">${esc(o.phone||'—')}</code></td>
            <td style="font-size:12px;max-width:140px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc((o.ordered||'—').slice(0,50))}</td>
            <td style="color:var(--accent);font-weight:600">${esc(o.pricing||o.retail||'—')}</td>
            <td>${sbadge(o.status)}</td>
            <td style="font-size:11px;color:var(--muted)">${esc((o.orderDate||'').slice(0,10))}</td>
            ${canEdit?`<td onclick="event.stopPropagation()"><div class="action-btns">
              <button class="btn-sm be" onclick="_openEditOrderByIdx(${i})">Edit</button>

              <div style="height:6px;border-radius:4px;background:var(--accent);width:${Math.round(v/orders.length*100)}%"></div>

            <span style="font-size:13px;font-weight:700;min-width:24px;text-align:right">${v}</span>

async function submitEditOrder(pid){
  const data={profileId:pid,name:gv('name'),location:gv('location'),pricing:gv('pricing'),status:gv('status'),remark:gv('remark')};
  const r = await api('updateCustomer',{data});
  if(r.error){ toast(r.error,'error'); return; }
  toast('Updated ✅','success'); closePanel(); loadOrders();
}
async function delOrder(pid, ev){
  if(ev) ev.stopPropagation();
  if(!confirm('Delete this order?')) return;
  const r = await api('deleteCustomer',{data:{profileId:pid}});
  if(r.error){ toast(r.error,'error'); return; }
  toast('Deleted','success'); loadOrders();
}

// FORM HELPERS
// ════════════════════════════════════════
function pf(label, id, type, ph, val){
  return `<div class="field-group">
    <label class="field-label">${esc(label)}</label>
    <input class="field-input" id="pf_${id}" type="${type||'text'}"
           placeholder="${esc(ph||'')}" value="${esc(val||'')}">
  </div>`;
}
function gv(id){ const el=document.getElementById('pf_'+id); return el?el.value.trim():''; }

// ════════════════════════════════════════
// UTILS
// ════════════════════════════════════════
function parseGrid(res){
  if(!Array.isArray(res)) return [];
  if(Array.isArray(res[0])){ const h=res[0]; return res.slice(1).map(r=>{ const o={}; h.forEach((k,i)=>o[String(k).trim()]=r[i]); return o; }); }
  return res;
}
function sbadge(s){
  const cls = {'pending':'bp','paid':'bpa','completed':'bc','cancelled':'bx','cod':'bco'};
  const k   = Object.keys(cls).find(k=>(s||'').toLowerCase().includes(k))||'';
  return `<span class="badge ${cls[k]||'bp'}">${esc(s||'—')}</span>`;
}
function renderErr(msg){ document.getElementById('tabContent').innerHTML=`<div class="empty"><div class="empty-icon">⚠️</div><p>${esc(msg)}</p></div>`; }
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

let _toastT;
function toast(msg, type){
  const el=document.getElementById('toast');
  el.textContent=msg; el.className='toast show '+(type||'success');
  clearTimeout(_toastT);
  _toastT=setTimeout(()=>el.className='toast',2800);
}
